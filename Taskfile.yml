version: "3"

vars:
  PYTHON:
    sh: |
      if [ -f .venv/bin/python ]; then echo ".venv/bin/python"
      elif [ -f .venv/Scripts/python.exe ]; then echo ".venv/Scripts/python.exe"
      elif command -v python3 >/dev/null 2>&1; then echo "python3"
      else echo "python"
      fi
  PROJECT_ID: '{{default "home-lab" .PROJECT_ID}}'
  PROJECT_ROOT: '{{default "." .PROJECT_ROOT}}'
  FRAMEWORK_SUBMODULE_URL: '{{.FRAMEWORK_SUBMODULE_URL}}'
  FRAMEWORK_SUBMODULE_PATH: '{{default "framework" .FRAMEWORK_SUBMODULE_PATH}}'
  FRAMEWORK_DIST_ZIP: '{{.FRAMEWORK_DIST_ZIP}}'
  FRAMEWORK_DIST_VERSION: '{{.FRAMEWORK_DIST_VERSION}}'
  FRAMEWORK_DIST_REPOSITORY: '{{.FRAMEWORK_DIST_REPOSITORY}}'
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'

includes:
  validate:
    taskfile: ./taskfiles/validate.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  build:
    taskfile: ./taskfiles/build.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  test:
    taskfile: ./taskfiles/test.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  framework:
    taskfile: ./taskfiles/framework.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_VERSION: "{{.FRAMEWORK_VERSION}}"
      FRAMEWORK_DIST_OUTPUT: "{{.FRAMEWORK_DIST_OUTPUT}}"
      FRAMEWORK_BOOTSTRAP_OUTPUT: "{{.FRAMEWORK_BOOTSTRAP_OUTPUT}}"
  project:
    taskfile: ./taskfiles/project.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_SUBMODULE_URL: "{{.FRAMEWORK_SUBMODULE_URL}}"
      FRAMEWORK_SUBMODULE_PATH: "{{.FRAMEWORK_SUBMODULE_PATH}}"
      FRAMEWORK_DIST_ZIP: "{{.FRAMEWORK_DIST_ZIP}}"
      FRAMEWORK_DIST_VERSION: "{{.FRAMEWORK_DIST_VERSION}}"
      FRAMEWORK_DIST_REPOSITORY: "{{.FRAMEWORK_DIST_REPOSITORY}}"
  ci:
    taskfile: ./taskfiles/ci.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  acceptance:
    taskfile: ./taskfiles/acceptance.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
