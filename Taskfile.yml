version: "3"

vars:
  PYTHON:
    sh: |
      if [ -f .venv/bin/python ]; then echo ".venv/bin/python"
      elif [ -f .venv/Scripts/python.exe ]; then echo ".venv/Scripts/python.exe"
      elif command -v py >/dev/null 2>&1; then echo "py -3"
      elif command -v python >/dev/null 2>&1 && python -c "import sys" >/dev/null 2>&1; then echo "python"
      elif command -v python3 >/dev/null 2>&1 && python3 -c "import sys" >/dev/null 2>&1; then echo "python3"
      else echo "python"
      fi
  PROJECT_ID: '{{default "home-lab" .PROJECT_ID}}'
  PROJECT_ROOT: '{{default "." .PROJECT_ROOT}}'
  FRAMEWORK_SUBMODULE_URL: '{{.FRAMEWORK_SUBMODULE_URL}}'
  FRAMEWORK_SUBMODULE_PATH: '{{default "framework" .FRAMEWORK_SUBMODULE_PATH}}'
  FRAMEWORK_DIST_ZIP: '{{.FRAMEWORK_DIST_ZIP}}'
  FRAMEWORK_DIST_VERSION: '{{.FRAMEWORK_DIST_VERSION}}'
  FRAMEWORK_DIST_REPOSITORY: '{{.FRAMEWORK_DIST_REPOSITORY}}'
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'
  DEBUG: '{{default "-Xfrozen_modules=off -m debugpy --listen 127.0.0.1:5678 --wait-for-client" .DEBUG}}'

includes:
  debug:
    taskfile: ./taskfiles/debug.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  validate:
    taskfile: ./taskfiles/validate.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  build:
    taskfile: ./taskfiles/build.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  test:
    taskfile: ./taskfiles/test.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  framework:
    taskfile: ./taskfiles/framework.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_VERSION: "{{.FRAMEWORK_VERSION}}"
      FRAMEWORK_DIST_OUTPUT: "{{.FRAMEWORK_DIST_OUTPUT}}"
      FRAMEWORK_BOOTSTRAP_OUTPUT: "{{.FRAMEWORK_BOOTSTRAP_OUTPUT}}"
  bundle:
    taskfile: ./taskfiles/bundle.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
  deploy:
    taskfile: ./taskfiles/deploy.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
  project:
    taskfile: ./taskfiles/project.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_SUBMODULE_URL: "{{.FRAMEWORK_SUBMODULE_URL}}"
      FRAMEWORK_SUBMODULE_PATH: "{{.FRAMEWORK_SUBMODULE_PATH}}"
      FRAMEWORK_DIST_ZIP: "{{.FRAMEWORK_DIST_ZIP}}"
      FRAMEWORK_DIST_VERSION: "{{.FRAMEWORK_DIST_VERSION}}"
      FRAMEWORK_DIST_REPOSITORY: "{{.FRAMEWORK_DIST_REPOSITORY}}"
  ci:
    taskfile: ./taskfiles/ci.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  acceptance:
    taskfile: ./taskfiles/acceptance.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  ansible:
    taskfile: ./taskfiles/ansible.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
  terraform:
    taskfile: ./taskfiles/terraform.yml
    dir: .
    vars:
      PROJECT_ID: "{{.PROJECT_ID}}"
  generate:
    taskfile: ./taskfiles/generate.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  inspect:
    taskfile: ./taskfiles/inspect.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  product:
    taskfile: ./taskfiles/product.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"

tasks:
  ci:
    desc: Alias for the local CI gate
    cmds:
      - task ci:local

  clean:
    desc: Clean generated/runtime artifacts (mvn clean equivalent)
    cmds:
      - task build:clean-generated

  workflow:dev:
    desc: Complete Deploy Workflow phases 1-2 (dev-plane validate + build)
    cmds:
      - task validate:passthrough
      - task build:default

  workflow:bundle:
    desc: Complete Deploy Workflow handoff (create immutable bundle)
    cmds:
      - task: bundle:create
        ignore_error: true
        vars:
          GENERATED_ROOT: "{{.GENERATED_ROOT}}"
          BUNDLES_ROOT: "{{.BUNDLES_ROOT}}"
          INJECT_SECRETS: "{{.INJECT_SECRETS}}"
          SECRETS_ROOT: "{{.SECRETS_ROOT}}"
      - task: bundle:list
        vars:
          BUNDLES_ROOT: "{{.BUNDLES_ROOT}}"

  workflow:deploy-check:
    desc: Complete Deploy Workflow phase 3 (bundle-based maintenance-check)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task: deploy:service-chain-evidence-check-bundle
        vars:
          BUNDLE: "{{.BUNDLE}}"
          CONTINUE_ON_FAILURE: "{{.CONTINUE_ON_FAILURE}}"
          DEPLOY_RUNNER: "{{.DEPLOY_RUNNER}}"
          ANSIBLE_VIA_WSL: "{{.ANSIBLE_VIA_WSL}}"
          INJECT_SECRETS: "{{.INJECT_SECRETS}}"
          PROXMOX_BACKEND_CONFIG: "{{.PROXMOX_BACKEND_CONFIG}}"
          MIKROTIK_BACKEND_CONFIG: "{{.MIKROTIK_BACKEND_CONFIG}}"
          PROXMOX_VAR_FILE: "{{.PROXMOX_VAR_FILE}}"
          MIKROTIK_VAR_FILE: "{{.MIKROTIK_VAR_FILE}}"

  workflow:deploy-apply:
    desc: Complete Deploy Workflow phase 4 (bundle-based maintenance-apply)
    requires:
      vars:
        - BUNDLE
        - ALLOW_APPLY
    preconditions:
      - sh: 'test "{{.ALLOW_APPLY}}" = "YES"'
        msg: "Set ALLOW_APPLY=YES to run workflow:deploy-apply."
    cmds:
      - task: deploy:service-chain-evidence-apply-bundle
        vars:
          ALLOW_APPLY: "{{.ALLOW_APPLY}}"
          BUNDLE: "{{.BUNDLE}}"
          CONTINUE_ON_FAILURE: "{{.CONTINUE_ON_FAILURE}}"
          DEPLOY_RUNNER: "{{.DEPLOY_RUNNER}}"
          ANSIBLE_VIA_WSL: "{{.ANSIBLE_VIA_WSL}}"
          TERRAFORM_AUTO_APPROVE: "{{.TERRAFORM_AUTO_APPROVE}}"
          INJECT_SECRETS: "{{.INJECT_SECRETS}}"
          PROXMOX_BACKEND_CONFIG: "{{.PROXMOX_BACKEND_CONFIG}}"
          MIKROTIK_BACKEND_CONFIG: "{{.MIKROTIK_BACKEND_CONFIG}}"
          PROXMOX_VAR_FILE: "{{.PROXMOX_VAR_FILE}}"
          MIKROTIK_VAR_FILE: "{{.MIKROTIK_VAR_FILE}}"

  default:
    desc: List available tasks
    cmds:
      - task --list
