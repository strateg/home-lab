version: "3"

vars:
  PYTHON: '{{default "python" .PYTHON}}'
  PROJECT_ID: '{{default "home-lab" .PROJECT_ID}}'
  PROJECT_ROOT: '{{default "." .PROJECT_ROOT}}'
  FRAMEWORK_SUBMODULE_URL: '{{.FRAMEWORK_SUBMODULE_URL}}'
  FRAMEWORK_SUBMODULE_PATH: '{{default "framework" .FRAMEWORK_SUBMODULE_PATH}}'
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "v5-dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "v5-build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'

includes:
  validate:
    taskfile: ./taskfiles/validate.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  build:
    taskfile: ./taskfiles/build.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  test:
    taskfile: ./taskfiles/test.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
  framework:
    taskfile: ./taskfiles/framework.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_VERSION: "{{.FRAMEWORK_VERSION}}"
      FRAMEWORK_DIST_OUTPUT: "{{.FRAMEWORK_DIST_OUTPUT}}"
      FRAMEWORK_BOOTSTRAP_OUTPUT: "{{.FRAMEWORK_BOOTSTRAP_OUTPUT}}"
  project:
    taskfile: ./taskfiles/project.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"
      PROJECT_ID: "{{.PROJECT_ID}}"
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      FRAMEWORK_SUBMODULE_URL: "{{.FRAMEWORK_SUBMODULE_URL}}"
      FRAMEWORK_SUBMODULE_PATH: "{{.FRAMEWORK_SUBMODULE_PATH}}"
  ci:
    taskfile: ./taskfiles/ci.yml
    dir: .
    vars:
      PYTHON: "{{.PYTHON}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

