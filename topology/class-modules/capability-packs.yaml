version: 2
schema: capability-packs

# Capability Packs - Reusable capability bundles for common profiles
# Namespace: pack.<domain>.<profile>

packs:

  # ===========================================================================
  # L1 - Router Packs
  # ===========================================================================

  # NOTE: Legacy packs migrated from cap.router.* to cap.net.* namespace (2026-06-17)
  # See class.router.yaml for canonical capability definitions

  - id: pack.router.home
    title: Home Router
    summary: Standard home router capabilities with VPN and QoS.
    class_ref: class.router
    capabilities:
      - cap.net.l3.routing.static
      - cap.net.l3.translation.snat
      - cap.net.l3.security.firewall.stateful
      - cap.net.service.dhcp.server
      - cap.net.service.dns.resolver
      - cap.net.overlay.vpn.wireguard.server
      - cap.net.l3.qos.basic
      - cap.net.l2.segmentation.vlan.8021q
      - cap.net.interface.wifi

  - id: pack.router.edge
    title: Edge Router
    summary: Edge router with LTE failover and basic routing.
    class_ref: class.router
    capabilities:
      - cap.net.l3.routing.static
      - cap.net.l3.translation.snat
      - cap.net.l3.security.firewall.stateful
      - cap.net.service.dhcp.server
      - cap.net.interface.lte
      - cap.net.l2.segmentation.vlan.8021q

  - id: pack.router.infra
    title: Infrastructure Router
    summary: Enterprise router with BGP and VRF support.
    class_ref: class.router
    capabilities:
      - cap.net.l3.routing.static
      - cap.net.l3.routing.dynamic.bgp
      - cap.net.l3.routing.dynamic.ospf
      - cap.net.l3.translation.snat
      - cap.net.l3.security.firewall.stateful
      - cap.net.l3.security.firewall.zone_policy
      - cap.net.l2.segmentation.vlan.8021q
      - cap.net.l3.segmentation.vrf

  - id: pack.router.vpn_hub
    title: VPN Hub Router
    summary: VPN concentrator with multi-peer WireGuard support.
    class_ref: class.router
    capabilities:
      - cap.net.l3.routing.static
      - cap.net.l3.translation.snat
      - cap.net.l3.security.firewall.stateful
      - cap.net.overlay.vpn.wireguard.server
      - cap.net.overlay.vpn.multi_instance
      - cap.net.l3.qos.advanced

  - id: pack.router.home_gateway
    title: Home Gateway Router
    summary: Full-featured home gateway with VPN, WiFi, and advanced features (MikroTik-style).
    class_ref: class.router
    capabilities:
      - cap.net.interface.ethernet
      - cap.net.l3.routing.static
      - cap.net.l3.translation.snat
      - cap.net.l3.translation.dnat
      - cap.net.l3.security.firewall.stateful
      - cap.net.service.dhcp.server
      - cap.net.service.dns.resolver
      - cap.net.service.dns.filtering
      - cap.net.overlay.vpn.wireguard.server
      - cap.net.overlay.vpn.wireguard.client
      - cap.net.interface.wifi
      - cap.net.interface.wifi.dual_band
      - cap.net.interface.wifi.wifi6
      - cap.net.l2.segmentation.vlan.8021q
      - cap.net.l3.uplink.multi_uplink
      - cap.net.l3.uplink.failover
      - cap.net.l3.qos.advanced

  - id: pack.router.travel_vpn
    title: Travel VPN Router
    summary: Compact travel router with VPN client and WiFi repeater (GL.iNet-style).
    class_ref: class.router
    capabilities:
      - cap.net.interface.ethernet
      - cap.net.l3.routing.static
      - cap.net.l3.translation.snat
      - cap.net.l3.security.firewall.stateful
      - cap.net.service.dhcp.server
      - cap.net.service.dns.resolver
      - cap.net.overlay.vpn.wireguard.client
      - cap.net.overlay.vpn.openvpn.client
      - cap.net.interface.wifi
      - cap.net.interface.wifi.repeater_mode
      - cap.net.l3.qos.basic

  - id: pack.router.enterprise
    title: Enterprise Router
    summary: Enterprise-grade router with BGP, OSPF, VRF, and advanced features.
    class_ref: class.router
    capabilities:
      - cap.net.interface.ethernet
      - cap.net.l3.routing.static
      - cap.net.l3.routing.dynamic.bgp
      - cap.net.l3.routing.dynamic.ospf
      - cap.net.l3.routing.ecmp
      - cap.net.l3.translation.snat
      - cap.net.l3.translation.dnat
      - cap.net.l3.security.firewall.stateful
      - cap.net.l3.security.firewall.zone_policy
      - cap.net.service.dhcp.server
      - cap.net.service.dns.resolver
      - cap.net.l2.segmentation.vlan.8021q
      - cap.net.l3.segmentation.vrf
      - cap.net.l3.uplink.multi_uplink
      - cap.net.l3.uplink.load_balance
      - cap.net.l3.qos.advanced
      - cap.net.observability.netflow
      - cap.net.service.snmp
      - cap.net.management.api.rest

  # ===========================================================================
  # L1 - Compute Packs
  # ===========================================================================

  - id: pack.compute.hypervisor.standalone
    title: Standalone Hypervisor
    summary: Single-node hypervisor with local storage.
    class_ref: class.compute.hypervisor
    capabilities:
      - cap.compute.virtualization.lxc
      - cap.compute.virtualization.qemu
      - cap.compute.storage.local
      - cap.compute.storage.backup

  - id: pack.compute.hypervisor.cluster
    title: Cluster Hypervisor
    summary: Cluster-capable hypervisor with HA and migration.
    class_ref: class.compute.hypervisor
    capabilities:
      - cap.compute.virtualization.lxc
      - cap.compute.virtualization.qemu
      - cap.compute.clustering.node
      - cap.compute.clustering.ha
      - cap.compute.clustering.migration
      - cap.compute.storage.local
      - cap.compute.storage.shared
      - cap.compute.storage.backup

  - id: pack.compute.edge
    title: Edge Compute Node
    summary: Edge compute node with container support.
    class_ref: class.compute.edge_node
    capabilities:
      - cap.compute.virtualization.docker
      - cap.compute.virtualization.podman
      - cap.compute.storage.local

  # ===========================================================================
  # L1 - Power Packs
  # ===========================================================================

  - id: pack.power.ups.basic
    title: Basic UPS
    summary: Battery backup with telemetry.
    class_ref: class.power.ups
    capabilities:
      - cap.power.ups.battery
      - cap.power.ups.surge
      - cap.power.ups.telemetry

  - id: pack.power.ups.smart
    title: Smart UPS
    summary: Smart UPS with graceful shutdown support.
    class_ref: class.power.ups
    capabilities:
      - cap.power.ups.battery
      - cap.power.ups.surge
      - cap.power.ups.telemetry
      - cap.power.ups.shutdown

  - id: pack.power.pdu.managed
    title: Managed PDU
    summary: Managed PDU with switching and metering.
    class_ref: class.power.pdu
    capabilities:
      - cap.power.pdu.switching
      - cap.power.pdu.metering
      - cap.power.pdu.scheduling

  # ===========================================================================
  # L3 - Storage Packs
  # ===========================================================================

  - id: pack.storage.local.basic
    title: Basic Local Storage
    summary: LVM-based local storage.
    class_ref: class.storage.pool
    capabilities:
      - cap.storage.pool.lvm
      - cap.storage.volume.thin
      - cap.storage.volume.snapshot

  - id: pack.storage.local.advanced
    title: Advanced Local Storage
    summary: ZFS-based storage with encryption.
    class_ref: class.storage.pool
    capabilities:
      - cap.storage.pool.zfs
      - cap.storage.volume.thin
      - cap.storage.volume.snapshot
      - cap.storage.volume.clone
      - cap.storage.volume.encryption

  - id: pack.storage.shared.nfs
    title: NFS Shared Storage
    summary: NFS-based shared storage.
    class_ref: class.storage.pool
    capabilities:
      - cap.storage.pool.nfs
      - cap.storage.volume.thin

  # ===========================================================================
  # L4 - Workload Packs
  # ===========================================================================

  - id: pack.workload.lxc.standard
    title: Standard LXC Workload
    summary: Standard LXC container with bridge networking.
    class_ref: class.compute.workload.lxc
    capabilities:
      - cap.workload.runtime.lxc
      - cap.workload.network.bridge
      - cap.workload.storage.bind

  - id: pack.workload.docker.standard
    title: Standard Docker Workload
    summary: Standard Docker container with bridge networking.
    class_ref: class.compute.workload.docker
    capabilities:
      - cap.workload.runtime.docker
      - cap.workload.network.bridge
      - cap.workload.storage.volume

  - id: pack.workload.vm.standard
    title: Standard VM Workload
    summary: Standard QEMU/KVM virtual machine.
    class_ref: class.compute.workload.vm
    capabilities:
      - cap.workload.runtime.qemu
      - cap.workload.network.bridge
      - cap.workload.storage.volume

  # ===========================================================================
  # L5 - Service Packs
  # ===========================================================================

  - id: pack.service.database.sql
    title: SQL Database Service
    summary: SQL database with replication support.
    class_ref: class.service.database
    capabilities:
      - cap.service.database.sql
      - cap.service.database.replication
      - cap.service.monitoring.metrics

  - id: pack.service.cache.redis
    title: Redis Cache Service
    summary: Redis cache with persistence.
    class_ref: class.service.cache
    capabilities:
      - cap.service.cache.memory
      - cap.service.cache.persistence
      - cap.service.messaging.pubsub
      - cap.service.monitoring.metrics

  - id: pack.service.web.proxy
    title: Web Proxy Service
    summary: Reverse proxy with load balancing.
    class_ref: class.service.proxy
    capabilities:
      - cap.service.web.http
      - cap.service.web.websocket
      - cap.service.web.reverse_proxy
      - cap.service.web.load_balancer
      - cap.service.monitoring.metrics

  - id: pack.service.dns.adblock
    title: DNS Ad-Blocking Service
    summary: DNS resolver with content filtering.
    class_ref: class.service.dns
    capabilities:
      - cap.service.dns.recursive
      - cap.service.dns.filtering
      - cap.service.monitoring.metrics

  - id: pack.service.monitoring.prometheus
    title: Prometheus Monitoring Service
    summary: Metrics collection and storage.
    class_ref: class.service.monitoring
    capabilities:
      - cap.service.monitoring.metrics
      - cap.service.database.timeseries
      - cap.service.web.http

  - id: pack.service.vpn.mesh
    title: VPN Mesh Service
    summary: Tailscale mesh VPN service.
    class_ref: class.service.vpn
    capabilities:
      - cap.service.vpn.tailscale
      - cap.service.monitoring.metrics

  # ===========================================================================
  # L6 - Observability Packs
  # ===========================================================================

  - id: pack.observability.metrics
    title: Metrics Observability
    summary: Pull-based metrics collection with dashboards.
    class_ref: class.service.visualization
    capabilities:
      - cap.observability.collection.pull
      - cap.observability.alerting.threshold
      - cap.observability.visualization.dashboard
      - cap.observability.visualization.graph

  - id: pack.observability.logs
    title: Log Observability
    summary: Push-based log collection.
    class_ref: class.service.visualization
    capabilities:
      - cap.observability.collection.push
      - cap.observability.alerting.threshold
      - cap.observability.visualization.table

  # ===========================================================================
  # L7 - Operations Packs
  # ===========================================================================

  - id: pack.operations.backup.standard
    title: Standard Backup
    summary: Scheduled incremental backups with retention.
    class_ref: class.operations.backup
    capabilities:
      - cap.operations.backup.full
      - cap.operations.backup.incremental
      - cap.operations.automation.scheduled
      - cap.operations.policy.retention

  - id: pack.operations.backup.snapshot
    title: Snapshot Backup
    summary: Snapshot-based backups with lifecycle management.
    class_ref: class.operations.backup
    capabilities:
      - cap.operations.backup.snapshot
      - cap.operations.automation.scheduled
      - cap.operations.policy.lifecycle

  # ===========================================================================
  # L2 - Network Security Packs (ADR-0109, ADR-0110, ADR-0111)
  # ===========================================================================

  - id: pack.zone.security_matrix.soho
    title: SOHO Security Matrix
    summary: Zone-based security for small office/home office with 7 trust zones.
    class_ref: class.network.security_matrix
    capabilities:
      - cap.zone.security_matrix
      - cap.zone.security_matrix.r1_r6
      - cap.firewall.zone_policy
      - cap.firewall.address_lists
      - cap.firewall.logging
    adr_refs:
      - "0109"
      - "0110"

  - id: pack.zone.security_matrix.routeros
    title: RouterOS Security Matrix
    summary: MikroTik RouterOS-specific security matrix enforcement.
    class_ref: class.network.security_matrix
    capabilities:
      - cap.zone.security_matrix
      - cap.zone.security_matrix.r1_r6
      - cap.zone.security_matrix.routeros
      - cap.firewall.zone_policy
      - cap.firewall.address_lists
      - cap.firewall.stateful
      - cap.firewall.logging
    adr_refs:
      - "0110"

  - id: pack.zone.security_matrix.proxmox
    title: Proxmox Security Matrix
    summary: Proxmox pve-firewall security matrix enforcement.
    class_ref: class.network.security_matrix
    capabilities:
      - cap.zone.security_matrix
      - cap.zone.security_matrix.r1_r6
      - cap.zone.security_matrix.pve_firewall
      - cap.firewall.zone_policy
      - cap.firewall.stateful
      - cap.firewall.logging
    adr_refs:
      - "0110"

  - id: pack.vlan.zone_aware
    title: Zone-Aware VLAN
    summary: VLAN with trust zone association and IP derivation support.
    class_ref: class.network.vlan
    capabilities:
      - cap.vlan.trust_zone_ref
      - cap.vlan.ip_derivation
      - cap.vlan.tagging
    adr_refs:
      - "0110"
      - "0111"

  - id: pack.zone.trust.management
    title: Management Trust Zone
    summary: Highest trust zone for infrastructure management.
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.5
      - cap.zone.management
    adr_refs:
      - "0109"

  - id: pack.zone.trust.servers
    title: Servers Trust Zone
    summary: High trust zone for server workloads.
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.4
    adr_refs:
      - "0109"

  - id: pack.zone.trust.user
    title: User Trust Zone
    summary: Medium trust zone for end-user devices.
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.3
    adr_refs:
      - "0109"

  - id: pack.zone.trust.vpn_tunnel
    title: VPN Tunnel Trust Zone
    summary: Medium-low trust zone for VPN tunneled traffic.
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.2
    adr_refs:
      - "0109"

  - id: pack.zone.trust.iot
    title: IoT Trust Zone
    summary: Low trust zone for IoT devices (isolated).
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.1
      - cap.zone.isolated
    adr_refs:
      - "0109"

  - id: pack.zone.trust.guest
    title: Guest Trust Zone
    summary: Lowest trust zone for guest networks (isolated).
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.0
      - cap.zone.isolated
    adr_refs:
      - "0109"

  - id: pack.zone.trust.untrusted
    title: Untrusted Zone
    summary: External/internet zone with no trust.
    class_ref: class.network.trust_zone
    capabilities:
      - cap.zone.trust_level.0
    adr_refs:
      - "0109"
