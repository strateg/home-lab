
id: network-capability-catalog
version: 1.0.0
description: L2 Network capability definitions

capabilities:
  # VLAN capabilities
  - @capability: cap.vlan.tagged
    description: VLAN supports 802.1Q tagging
    layer: L2
  - @capability: cap.vlan.untagged
    description: VLAN operates without tagging (native)
    layer: L2
  - @capability: cap.vlan.pvid
    description: VLAN is the port default (PVID)
    layer: L2

  # Bridge capabilities
  - @capability: cap.bridge.vlan_aware
    description: Bridge supports VLAN awareness
    layer: L2
  - @capability: cap.bridge.vlan_filtering
    description: Bridge performs VLAN filtering
    layer: L2
  - @capability: cap.bridge.stp
    description: Bridge supports Spanning Tree Protocol
    layer: L2

  # Trust zone capabilities
  - @capability: cap.zone.isolated
    description: Zone is isolated from other zones
    layer: L2
  - @capability: cap.zone.management
    description: Zone is for management traffic
    layer: L2
  - @capability: cap.zone.dmz
    description: Zone is a demilitarized zone
    layer: L2

  # Firewall capabilities
  - @capability: cap.firewall.stateful
    description: Firewall maintains connection state
    layer: L2
  - @capability: cap.firewall.connection_tracking
    description: Firewall tracks connections
    layer: L2
  - @capability: cap.firewall.logging
    description: Firewall supports rule logging
    layer: L2

  # QoS capabilities
  - @capability: cap.qos.htb
    description: Hierarchical Token Bucket queuing
    layer: L2
  - @capability: cap.qos.sfq
    description: Stochastic Fair Queuing
    layer: L2
  - @capability: cap.qos.fq_codel
    description: Fair Queuing with CoDel
    layer: L2
