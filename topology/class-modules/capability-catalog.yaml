version: 2
schema: capability-catalog

# Capability Catalog - Central registry of all standard capabilities
# Namespace: cap.<domain>.<subdomain>.<capability>
# Vendor capabilities (vendor.*) are NOT registered here - they are documented in object modules

capabilities:

