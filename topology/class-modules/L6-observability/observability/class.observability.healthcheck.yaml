@class: class.observability.healthcheck
@title: Observability Healthcheck
@description: Health check definition for monitoring targets
@layer: L6
@version: 1.0.0

properties:
  required:
    - name
    - target_ref
    - check_type
  optional:
    - description
    - interval_seconds
    - timeout_seconds
    - expected_status

property_schemas:
  name:
    type: string
  target_ref:
    type: string
    format: instance_ref
    description: L1/L4/L5 instance to monitor
  check_type:
    type: string
    enum: [http, tcp, icmp, dns, custom]
  interval_seconds:
    type: integer
    default: 60
  timeout_seconds:
    type: integer
    default: 10
  expected_status:
    type: integer
    default: 200

required_capabilities: []
optional_capabilities:
  - cap.observability.healthcheck.http
  - cap.observability.healthcheck.tcp
