# MikroTik Management UI
# RouterOS WebFig interface

- id: svc-mikrotik-ui
  name: MikroTik WebFig
  type: web-ui
  ports:
    https: 443
    http: 80
    winbox: 8291
    api: 8728
    api_ssl: 8729
  protocol: https
  trust_zone_ref: management
  url: https://10.0.99.1
  description: MikroTik RouterOS WebFig management (HTTPS)
  critical: true
  data_asset_refs:
  - data-mikrotik-config
  security:
    https_redirect: true
    ssl_certificate: cert-mikrotik
    allowed_from:
    - net-lan
    - net-vpn-home
    - net-tailscale
    rate_limit:
      max_connections: 5
      per_seconds: 60
  security_policy_ref: sec-baseline
  runtime:
    type: baremetal
    target_ref: rtr-mikrotik
    network_binding_ref: net-management
