# LXC Data Services
# PostgreSQL and Redis running in Proxmox LXC containers

- id: svc-postgresql
  name: PostgreSQL Database
  type: database
  port: 5432
  protocol: tcp
  trust_zone_ref: servers
  description: PostgreSQL database server
  clients:
  - service_ref: svc-nextcloud
  databases:
  - name: nextcloud
    user: nextcloud
  - name: homelab
    user: app
  data_asset_refs:
  - data-postgresql-db
  - data-postgresql-dumps
  config:
    postgresql_version: '16'
    postgresql_listen_addresses: 10.0.30.10
    postgresql_databases:
    - name: nextcloud
    - name: homelab
    postgresql_users:
    - name: nextcloud
      password: '{{ vault_postgresql_nextcloud_password }}'
      database: nextcloud
    - name: app
      password: '{{ vault_postgresql_app_password }}'
      database: homelab
    postgresql_pg_hba:
    - type: host
      database: nextcloud
      user: nextcloud
      address: 10.0.30.50/32
      method: scram-sha-256
    - type: host
      database: all
      user: all
      address: 10.0.30.0/24
      method: scram-sha-256
  security_policy_ref: sec-baseline
  runtime:
    type: lxc
    target_ref: lxc-postgresql
    network_binding_ref: net-servers

- id: svc-redis
  name: Redis Cache
  type: cache
  port: 6379
  protocol: tcp
  trust_zone_ref: servers
  description: Redis cache server
  clients:
  - service_ref: svc-nextcloud
  data_asset_refs:
  - data-redis-db
  config:
    redis_port: 6379
    redis_bind: 10.0.30.20
    redis_maxmemory: 256mb
    redis_maxmemory_policy: allkeys-lru
  security_policy_ref: sec-baseline
  runtime:
    type: lxc
    target_ref: lxc-redis
    network_binding_ref: net-servers
