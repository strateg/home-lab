# L5 Application
# Part of Home Lab Topology v4.0.0
# Services, certificates, DNS
#
# Modular layout:
# - services/mikrotik/   - Edge router services (DNS, VPN, NTP, MQTT)
# - services/orangepi5/  - Application server (apps, monitoring stack)
# - services/proxmox/    - Hypervisor management
# - services/lxc/        - LXC workload services (databases)
# - dns/                 - DNS zones and records
# - certificates/        - TLS certificates
#
# Edit modules then regenerate: python3 topology-tools/regenerate-all.py

services: !include_dir_sorted L5-application/services
dns: !include L5-application/dns/zones.yaml
certificates: !include L5-application/certificates/certs.yaml
