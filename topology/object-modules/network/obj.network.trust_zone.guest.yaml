@object: obj.network.trust_zone.guest
@extends: class.network.trust_zone
@description: Isolated guest WiFi zone (internet only)
@version: 1.0.0

properties:
  name: Guest Zone
  security_level: 0
  color: "#999999"
  description: Guest WiFi (isolated, internet only)
  isolated: true
  reserved: true
  allowed_inbound:
    - established
  allowed_outbound:
    - to:untrusted

enabled_capabilities:
  - cap.zone.isolated
