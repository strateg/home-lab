@object: obj.network.vlan.management
@extends: class.network.vlan
@title: Network Vlan Management
@description: Management VLAN for infrastructure access
@layer: L2
@version: 1.0.0

properties:
  vlan_id: 99
  cidr: 10.0.99.0/24
  gateway: 10.0.99.1
  mtu: 1500
  dhcp_enabled: false
  dns_servers:
    - 192.168.88.1

enabled_capabilities:
  - cap.vlan.tagged
