@object: obj.network.wan_uplink
@extends: class.network.data_link
@title: Network WAN Uplink
@description: WAN uplink channel to external ISP or provider network
@layer: L2
@version: 1.0.0

properties:
  mtu: 1500
  qos_class: best_effort
  protocol_family: ethernet
  osi_layers: [2, 3]

instance_schema:
  required:
    - endpoint_a
    - external_endpoint
  properties:
    endpoint_a:
      type: object
      required: [device_ref, port]
      description: Local device interface
    external_endpoint:
      type: string
      description: External provider reference (ISP, ONT, etc.)
    negotiated_speed_mbps:
      type: integer
      minimum: 1
      maximum: 100000
    admin_state:
      type: string
      enum: [up, down]
      default: up
    role:
      type: string
      enum: [primary, backup, load_balance]
      default: primary

enabled_capabilities: []
