@object: obj.network.vlan.guest
@extends: class.network.vlan
@title: Network Vlan Guest
@description: Guest WiFi network (isolated, internet only)
@version: 1.0.0

properties:
  vlan_id: 20
  cidr: 192.168.20.0/24
  gateway: 192.168.20.1
  mtu: 1500
  dhcp_enabled: true
  dns_servers:
    - 1.1.1.1
    - 8.8.8.8

enabled_capabilities:
  - cap.vlan.tagged
