@object: obj.network.vlan.servers
@extends: class.network.vlan
@description: Server VLAN for Proxmox LXC and edge devices
@version: 1.0.0

properties:
  vlan_id: 30
  cidr: 10.0.30.0/24
  gateway: 10.0.30.1
  mtu: 1500
  dhcp_enabled: false
  dns_servers:
    - 192.168.88.1

enabled_capabilities:
  - cap.vlan.tagged
