@object: obj.network.vlan.servers
@extends: class.network.vlan
@title: Network Vlan Servers
@description: Server network for Proxmox LXC containers (Proxmox-internal, not MikroTik VLAN)
@version: 1.1.0

properties:
  # vlan_id is null because Servers zone is managed by Proxmox vmbr0 bridge directly,
  # not tagged through MikroTik. See ADR-0109 Section 1 "Out-of-scope".
  # ADR-0110: Canonical CIDR — all derived host IPs (vlan_ref + host) compute from this base.
  vlan_id: null
  cidr: 10.0.30.0/24
  gateway: 10.0.30.1
  mtu: 1500
  dhcp_enabled: false
  dns_servers:
    - 192.168.88.1

enabled_capabilities:
  - cap.vlan.tagged
