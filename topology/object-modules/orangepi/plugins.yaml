schema_version: 1
plugins:
  - id: object.orangepi.generator.bootstrap
    kind: generator
    entry: plugins/generators/bootstrap_orangepi_generator.py:BootstrapOrangePiGenerator
    api_version: "1.x"
    stages: [generate]
    phase: run
    order: 330
    migration_mode: migrating
    depends_on: []
    timeout: 30
    subinterpreter_compatible: true  # Jinja2 templates (ADR 0097 Wave 3)
    config:
      artifact_obsolete_action: warn
      # Bootstrap file mappings (ADR0078)
      bootstrap_files:
        - output_file: user-data.example
          template: bootstrap/user-data.example.j2
        - output_file: meta-data
          template: bootstrap/meta-data.j2
        - output_file: README.md
          template: bootstrap/readme.md.j2
    config_schema:
      type: object
      properties:
        artifact_obsolete_action:
          type: string
          enum: [retain, delete, warn]
          default: warn
          description: Action for stale files under generator output root (ADR0093 safe obsolete protocol).
        bootstrap_files:
          type: array
          description: Bootstrap file mappings for cloud-init directory.
          items:
            type: object
            properties:
              output_file:
                type: string
                description: Output filename relative to cloud-init root.
              template:
                type: string
                description: Template path relative to object template root.
            required: [output_file, template]
      required: []
    produces:
      - key: generated_dir
        scope: pipeline_shared
      - key: generated_files
        scope: pipeline_shared
      - key: bootstrap_orangepi_files
        scope: pipeline_shared
      - key: artifact_plan
        scope: pipeline_shared
      - key: artifact_generation_report
        scope: pipeline_shared
      - key: artifact_contract_files
        scope: pipeline_shared
    description: Emits baseline cloud-init bootstrap artifacts for Orange Pi nodes (Phase 6 bootstrap).
