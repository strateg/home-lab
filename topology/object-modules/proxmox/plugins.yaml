schema_version: 1
plugins:
  - id: base.generator.terraform_proxmox
    kind: generator
    entry: plugins/generators/terraform_proxmox_generator.py:TerraformProxmoxGenerator
    api_version: "1.x"
    stages: [generate]
    phase: run
    order: 210
    depends_on: []
    timeout: 30
    config:
      terraform_version: ">= 1.6.0"
      proxmox_provider_source: "bpg/proxmox"
      proxmox_provider_version: ">= 0.66.0"
      proxmox_api_url: ""
      terraform_remote_state:
        enabled: false
        backend: ""
        config: {}
      # Capability-driven template mappings (ADR0078)
      capability_templates:
        ceph:
          enabled_by: capabilities.has_ceph
          template: terraform/ceph.tf.j2
          output: ceph.tf
        ha:
          enabled_by: capabilities.has_ha
          template: terraform/ha.tf.j2
          output: ha.tf
        cloud_init:
          enabled_by: capabilities.has_cloud_init
          template: terraform/cloud-init.tf.j2
          output: cloud-init.tf
    config_schema:
      type: object
      properties:
        terraform_version:
          type: string
          description: Terraform CLI version constraint for versions.tf.
        proxmox_provider_source:
          type: string
          description: Terraform provider source address for Proxmox.
        proxmox_provider_version:
          type: string
          description: Terraform provider version constraint for Proxmox provider.
        proxmox_api_url:
          type: string
          description: Optional full Proxmox API endpoint URL override.
        terraform_remote_state:
          type: object
          description: Optional Terraform backend.tf generation for remote state.
          properties:
            enabled:
              type: boolean
              default: false
            backend:
              type: string
              description: Backend type (for example s3, pg, consul, http).
            config:
              type: object
              description: Backend key-value settings rendered into backend block.
              additionalProperties: true
          required: []
        capability_templates:
          type: object
          description: Capability-driven template mappings for conditional artifact generation.
          additionalProperties:
            type: object
            properties:
              enabled_by:
                type: string
                description: Capability expression evaluated against projection capabilities.
              template:
                type: string
                description: Template path relative to object template root.
              output:
                type: string
                description: Output filename for generated artifact.
            required: [enabled_by, template, output]
      required: []
    produces:
      - key: generated_dir
        scope: pipeline_shared
      - key: generated_files
        scope: pipeline_shared
      - key: terraform_proxmox_files
        scope: pipeline_shared
    description: Emits baseline Terraform artifacts for Proxmox from v5 projections (Phase 3 bootstrap).

  - id: base.generator.bootstrap_proxmox
    kind: generator
    entry: plugins/generators/bootstrap_proxmox_generator.py:BootstrapProxmoxGenerator
    api_version: "1.x"
    stages: [generate]
    phase: run
    order: 310
    depends_on: []
    timeout: 30
    config:
      # Bootstrap file mappings (ADR0078)
      bootstrap_files:
        - output_file: answer.toml.example
          template: bootstrap/answer.toml.example.j2
        - output_file: README.md
          template: bootstrap/readme.md.j2
      # Post-install README (ADR0078)
      post_install_readme:
        output_file: README.md
        template: bootstrap/post-install-readme.md.j2
      # Post-install script mappings (ADR0078)
      post_install_scripts:
        - output_file: "01-install-terraform.sh"
          template: bootstrap/script.sh.j2
          action: "Install Terraform runtime (placeholder)."
        - output_file: "02-install-ansible.sh"
          template: bootstrap/script.sh.j2
          action: "Install Ansible runtime (placeholder)."
        - output_file: "03-configure-storage.sh"
          template: bootstrap/script.sh.j2
          action: "Configure storage pools (placeholder)."
        - output_file: "04-configure-network.sh"
          template: bootstrap/script.sh.j2
          action: "Configure network bridge and VLANs (placeholder)."
        - output_file: "05-init-git-repo.sh"
          template: bootstrap/script.sh.j2
          action: "Initialize git workspace (placeholder)."
        - output_file: "06-enable-zswap.sh"
          template: bootstrap/script.sh.j2
          action: "Enable zswap tuning (placeholder)."
    config_schema:
      type: object
      properties:
        bootstrap_files:
          type: array
          description: Bootstrap file mappings for node root directory.
          items:
            type: object
            properties:
              output_file:
                type: string
                description: Output filename relative to node root.
              template:
                type: string
                description: Template path relative to object template root.
            required: [output_file, template]
        post_install_readme:
          type: object
          description: Post-install README file mapping (ADR0078).
          properties:
            output_file:
              type: string
              description: Output README filename relative to post-install directory.
            template:
              type: string
              description: Template path relative to object template root.
          required: [output_file, template]
        post_install_scripts:
          type: array
          description: Post-install script mappings.
          items:
            type: object
            properties:
              output_file:
                type: string
                description: Output script filename.
              template:
                type: string
                description: Template path relative to object template root.
              action:
                type: string
                description: Action description passed to template.
            required: [output_file, template]
      required: []
    produces:
      - key: generated_dir
        scope: pipeline_shared
      - key: generated_files
        scope: pipeline_shared
      - key: bootstrap_proxmox_files
        scope: pipeline_shared
    description: Emits baseline bootstrap artifacts for Proxmox nodes (Phase 6 bootstrap).
