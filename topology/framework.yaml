schema_version: 1
framework_id: infra-topology-framework
framework_api_version: 5.0.0
framework_release_channel: snapshot
supported_project_schema_range: ">=1.0.0 <2.0.0"

distribution:
  layout_version: 1
  include:
    - from: topology/framework.yaml
      to: framework.yaml
    - from: topology/class-modules
      to: topology/class-modules
    - from: topology/object-modules
      to: topology/object-modules
    - from: topology/layer-contract.yaml
      to: topology/layer-contract.yaml
    - from: topology/model.lock.yaml
      to: topology/model.lock.yaml
    - from: topology/profile-map.yaml
      to: topology/profile-map.yaml
    - from: topology-tools
      to: topology-tools
  exclude_globs:
    - "**/__pycache__/**"
    - "**/.pytest_cache/**"
    - "**/*.pyc"
    - "**/*.pyo"
    - "**/*.tmp"
    # Development-only assets (ADR 0081 §2.2)
    - "tests/**"
    - "acceptance-testing/**"
    - "adr/**"
    - "docs/**"
    - "archive/**"
    - "projects/**"
    - "scripts/**"
    - "configs/**"
    - "generated/**"
    - "build/**"
    - "dist/**"
    - "taskfiles/**"
    - "Taskfile.yml"
    - "pyproject.toml"
    - "requirements-dev.txt"
    - ".claude/**"
    - ".codex/**"
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".github/**"
    - ".idea/**"
    - ".pre-commit-config.yaml"
    - ".secrets.baseline"
    - ".gitattributes"
    - ".gitignore"
    - ".mypy_cache/**"
    - ".venv/**"
    - ".work/**"
    - "Заметки/**"
