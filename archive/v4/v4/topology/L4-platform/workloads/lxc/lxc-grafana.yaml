id: lxc-grafana
vmid: 205
name: grafana
device_ref: srv-gamayun
platform_type: lxc-unprivileged
resource_profile_ref: profile-mon-small
template_ref: tpl-lxc-debian
trust_zone_ref: servers-mon
description: Grafana observability dashboards
tags:
- monitoring
- production
boot:
  onboot: true
  startup_order: 30
storage:
  rootfs:
    storage_endpoint_ref: se-lvm
    size_gb: 8
networks:
- interface: eth0
  bridge_ref: bridge-vmbr0
  network_ref: net-servers
  gateway: 10.0.30.1
  firewall: false
  vlan_tag: 30
  ip: 10.0.30.60/24
dns:
  nameserver: 192.168.88.1
  searchdomain: home.local
os:
  type: debian
  version: '12'
cloudinit:
  enabled: true
  user: root
ansible:
  enabled: true
  playbook: grafana.yml
