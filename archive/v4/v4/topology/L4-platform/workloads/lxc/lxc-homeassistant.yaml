id: lxc-homeassistant
vmid: 204
name: home-assistant
device_ref: srv-gamayun
platform_type: lxc-unprivileged
resource_profile_ref: profile-app-small
template_ref: tpl-lxc-debian
trust_zone_ref: servers-app
description: Home Assistant home automation
tags:
- iot
- production
boot:
  onboot: true
  startup_order: 22
storage:
  rootfs:
    storage_endpoint_ref: se-lvm
    size_gb: 8
networks:
- interface: eth0
  bridge_ref: bridge-vmbr0
  network_ref: net-servers
  gateway: 10.0.30.1
  firewall: false
  vlan_tag: 30
  ip: 10.0.30.100/24
dns:
  nameserver: 192.168.88.1
  searchdomain: home.local
os:
  type: debian
  version: '12'
cloudinit:
  enabled: true
  user: root
ansible:
  enabled: true
  playbook: homeassistant.yml
