---
# WireGuard Gateway Role Defaults

# WireGuard interface configuration
wireguard:
  interface: wg0
  listen_port: 51820
  tunnel_ip: "10.100.0.2/30"
  role: server
  private_key_file: /etc/wireguard/private.key
  config_file: /etc/wireguard/wg0.conf

# Network interface for outbound traffic
primary_interface: ens3

# IP forwarding (required for gateway functionality)
ip_forwarding: true

# Peer list (should be overridden in host_vars)
wireguard_peers: []

# Networks to route and NAT
routed_networks: []

# iptables rules
iptables_forward_rules: []
iptables_nat_rules: []

# Packages to install
wireguard_packages:
  - wireguard
  - wireguard-tools
  - iptables-persistent
  - conntrack

# Service state
wireguard_service_enabled: true
wireguard_service_state: started
