---
# Monitoring stack role defaults

monitoring_stack_root: /opt/monitoring
monitoring_stack_owner: root
monitoring_stack_group: root

monitoring_prometheus_image: prom/prometheus:v2.53.0
monitoring_grafana_image: grafana/grafana:11.1.0
monitoring_loki_image: grafana/loki:3.1.0
monitoring_alertmanager_image: prom/alertmanager:v0.27.0

monitoring_prometheus_port: 9090
monitoring_grafana_port: 3000
monitoring_loki_port: 3100
monitoring_alertmanager_port: 9093

monitoring_grafana_admin_user: admin
monitoring_grafana_admin_password: changeme-grafana-admin

# Safety switch: render configs by default, apply containers only when explicitly enabled.
monitoring_apply: false
