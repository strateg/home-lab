---
# Ansible inventory for home-lab production environment
# Generated hosts should come from topology compiler
# This file contains manually managed cloud hosts

all:
  children:
    cloud:
      hosts:
        vps-oracle-frankfurt:
          # IP вычисляется динамически:
          #   - VPS_ORACLE_FRANKFURT_IP: публичный IP (для внешнего доступа)
          #   - VPS_TUNNEL_IP: IP через WireGuard туннель (10.100.0.2)
          # НЕ ХРАНИТЬ public IP статически - он может измениться при рестарте VPS
          ansible_host: "{{ lookup('env', 'VPS_ORACLE_FRANKFURT_IP') | default(lookup('env', 'VPS_TUNNEL_IP')) | default('10.100.0.2') }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: "{{ lookup('env', 'VPS_SSH_KEY_PATH') | default('/tmp/ansible-test/vps-key') }}"
          ansible_python_interpreter: /usr/bin/python3

    vpn_gateways:
      hosts:
        vps-oracle-frankfurt:
