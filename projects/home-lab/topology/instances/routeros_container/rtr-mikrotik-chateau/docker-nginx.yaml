@instance: docker-nginx
@extends: obj.routeros.container.generic
@group: routeros_container
@version: 1.3.0
source_id: docker-nginx
notes: RouterOS container (MikroTik runtime, not Docker Engine)
host_ref: rtr-mikrotik-chateau
network:
  interface: veth1
  # ADR 0111: derived from inst.bridge.containers cidr 172.18.0.0/24 -> 172.18.0.2/24
  bridge_ref: inst.bridge.containers
  host: 2
runtime:
  image: library/nginx:latest
  root_dir: /usb1/containers/nginx
  start_on_boot: true
nat_rules:
  - chain: dstnat
    protocol: tcp
    dst_port: 8080
    to_address: 172.18.0.2
    to_port: 80
    comment: External HTTP access to nginx container
