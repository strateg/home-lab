@instance: health-mikrotik
@extends: obj.observability.healthcheck.device
group: observability
@layer: L6
@version: 1.0.0
source_id: health-mikrotik
status: mapped
notes: MikroTik central router health monitoring

name: MikroTik Router Health
@description: Monitor MikroTik central router
target_ref: rtr-mikrotik-chateau
enabled: true
critical: true

checks:
  - type: ping
    timeout_ms: 1000
    packet_loss_threshold: 5
  - type: port
    ports: [80, 8443, 8291]
    protocol: tcp
  - type: snmp
    community: public
    oids:
      - name: cpu_load
        oid: 1.3.6.1.2.1.25.3.3.1.2
        warning_threshold: 70
        critical_threshold: 90
      - name: memory_usage
        oid: 1.3.6.1.2.1.25.2.3.1.6
        warning_threshold: 80
        critical_threshold: 95
      - name: temperature
        oid: 1.3.6.1.4.1.14988.1.1.3.10
        warning_threshold: 60
        critical_threshold: 75
  - type: api
    endpoint: /rest/system/resource
    auth: true
    expected_status: 200

interval: 30s
timeout: 10s

notification:
  on_warning: true
  on_critical: true
  channels:
    - channel-email
    - channel-telegram
