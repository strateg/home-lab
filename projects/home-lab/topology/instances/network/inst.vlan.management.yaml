@instance: inst.vlan.management
@extends: obj.network.vlan.management
@group: network
@version: 1.0.0
source_id: net-management
status: staged
notes: |
  Management VLAN (VLAN 99) for infrastructure admin access.
  Dual-homed: router accessible via 10.0.99.1 for SSH/WebFig/API.
  User zone devices access router services via 192.168.88.1 (DNS, DHCP).

trust_zone_ref: inst.trust_zone.management
managed_by_ref: rtr-mikrotik-chateau

ip_allocations:
  # Router is gateway for management VLAN
  - device_ref: rtr-mikrotik-chateau
    host: 1
    purpose: management gateway (SSH, WebFig, API)

  # Proxmox hypervisor management interface
  - device_ref: srv-gamayun
    host: 10
    purpose: hypervisor management UI

# MAC-based VLAN assignment: devices with these MACs auto-join management VLAN
# All other devices on the port stay in their default VLAN (e.g., user/lan)
mac_assignments:
  - mac: "AA:BB:CC:DD:EE:01"
    device_ref: laptop-admin
    comment: "Admin laptop - auto-assign to management VLAN"

  - mac: "AA:BB:CC:DD:EE:02"
    device_ref: workstation-admin
    comment: "Admin workstation"
