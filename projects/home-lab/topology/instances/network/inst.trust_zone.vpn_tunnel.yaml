@instance: inst.trust_zone.vpn_tunnel
@extends: obj.network.trust_zone.vpn_tunnel
@group: network
@version: 1.0.0
source_id: zone-vpn-tunnel
status: active
notes: |
  Trust zone for devices routed through VPN tunnels.
  Multiple VLANs can reference this zone with different tunnels:
  - inst.vlan.vpn_germany → wg-home-to-oci (Frankfurt)
  - (future) inst.vlan.vpn_usa → wg-home-to-usa
  - (future) inst.vlan.vpn_uk → wg-home-to-uk

zone_name: vpn-tunnel

# Firewall policy using zone/vlan refs (ADR-0111)
firewall_policy:
  # Allow outbound to internet (via VPN tunnel)
  outbound:
    - action: accept
      destination: untrusted
      comment: "Allow internet via VPN"

  # Allow established/related
  inbound:
    - action: accept
      state: [established, related]
      comment: "Allow return traffic"

  # Block access to internal zones (ADR-0110: isolation by zone refs)
  blocked_zone_refs:
    - inst.trust_zone.user
    - inst.trust_zone.guest
    - inst.trust_zone.iot
    - inst.trust_zone.servers
    - inst.trust_zone.management

  # Allow tunnel networks (all tunnels used by VLANs in this zone)
  # Resolved dynamically from VLANs with trust_zone_ref pointing here
  allow_tunnel_networks: true
