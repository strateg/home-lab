@instance: inst.vlan.lan
@extends: obj.network.vlan.lan
@group: network
@version: 1.0.0
source_id: net-lan
status: active
notes: |
  Main LAN (native VLAN 1 on bridge). User zone - security_level: 3.
  Router 192.168.88.1 provides user services (DNS, DHCP gateway).
  Admin access (SSH, WebFig) via management VLAN 10.0.99.1.
  Legacy network — devices will migrate to inst.vlan.user (192.168.10.0/24).

trust_zone_ref: inst.trust_zone.user
managed_by_ref: rtr-mikrotik-chateau
dhcp_range: 192.168.88.10-192.168.88.254

ip_allocations:
  - device_ref: rtr-mikrotik-chateau
    host: 1
    purpose: gateway, DNS, DHCP

reserved_ranges:
  - start: 192.168.88.1
    end: 192.168.88.9
    purpose: infrastructure
