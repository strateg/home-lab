@instance: inst.device.tv-sony-bravia
@extends: obj.device.smart_tv
@group: data-assets
@version: 1.0.0
source_id: tv-sony-bravia-aj9
status: planned
notes: |
  Sony Bravia AJ9 Android TV.
  Assigned to VPN Germany VLAN for German streaming services.

# Device identification
device_name: "Sony Bravia AJ9"
manufacturer: Sony
model: Bravia AJ9 (XR-55A90J)

# Network configuration
# MAC address stored in secrets/instances/tv-sony-bravia.yaml
secrets_ref: secrets.instances.tv-sony-bravia
connection_type: wifi

# Assign to VPN Germany VLAN
vlan_ref: inst.vlan.vpn_germany

# IP assignment (DHCP or static)
# ip_address: 192.168.50.10  # Uncomment for static IP

# Streaming services used
streaming_services:
  - netflix
  - youtube
  - amazon_prime
  - ard_mediathek
  - zdf_mediathek
  - arte

# Notes for deployment
deployment_notes: |
  MAC address stored in secrets/instances/tv-sony-bravia.yaml (SOPS/age encrypted).
  Current IP: 192.168.88.252 (default VLAN, before VLAN migration)

  To move to VPN VLAN:
  1. Create VLAN 50 on MikroTik bridge
  2. Option A: DHCP lease with MAC→VLAN binding
  3. Option B: Separate WiFi SSID for VLAN 50
