@instance: svc-loki
@extends: obj.service.loki
@group: services
@version: 1.0.0
source_id: svc-loki
status: mapped
notes: Loki centralized log aggregation (Docker on Orange Pi 5)

port: 3100
protocol: http
trust_zone_ref: inst.trust_zone.servers
@description: Centralized log aggregation

log_sources:
  - name: mikrotik
    type: syslog
  - name: proxmox
    type: promtail
  - name: srv-orangepi5
    type: promtail
  - name: docker
    type: docker-driver

runtime:
  type: docker
  target_ref: docker-loki
  network_binding_ref: inst.vlan.servers
  image: grafana/loki:latest
