@instance: svc-postgresql-germany
@extends: obj.service.postgresql
@group: services
@version: 1.0.0
source_id: svc-postgresql-germany
notes: |
  PostgreSQL on OCI Frankfurt for Germany geo-specific services.
  W7844 warning expected: VPS attaches to vpn_germany via WireGuard tunnel routing,
  not direct VLAN interface. Service listens on tunnel IP 10.100.0.2.

port: 5432
protocol: tcp
trust_zone_ref: inst.trust_zone.vpn_tunnel
@description: PostgreSQL database for geo-bypass services in Germany

runtime:
  type: vm
  target_ref: vps-oracle-frankfurt
  network_binding_ref: inst.vlan.vpn_germany

databases:
  - name: geoservices
    user: geoapp
    description: Germany-specific geo-bypass application data

config:
  postgresql_version: "16"
  postgresql_listen_addresses: "127.0.0.1,10.100.0.2"
  postgresql_max_connections: 20
  postgresql_shared_buffers: "128MB"
  postgresql_work_mem: "4MB"
  postgresql_maintenance_work_mem: "32MB"
  postgresql_effective_cache_size: "256MB"

# Resource constraints for OCI Free Tier (1GB RAM)
resource_limits:
  memory_mb: 256
  cpu_percent: 25
