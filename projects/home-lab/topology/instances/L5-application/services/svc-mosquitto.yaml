instance: svc-mosquitto
object_ref: obj.service.mosquitto
group: services
layer: L5
version: 1.0.0
source_id: svc-mosquitto
status: mapped
notes: Mosquitto MQTT broker for IoT devices (container on MikroTik)

ports:
  mqtt: 1883
  mqtt_tls: 8883
  websocket: 9001
protocol: tcp
trust_zone_ref: inst.trust_zone.iot
description: Mosquitto MQTT broker for IoT devices
optional: true

features:
  - MQTT 3.1.1 and 5.0 support
  - TLS encryption
  - WebSocket support
  - Persistent sessions
  - Topic-based ACL

clients:
  - network_ref: inst.vlan.iot
  - service_ref: svc-homeassistant@lxc.lxc-homeassistant

security:
  authentication: true
  tls_enabled: true
  allowed_from:
    - inst.vlan.iot
    - inst.vlan.servers

runtime:
  type: docker
  target_ref: rtr-mikrotik-chateau
  network_binding_ref: inst.vlan.lan
  image: eclipse-mosquitto:2
  resources:
    memory_mb: 20
    memory_limit_mb: 64
