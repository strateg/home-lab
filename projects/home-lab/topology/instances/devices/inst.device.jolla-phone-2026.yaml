@instance: inst.device.jolla-phone-2026
@extends: obj.device.smartphone
@group: devices
@version: 1.0.0
source_id: phone-jolla-jp2
status: planned
notes: |
  Jolla Phone 2026 (JP2) with Sailfish OS 5.2.0.13 Finnlayson.
  Day1 launch event device - 12GB/256GB configuration.
  Includes Android App Support 15 for running Android applications.
  Privacy-focused mobile computing with Privacy Switch, RGB LED, replaceable battery.
  Specifications verified from official Jolla store and community forum.

# Firmware and OS references (ADR0064)
firmware_ref: inst.firmware.jolla.jp2.arm64
os_refs:
- inst.os.sailfish.finnlayson.arm64.jolla

# Device identification
device_name: "Jolla Phone 2026"
manufacturer: Jolla
model: JP2

# Hardware specifications (verified from forum post and official store)
hardware:
  display:
    size_inches: 6.38
    technology: AMOLED
    resolution: 2272x1032
    ppi: 397
    diagonal_mm: 162
    dimensions_mm: [61.9, 149.9]
    aspect_ratio: "20:9"
    protection: Gorilla Glass
  cpu: Mediatek Dimensity 7100 5G (8-core, 4x Cortex-A55 @ 2000MHz, 4x Cortex-A78 @ 2400MHz)
  gpu: Mali-G610 MC2
  ram_gb: 12
  storage_gb: 256
  storage_expandable: true
  storage_max_tb: 2
  battery_mah: 5450
  battery_replaceable: true
  dimensions_mm: [158, 74.2, 9.4]
  camera_bump_mm: 14.3
  weight_g: 190
  charging:
    fast_charging_w: null
    wireless: false
  sensors:
    - fingerprint (power key)
    - accelerometer
    - gyroscope
    - proximity
    - compass
    - ambient_light

# Connectivity (verified from official specs)
connectivity:
  cellular:
    - 5G NR
    - 4G LTE
    - 3G UMTS
    - 2G GSM
  dual_sim: true
  sim_type: dual nano-SIM (two-sided single tray)
  esim: false
  wifi:
    - WiFi 6 (802.11ax)
    - 2.4GHz
    - 5GHz
  bluetooth: "5.4"
  nfc: true
  usb: USB-C
  audio_jack: false
  speakers: stereo
  location:
    - GPS
    - Galileo
    - GLONASS
    - BEIDOU

# Camera specifications (verified from official specs - Sony cameras)
cameras:
  rear:
    main:
      megapixels: 50
      brand: Sony
      aperture: f/1.8
    ultrawide:
      megapixels: 13
      brand: Sony
      aperture: f/2.2
  front:
    megapixels: 32
    aperture: f/2.4

# Operating System
operating_system:
  name: Sailfish OS
  version: 5.2.0.13
  codename: Finnlayson
  base: Linux 6.6 LTS
  ui: Silica (Qt 6.7)
  android_support:
    enabled: true
    version: Android 15
    runtime: Android AppSupport 15
    api_level: 35

# Software features
features:
  encryption: full_disk
  secure_boot: true
  bootloader_unlock: true
  root_access: developer_mode
  updates: ota
  privacy:
    - no_google_services
    - permission_control
    - vpn_built_in
    - tracker_blocking

# Network configuration
# WiFi MAC (wlan0), IMEI1, IMEI2 stored in secrets/instances/jolla-phone-2026.yaml
secrets_ref: secrets.instances.jolla-phone-2026
connection_type: wifi

# Dual-SIM configuration
dual_sim: true
sim_slots: 2

# VLAN assignment - VPN Germany VLAN (device connects to VPN-Germany SSID;
# MAC-based bridge host entry must match the SSID datapath VLAN 55)
vlan_ref: inst.vlan.vpn_germany

# DHCP (no static IP for mobile device)
static_ip: null

# Supported formats and capabilities
supported_formats:
  documents:
    - PDF
    - EPUB
    - TXT
    - DOC
    - DOCX
    - ODT
  images:
    - JPEG
    - PNG
    - WebP
    - HEIF
    - GIF
    - SVG
  video:
    - MP4
    - MKV
    - AVI
    - WebM
    - H.264
    - H.265/HEVC
    - VP9
    - AV1
  audio:
    - MP3
    - AAC
    - FLAC
    - OGG
    - WAV
    - Opus
