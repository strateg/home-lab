@instance: srv-orangepi5
@extends: obj.orangepi.rk3588.debian
@group: devices
@version: 1.1.0
source_id: srv-orangepi5
notes: ADR 0107 workload_defaults applied
firmware_ref: inst.firmware.uboot.generic.arm64
os_refs:
- inst.os.debian.12.arm64.edge
power:
  source_ref: pdu-rack
  max_watts: 20

# ADR 0087: Docker host capability declaration
# Inherited from obj.orangepi.rk3588.debian but explicit for validator visibility
# ADR 0107: Host-level workload defaults for Docker containers
workload_defaults:
  trust_zone_ref: inst.trust_zone.servers
  os_refs:
    - inst.os.debian.12.arm64.container_base
  network:
    network_ref: inst.vlan.servers
    gateway: 10.0.30.1

capabilities:
- cap.compute.runtime.container_host
- vendor.runtime.docker.host
