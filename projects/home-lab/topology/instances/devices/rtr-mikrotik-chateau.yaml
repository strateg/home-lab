@instance: rtr-mikrotik-chateau
@extends: obj.mikrotik.chateau_lte7_ax
@group: devices
@version: 1.1.0
source_id: rtr-mikrotik-chateau
notes: ADR 0107 workload_defaults applied; WireGuard tunnel to OCI VPS active
firmware_ref: inst.firmware.routeros.7.arm64
os_refs:
- inst.os.routeros.7.arm64
power:
  source_ref: ups-main
  mode: dc
  voltage_v: 24
  max_watts: 21.5
observed_runtime:
  captured_at: "2026-04-08"
  identity: rtr-mikrotik-chateau
  routeros_version: "7.22"
  # serial_number and software_id are in SOPS secrets (secrets/instances/rtr-mikrotik-chateau.yaml)
  wan:
    primary_interface: ether1
    backup_interface: lte1
    dhcp_client_on_primary: true
    dynamic_ip: 192.168.0.17/24
    interface_list_wan: [ether1, lte1]
  lan:
    bridge_interface: bridge
    bridge_admin_mac: "{{ secrets.mac_addresses.bridge }}"  # stored in secrets/instances/rtr-mikrotik-chateau.yaml
    bridge_vlan_filtering: true  # Required for WiFi VLAN tagging
    bridge_ports: [ether2, ether3, ether4, ether5, wifi1, wifi2]
    gateway_ref: inst.vlan.lan
    dhcp_server: defconf
    dhcp_pool: 192.168.88.10-192.168.88.254
    dhcp_lease_time: 30m
    interface_list_lan: [bridge]
  vpn_vlan:
    vlan_ref: inst.vlan.vpn_germany
    vlan_id: 55
    interface: vlan55
    cidr: 192.168.55.0/24
    gateway: 192.168.55.1
    dhcp_pool: 192.168.55.100-192.168.55.200
    routing_policy_ref: inst.routing_policy.vpn_germany
    status: active
  # ADR-0109: Zone-based network segmentation
  # VLAN ID = CIDR 3rd octet for user-facing zones
  vlans:
    user:
      vlan_ref: inst.vlan.user
      vlan_id: 10
      interface: vlan10
      cidr: 192.168.10.0/24
      gateway: 192.168.10.1
      dhcp_pool: 192.168.10.100-192.168.10.254
      trust_zone_ref: inst.trust_zone.user
      status: staged  # Phase 1: add interface
    guest:
      vlan_ref: inst.vlan.guest
      vlan_id: 20
      interface: vlan20
      cidr: 192.168.20.0/24
      gateway: 192.168.20.1
      dhcp_pool: 192.168.20.100-192.168.20.200
      trust_zone_ref: inst.trust_zone.guest
      isolated: true  # internet only
      status: staged
    iot:
      vlan_ref: inst.vlan.iot
      vlan_id: 30
      interface: vlan30
      cidr: 192.168.30.0/24
      gateway: 192.168.30.1
      dhcp_pool: 192.168.30.100-192.168.30.200
      trust_zone_ref: inst.trust_zone.iot
      isolated: true  # cannot initiate to user/management
      status: staged
  containers:
    bridge_interface: containers
    bridge_ip: 172.18.0.1/24
    veth_ports: [veth1]
    registry_url: https://registry-1.docker.io
    running:
      - name: nginx:latest
        image: library/nginx:latest
        interface: veth1
        root_dir: /usb1/containers/nginx
        start_on_boot: true
  wifi:
    wifi1:
      band: 5ghz-ax
      ssid: "Chateau*"
      mode: ap
      channel_width: 20/40/80mhz
      security: wpa2-psk
      datapath:
        name: dp-main-lan
        bridge: bridge
      status: running
    wifi2:
      band: 2.4ghz-ax
      ssid: "Chateau"
      mode: ap
      channel_width: 20/40mhz
      security: wpa2-psk
      datapath:
        name: dp-main-lan
        bridge: bridge
      status: running
    wifi_vpn_germany:
      name: wifi-vpn-germany
      master_interface: wifi1
      ssid: "VPN-Germany"
      mode: ap
      security: wpa2-psk
      vlan_id: 55
      datapath:
        name: dp-vpn-germany
        bridge: bridge
        vlan_id: 55
      # MAC whitelist - only these devices can connect to VPN-Germany
      # Access-list is bound to this interface only (not global)
      access_list:
        mode: whitelist  # only MACs in list can connect
        interface_binding: true  # rules apply only to this SSID
        devices_refs:
          - inst.device.boox_go103_lumi      # BOOX e-reader
          - inst.device.laptop_katana        # Laptop KATANA WiFi
          - inst.device.tv_sony_bravia       # Sony Bravia AJ9
      status: bound
    # ADR-0109: Guest WiFi — VLAN 20, isolated (internet only)
    wifi_guest:
      name: wifi-guest
      master_interface: wifi1
      ssid: "Guest"
      mode: ap
      security: wpa2-psk
      vlan_id: 20
      datapath:
        name: dp-guest
        bridge: bridge
        vlan_id: 20
      status: staged  # Phase 2: add SSID after VLANs configured
    # ADR-0109: IoT WiFi — VLAN 30, isolated (no access to user/management)
    wifi_iot:
      name: wifi-iot
      master_interface: wifi2  # 2.4GHz for better IoT compatibility
      ssid: "IoT"
      mode: ap
      security: wpa2-psk
      vlan_id: 30
      datapath:
        name: dp-iot
        bridge: bridge
        vlan_id: 30
      status: staged
  dns:
    servers: [1.1.1.1, 8.8.8.8]
    dynamic_servers: [85.253.0.130, 85.253.0.2]
    allow_remote_requests: true
    cache_size_kib: 2048
    static_entries:
      - name: router.lan
        address: 192.168.88.1
  nat:
    - chain: srcnat
      action: masquerade
      out_interface: ether1
    - chain: dstnat
      action: dst-nat
      protocol: tcp
      dst_port: 8080
      to_addresses: 172.18.0.2
      to_ports: 80
  firewall:
    input_rules: 5
    forward_rules: 12
    notes: defconf + 3 duplicated topology-managed rules (12-17)
    # ADR-0109: Zone-based inter-zone policies (deny-by-default)
    zone_policies:
      # Guest isolation — internet only, deny all internal zones
      - from: guest
        to: [user, iot, servers, management]
        action: drop
        log: true
        comment: Guest cannot access internal networks
      # IoT isolation — cannot initiate to user or management
      - from: iot
        to: [user, management]
        action: drop
        log: true
        comment: IoT isolated from user and management
      # User cannot access management plane
      - from: user
        to: management
        action: drop
        log: true
        comment: User cannot access management zone
      # VPN tunnel isolation — internet only via WireGuard
      - from: vpn_tunnel
        to: [user, iot, guest, servers, management]
        action: drop
        log: true
        comment: VPN tunnel isolated from all internal zones
      # Allow established/related return traffic (implicit, but explicit for clarity)
      - from: any
        to: any
        state: [established, related]
        action: accept
        comment: Allow established and related connections
  wireguard:
    configured: true
    interfaces:
      - name: wg0
        listen_port: null  # Client mode, no listen port
        tunnel_ref: inst.tunnel.wg-home-to-oci
        tunnel_ip: 10.100.0.1/30
        persistent_keepalive: 25
  services:
    webfig_http_port: 80
    webfig_https_enabled: true
    ssh_port: 22
    api_port: 8728
    api_ssl_port: 8729
  users:
    - name: admin
      group: full

# ADR 0107: Host-level workload defaults for RouterOS containers
# Note: RouterOS containers don't require os_refs - they run OCI images directly
workload_defaults:
  trust_zone_ref: inst.trust_zone.lan
  network:
    bridge_ref: inst.bridge.containers
    gateway: 172.18.0.1

# RouterOS v7 container support (MikroTik container package, not Docker Engine)
capabilities:
- cap.compute.runtime.container_host
- vendor.runtime.routeros.container
