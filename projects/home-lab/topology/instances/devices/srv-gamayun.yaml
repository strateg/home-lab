@instance: srv-gamayun
@extends: obj.proxmox.ve
@group: devices
@version: 1.1.0
source_id: srv-gamayun
status: mapped
notes: ADR 0107 workload_defaults applied
firmware_ref: inst.firmware.uefi.generic.x86_64
os_refs:
- inst.os.proxmox.ve.9
power:
  source_ref: pdu-rack
  max_watts: 65

# ADR 0107: Host-level workload defaults for LXC/VM instances
workload_defaults:
  trust_zone_ref: inst.trust_zone.servers
  os_refs:
    - inst.os.debian.12.proxmox.lxc
  network:
    interface: eth0
    bridge_ref: inst.bridge.vmbr0
    vlan_ref: inst.vlan.servers
    gateway: 10.0.30.1
    firewall: false
  dns:
    nameserver: 192.168.88.1
    searchdomain: home.local
  storage:
    default_pool_ref: inst.storage.pool.local_lvm
  cloudinit:
    enabled: true
  ansible:
    enabled: true
  boot:
    onboot: true
