@instance: lxc-redis
@extends: obj.proxmox.lxc.debian12.redis
@group: lxc
@version: 1.1.0
source_id: lxc-redis
notes: Redis Cache Server

vmid: 201
hostname: redis-cache
@description: Redis Cache Server
tags:
  - cache
  - production

host_ref: srv-gamayun

os_refs:
  - inst.os.debian.12.proxmox.lxc

# Instance-specific overrides (inherits rest from host via @on)
resource_profile_ref: rp.lxc.micro

boot:
  startup_order: 11

storage:
  rootfs:
    size_gb: 4
  volumes:
    - mount_path: /var/lib/redis
      pool_ref: inst.storage.pool.local_lvm
      size_gb: 4
      data_asset_ref: inst.data_asset.redis

network:
  vlan_ref: inst.vlan.servers
  host: 20

cloudinit:
  user: redis

ansible:
  playbook: redis.yml
