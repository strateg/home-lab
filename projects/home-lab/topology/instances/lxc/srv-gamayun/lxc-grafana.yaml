@instance: lxc-grafana
@extends: obj.proxmox.lxc.debian12.grafana
@group: lxc
@version: 1.0.0
source_id: lxc-grafana
status: mapped
notes: Grafana observability dashboards

vmid: 205
hostname: grafana
@description: Grafana observability dashboards
tags:
  - monitoring
  - production

host_ref: srv-gamayun
trust_zone_ref: inst.trust_zone.servers

os_refs:
  - inst.os.debian.12.proxmox.lxc

resource_profile_ref: rp.lxc.small

boot:
  onboot: true
  startup_order: 30

storage:
  rootfs:
    pool_ref: inst.storage.pool.local_lvm
    size_gb: 8

network:
  interface: eth0
  bridge_ref: inst.bridge.vmbr0
  vlan_ref: inst.vlan.servers
  ip: 10.0.30.60/24
  gateway: 10.0.30.1
  firewall: false

dns:
  nameserver: 192.168.88.1
  searchdomain: home.local

cloudinit:
  enabled: true
  user: root

ansible:
  enabled: true
  playbook: grafana.yml
