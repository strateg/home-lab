@instance: alert-app.service-down
@extends: obj.observability.alert.application
group: observability
@version: 1.0.0
source_id: alert-app.service-down
status: mapped
notes: Critical alert for service failure

name: Critical Service Down
@description: A critical service is not running
severity: critical

trigger:
  condition: service_status != running
  service_refs:
    - svc-postgresql
    - svc-redis
    - svc-nextcloud@lxc.lxc-nextcloud
    - svc-adguard
  duration: 2m

channels:
  - channel-email
  - channel-telegram

escalation:
  enabled: true
  delay: 5m
