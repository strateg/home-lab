@instance: alert-infra.router-down
@extends: obj.observability.alert.infrastructure
@group: observability
@version: 1.0.0
source_id: alert-infra.router-down
status: mapped
notes: Critical alert for router failure

name: Router Down
@description: MikroTik router is unreachable
severity: critical

trigger:
  condition: ping_failed
  healthcheck_ref: health-mikrotik
  duration: 1m

channels:
  - channel-email
  - channel-telegram

escalation:
  enabled: true
  delay: 5m
