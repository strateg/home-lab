@instance: alert-power.ups-battery
@extends: obj.observability.alert.power
@group: observability
@version: 1.0.0
source_id: alert-power.ups-battery
status: mapped
notes: Warning alert for power outage

name: UPS On Battery
@description: Power outage - UPS on battery
severity: warning

trigger:
  condition: ups_status == OB
  healthcheck_ref: health-ups

channels:
  - channel-email
  - channel-telegram
