version: "3"

tasks:
  adr-consistency:
    desc: Validate ADR metadata/title consistency
    cmds:
      - "{{.PYTHON}} v4/topology-tools/check-adr-consistency.py --strict-titles"

  lint:
    desc: Run formatting/linting checks (black + isort)
    cmds:
      - "black --check ."
      - "isort --check-only ."

  typecheck:
    desc: Run mypy static checks
    cmds:
      - "mypy --config-file pyproject.toml v4/topology-tools"

  pylint:
    desc: Run pylint checks
    cmds:
      - "pylint v4/topology-tools"

  quality:
    desc: Aggregate local quality gate (ADR + lint + typecheck + pylint)
    deps:
      - adr-consistency
      - lint
      - typecheck
      - pylint

  v4:
    desc: Validate v4 lane
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py validate-v4"

  v5:
    desc: Validate v5 lane (default secrets mode)
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py validate-v5"

  v5-passthrough:
    desc: Validate v5 lane in passthrough secrets mode
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py validate-v5"

  v5-layers:
    desc: Validate v5 layer contract only
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py validate-v5-layers"

  phase1-gate:
    desc: Run archived phase1 migration gate
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py phase1-gate"

