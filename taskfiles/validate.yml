version: "3"

tasks:
  workspace-layout:
    desc: Validate root workspace layout (no legacy v4/v5 roots)
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"

  lint:
    desc: Run formatting/linting checks (black + isort)
    cmds:
      - "{{.PYTHON}} -m black --check ."
      - "{{.PYTHON}} -m isort --check-only ."

  typecheck:
    desc: Run mypy static checks
    cmds:
      - "{{.PYTHON}} -m mypy --config-file pyproject.toml topology-tools"

  pylint:
    desc: Run pylint checks
    cmds:
      - "{{.PYTHON}} -m pylint topology-tools"

  quality:
    desc: Aggregate quality gate
    deps:
      - lint

  default:
    desc: Validate topology lane (passthrough secrets mode)
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - task workspace-layout
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5"

  # Alias for CI workflows that reference v5-passthrough explicitly
  v5-passthrough:
    desc: Alias for validate:default
    deps:
      - default

  v5-layers:
    desc: Validate layer contract only
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5-layers"

  phase1-gate:
    desc: Run phase1 migration gate
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py phase1-gate"
