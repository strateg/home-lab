version: "3"

tasks:
  repo-hygiene:
    desc: Validate changed files against repository boundary hygiene policy
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_repo_hygiene.py"

  workspace-layout:
    desc: Validate root workspace layout (no legacy version roots)
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"

  lint:
    desc: Run formatting/linting checks (black + isort)
    cmds:
      - "{{.PYTHON}} -m black --check topology topology-tools scripts tests projects"
      - "{{.PYTHON}} -m isort --check-only topology topology-tools scripts tests projects"

  typecheck:
    desc: Run mypy static checks
    cmds:
      - "{{.PYTHON}} -m mypy --config-file pyproject.toml topology-tools"

  pylint:
    desc: Run pylint checks
    cmds:
      - "{{.PYTHON}} -m pylint --errors-only topology-tools"

  quality-fast:
    desc: Fast quality gate (lint only)
    deps:
      - lint

  quality-full:
    desc: Full quality gate (lint + typecheck + pylint + plugin manifests + agent rules)
    deps:
      - lint
      - typecheck
      - pylint
      - plugin-manifests
      - module-index
      - module-growth
      - adr-consistency
      - adr0083-reactivation
      - agent-rules

  quality:
    desc: Aggregate quality gate (alias to validate:quality-fast)
    deps:
      - quality-fast

  quality-default:
    desc: Default quality gate (root-layout, fast profile)
    deps:
      - quality-fast

  quality-legacy-v4:
    desc: Legacy v4 quality lane (archive reference; non-default)
    cmds:
      - "{{.PYTHON}} -c \"print('legacy v4 quality hooks are archived; run archive/v4 quality checks manually when needed')\""

  default:
    desc: Validate topology lane (passthrough secrets mode)
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_repo_hygiene.py"
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"
      - "{{.PYTHON}} scripts/validation/validate_module_index.py"
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5"

  passthrough:
    desc: Validate topology lane with explicit passthrough secrets mode (no env var required)
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_repo_hygiene.py"
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"
      - "{{.PYTHON}} scripts/validation/validate_module_index.py"
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5-passthrough"

  inject:
    desc: Validate topology lane with explicit inject secrets mode
    env:
      V5_SECRETS_MODE: inject
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_repo_hygiene.py"
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"
      - "{{.PYTHON}} scripts/validation/validate_module_index.py"
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5"

  topology:
    desc: Alias for validate:default
    deps:
      - default

  v5:
    desc: Deprecated alias for validate:default
    deps:
      - default

  v5-passthrough:
    desc: Deprecated alias for validate:passthrough
    deps:
      - passthrough

  layers:
    desc: Validate layer contract only
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py validate-v5-layers"

  phase1-gate:
    desc: Run phase1 migration gate
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py phase1-gate"

  plugin-manifests:
    desc: Validate plugin manifests schema and entry paths across base/class/object manifests
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_plugin_manifests.py"

  module-index:
    desc: Validate topology/module-index.yaml consistency against class/object plugin manifests
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_module_index.py"

  module-growth:
    desc: Report ADR0082 module growth metrics (non-blocking)
    cmds:
      - "{{.PYTHON}} scripts/validation/report_module_growth.py --output-json build/diagnostics/module-growth.json"

  module-growth-gate:
    desc: Enforce ADR0082 module growth trigger threshold (>15 active manifests)
    cmds:
      - "{{.PYTHON}} scripts/validation/report_module_growth.py --active-module-threshold 15 --fail-on-threshold --output-json build/diagnostics/module-growth.json"

  adr0047-trigger:
    desc: Report ADR0047 observability trigger metrics (alerts/services growth)
    cmds:
      - "{{.PYTHON}} scripts/validation/report_adr0047_trigger.py --project-id home-lab --output-json build/diagnostics/adr0047-trigger.json"

  adr0047-trigger-gate:
    desc: Enforce ADR0047 trigger gate (alerts>50 or services>30)
    cmds:
      - "{{.PYTHON}} scripts/validation/report_adr0047_trigger.py --project-id home-lab --alerts-threshold 50 --services-threshold 30 --fail-on-trigger --output-json build/diagnostics/adr0047-trigger.json"

  adr-consistency:
    desc: Validate ADR register/file consistency (strict titles, no symmetry gate)
    cmds:
      - "{{.PYTHON}} scripts/validation/check_adr_consistency.py --adr-dir adr --register adr/REGISTER.md --strict-titles"

  adr0083-reactivation:
    desc: Report ADR0083 reactivation readiness snapshot
    cmds:
      - "{{.PYTHON}} scripts/validation/report_adr0083_reactivation.py --project-id home-lab --output-json build/diagnostics/adr0083-reactivation.json"

  adr0083-reactivation-gate:
    desc: Enforce ADR0083 reactivation readiness gate (non-hardware checks only)
    cmds:
      - "{{.PYTHON}} scripts/validation/report_adr0083_reactivation.py --project-id home-lab --fail-on-not-ready --output-json build/diagnostics/adr0083-reactivation.json"

  adr0083-reactivation-evidence:
    desc: Render ADR0083 reactivation evidence markdown from diagnostics snapshots
    cmds:
      - "{{.PYTHON}} scripts/validation/render_adr0083_reactivation_evidence.py {{if .BUNDLE}}--bundle {{.BUNDLE}}{{end}} --output-md build/diagnostics/adr0083-reactivation-evidence.md"

  inspect-smoke:
    desc: Run inspection smoke matrix and fail on command regressions
    cmds:
      - "{{.PYTHON}} scripts/inspection/run_inspect_smoke_matrix.py {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}} {{if .QUERY}}--query '{{.QUERY}}'{{end}} {{if .INSTANCE}}--instance {{.INSTANCE}}{{end}} --json-output build/diagnostics/inspect-smoke-matrix.json --text-output build/diagnostics/inspect-smoke-matrix.txt {{if .DOT_OUTPUT}}--dot-output {{.DOT_OUTPUT}}{{end}}"

  typed-shadow-report:
    desc: Generate typed-shadow diagnostics report artifacts
    cmds:
      - "{{.PYTHON}} scripts/inspection/generate_typed_shadow_report.py {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} --json-output build/diagnostics/typed-shadow-report.json --text-output build/diagnostics/typed-shadow-report.txt {{if .MIN_COVERAGE}}--min-coverage {{.MIN_COVERAGE}}{{end}} {{if .MAX_GENERIC_SHARE}}--max-generic-share {{.MAX_GENERIC_SHARE}}{{end}}"

  typed-shadow-gate:
    desc: Enforce typed-shadow threshold gate on current effective topology
    cmds:
      - "{{.PYTHON}} scripts/inspection/generate_typed_shadow_report.py --fail-on-threshold {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} --json-output build/diagnostics/typed-shadow-report.json --text-output build/diagnostics/typed-shadow-report.txt {{if .MIN_COVERAGE}}--min-coverage {{.MIN_COVERAGE}}{{end}} {{if .MAX_GENERIC_SHARE}}--max-generic-share {{.MAX_GENERIC_SHARE}}{{end}}"

  typed-shadow-readiness:
    desc: Report typed-shadow promotion readiness gates (G1..G5)
    cmds:
      - "{{.PYTHON}} scripts/inspection/report_typed_shadow_promotion_readiness.py {{if .TYPED_SHADOW_REPORT}}--typed-shadow-report {{.TYPED_SHADOW_REPORT}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} --output-json build/diagnostics/typed-shadow-promotion-readiness.json --output-text build/diagnostics/typed-shadow-promotion-readiness.txt"

  typed-shadow-readiness-gate:
    desc: Enforce typed-shadow promotion readiness gate (fail when any G1..G5 gate is not ready)
    cmds:
      - "{{.PYTHON}} scripts/inspection/report_typed_shadow_promotion_readiness.py --fail-on-not-ready {{if .TYPED_SHADOW_REPORT}}--typed-shadow-report {{.TYPED_SHADOW_REPORT}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} --output-json build/diagnostics/typed-shadow-promotion-readiness.json --output-text build/diagnostics/typed-shadow-promotion-readiness.txt"

  ai-usage-metrics:
    desc: Generate opt-in ADR0094 AI usage metrics from local audit logs
    cmds:
      - "{{.PYTHON}} scripts/validation/report_ai_usage_metrics.py --project-id home-lab --output-json build/diagnostics/ai-usage-metrics.json"

  agent-rules:
    desc: Validate AI agent rulebook consistency per ADR0096
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_agent_rules.py --output-json build/diagnostics/agent-rules.json"

  agent-rules-strict:
    desc: Validate AI agent rulebook with strict mode (fail on warnings)
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_agent_rules.py --fail-on-warnings --output-json build/diagnostics/agent-rules.json"

  agent-rule-coverage:
    desc: Generate ADR0096 ADR-to-rule reverse coverage report
    cmds:
      - "{{.PYTHON}} scripts/validation/report_adr_rule_coverage.py --output-json build/diagnostics/agent-rule-coverage.json"

  agent-rule-mcp-export:
    desc: Export ADR0096 rulebook assets as an MCP-style resource catalog
    cmds:
      - "{{.PYTHON}} scripts/validation/export_agent_rulebook_mcp_resources.py --output-json build/diagnostics/agent-rule-mcp-resources.json"

  agent-rule-mcp-server:
    desc: Smoke-check ADR0096 MCP stdio resource server
    cmds:
      - "{{.PYTHON}} scripts/orchestration/mcp/agent_rulebook_mcp_server.py --check"
