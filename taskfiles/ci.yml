version: "3"

tasks:
  local:
    desc: Local pre-push gate
    deps:
      - :validate:quality
      - :framework:strict
      - :validate:default
      - :validate:phase1-gate
      - :test:default

  local-with-legacy:
    desc: Local pre-push gate including legacy parity lanes
    cmds:
      - task ci:local
      - task acceptance:tests-all
      - task ci:topology-parity-v4-v5

  python-checks-core:
    desc: Core strict checks used by python-checks workflow
    deps:
      - :framework:strict
      - :validate:default

  lane-v5:
    desc: Lane validation core via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:default

  topology-mainline:
    desc: Topology matrix strict mainline via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:default
      - :validate:phase1-gate

  topology-parity-v4-v5:
    desc: Topology parity lane against archive v4 baseline
    deps:
      - :framework:strict
      - :framework:archive-v4-compile
      - :validate:default
      - :test:parity-v4-v5
