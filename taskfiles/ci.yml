version: "3"

tasks:
  local:
    desc: Local pre-push gate
    deps:
      - :validate:quality
      - :framework:strict
      - :validate:v5-passthrough
      - :validate:phase1-gate
      - :test:v5

  python-checks-core:
    desc: Core strict checks used by python-checks workflow
    deps:
      - :framework:strict
      - :validate:v5-passthrough

  lane-v5-inject:
    desc: Lane validation core via task (inject mode)
    deps:
      - :framework:strict
      - :validate:v5

  lane-v5-passthrough:
    desc: Lane validation core via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:v5-passthrough

  topology-mainline-inject:
    desc: Topology matrix strict mainline via task (inject mode)
    deps:
      - :framework:strict
      - :validate:v5
      - :validate:phase1-gate

  topology-mainline-passthrough:
    desc: Topology matrix strict mainline via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:v5-passthrough
      - :validate:phase1-gate
