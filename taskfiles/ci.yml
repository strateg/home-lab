version: "3"

tasks:
  local:
    desc: Local pre-push gate
    deps:
      - :validate:quality
      - :framework:strict
      - :validate:default
      - :validate:phase1-gate
      - :test:default

  python-checks-core:
    desc: Core strict checks used by python-checks workflow
    deps:
      - :framework:strict
      - :validate:default

  lane-v5:
    desc: Lane validation core via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:default

  topology-mainline:
    desc: Topology matrix strict mainline via task (passthrough mode)
    deps:
      - :framework:strict
      - :validate:default
      - :validate:phase1-gate
