version: "3"

tasks:
  _strict-validate-core:
    internal: true
    desc: Internal core chain (clean + strict + validate)
    cmds:
      - task validate:repo-hygiene
      - task build:clean-generated
      - task validate:adr-consistency
      - task validate:module-growth
      - task validate:adr0047-trigger
      - task validate:adr0083-reactivation
      - task validate:adr0083-reactivation-evidence
      - task framework:strict
      - task ci:phase13-gate
      - task validate:default
      - task test:ai-redaction

  _strict-validate-core-inject:
    internal: true
    desc: Internal core chain (clean + strict + validate inject)
    cmds:
      - task validate:repo-hygiene
      - task build:clean-generated
      - task validate:adr-consistency
      - task validate:module-growth
      - task validate:adr0047-trigger
      - task validate:adr0083-reactivation
      - task validate:adr0083-reactivation-evidence
      - task framework:strict
      - task ci:phase13-gate
      - task validate:inject

  phase13-gate:
    desc: Phase13 extraction safety gate (evidence + go/no-go decision)
    cmds:
      - task framework:phase13-evidence
      - task framework:phase13-go-no-go

  _strict-validate-phase1:
    internal: true
    desc: Internal strict/validate chain with phase1 gate
    cmds:
      - task: _strict-validate-core
      - task validate:phase1-gate

  local:
    desc: Local pre-push gate
    cmds:
      - task validate:quality-fast
      - task: _strict-validate-phase1
      - task test:default

  local-with-legacy:
    desc: Local pre-push gate including legacy parity lanes
    cmds:
      - task ci:local
      - task acceptance:tests-all
      - task ci:topology-parity-v4-current

  python-checks-core:
    desc: Core strict checks used by python-checks workflow
    cmds:
      - task: _strict-validate-core

  lane:
    desc: Lane validation core via task (inject mode)
    cmds:
      - task: _strict-validate-core-inject

  topology-mainline:
    desc: Topology matrix strict mainline via task (inject mode)
    cmds:
      - task: _strict-validate-core-inject
      - task validate:phase1-gate

  topology-parity-v4-current:
    desc: Topology parity lane against archive v4 baseline
    cmds:
      - task: _strict-validate-core
      - task framework:archive-v4-compile
      - task test:parity-v4-current

  legacy-maintenance:
    desc: Legacy v4 maintenance lane (archive parity + acceptance baseline)
    cmds:
      - task build:clean-generated
      - task validate:workspace-layout
      - task framework:audit-entrypoints
      - task acceptance:tests-all
      - task ci:topology-parity-v4-current
