version: "3"

vars:
  PROJECT_ID: '{{default "home-lab" .PROJECT_ID}}'
  ENV: '{{default "production" .ENV}}'
  # Generated playbooks (ADR 0104)
  PLAYBOOK_ROOT: "generated/{{.PROJECT_ID}}/ansible/playbooks"
  # Static roles remain in projects/
  PROJECT_ANSIBLE_ROOT: "projects/{{.PROJECT_ID}}/ansible"
  # Cloud hosts connection params
  CLOUD_HOSTS_INVENTORY: "projects/{{.PROJECT_ID}}/ansible/inventory/production/cloud-hosts.yml"
  # Generated host_vars
  GENERATED_HOST_VARS: "generated/{{.PROJECT_ID}}/ansible/inventory/production/host_vars"
  INVENTORY_RUNTIME: "generated/{{.PROJECT_ID}}/ansible/runtime/{{.ENV}}/hosts.yml"
  ANSIBLE_PLAYBOOK:
    sh: |
      if [ -f .venv/bin/ansible-playbook ]; then echo ".venv/bin/ansible-playbook"
      elif [ -f .venv/Scripts/ansible-playbook.exe ]; then echo ".venv/Scripts/ansible-playbook.exe"
      elif command -v ansible-playbook >/dev/null 2>&1; then echo "ansible-playbook"
      else echo "ansible-playbook"
      fi
  ANSIBLE_GALAXY:
    sh: |
      if [ -f .venv/bin/ansible-galaxy ]; then echo ".venv/bin/ansible-galaxy"
      elif [ -f .venv/Scripts/ansible-galaxy.exe ]; then echo ".venv/Scripts/ansible-galaxy.exe"
      elif command -v ansible-galaxy >/dev/null 2>&1; then echo "ansible-galaxy"
      else echo "ansible-galaxy"
      fi

tasks:
  _run-playbook:
    internal: true
    desc: Internal helper to execute one playbook with common checks/config
    preconditions:
      - sh: "{{.ANSIBLE_PLAYBOOK}} --version >/dev/null 2>&1"
        msg: "ansible-playbook CLI is unavailable in current shell. Use Linux/WSL Ansible runtime and retry."
    env:
      ANSIBLE_CONFIG: "{{.PROJECT_ANSIBLE_ROOT}}/ansible.cfg"
    cmds:
      - "{{.ANSIBLE_PLAYBOOK}} -i {{.INVENTORY_RUNTIME}} {{.PLAYBOOK_ROOT}}/{{.PLAYBOOK_NAME}}.yml {{default \"\" .PLAYBOOK_ARGS}}"

  install-collections:
    desc: Install required Ansible collections for project service roles
    preconditions:
      - sh: "{{.ANSIBLE_GALAXY}} --version >/dev/null 2>&1"
        msg: "ansible-galaxy CLI is unavailable in current shell. Use Linux/WSL Ansible runtime and retry."
    cmds:
      - "{{.ANSIBLE_GALAXY}} collection install -r projects/{{.PROJECT_ID}}/ansible/requirements.yml"

  runtime:
    desc: Assemble Ansible runtime inventory (generated + overrides)
    cmds:
      - "{{.PYTHON}} topology-tools/assemble-ansible-runtime.py --topology topology/topology.yaml --project {{.PROJECT_ID}} --env {{.ENV}}"

  runtime-inject:
    desc: Assemble Ansible runtime inventory with decrypted SOPS secrets injection
    cmds:
      - "{{.PYTHON}} topology-tools/assemble-ansible-runtime.py --topology topology/topology.yaml --project {{.PROJECT_ID}} --env {{.ENV}} --inject-secrets"

  syntax:
    desc: Syntax-check integrated service playbooks
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "site"
          PLAYBOOK_ARGS: "--syntax-check"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "postgresql"
          PLAYBOOK_ARGS: "--syntax-check"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "redis"
          PLAYBOOK_ARGS: "--syntax-check"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "nextcloud"
          PLAYBOOK_ARGS: "--syntax-check"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "monitoring"
          PLAYBOOK_ARGS: "--syntax-check"

  check-site:
    desc: Run integrated service stack in Ansible check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "site"
          PLAYBOOK_ARGS: "--check"

  check-site-inject:
    desc: Run integrated service stack in check mode with runtime secret injection
    deps:
      - runtime-inject
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "site"
          PLAYBOOK_ARGS: "--check"

  check-postgresql:
    desc: Run PostgreSQL playbook in Ansible check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "postgresql"
          PLAYBOOK_ARGS: "--check"

  check-redis:
    desc: Run Redis playbook in Ansible check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "redis"
          PLAYBOOK_ARGS: "--check"

  check-nextcloud:
    desc: Run Nextcloud playbook in Ansible check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "nextcloud"
          PLAYBOOK_ARGS: "--check"

  check-monitoring:
    desc: Run monitoring stack playbook in Ansible check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "monitoring"
          PLAYBOOK_ARGS: "--check"

  apply-site:
    desc: Apply integrated service stack playbook
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "site"

  apply-site-inject:
    desc: Apply integrated service stack with runtime secret injection
    deps:
      - runtime-inject
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "site"

  # =========================================================================
  # ADR 0104: Capability-Driven Role Playbooks
  # =========================================================================

  role-syntax:
    desc: Syntax-check all capability-driven role playbooks (common, docker_host, etc.)
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "common"
          PLAYBOOK_ARGS: "--syntax-check"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "docker_host"
          PLAYBOOK_ARGS: "--syntax-check"

  role-check:
    desc: Run all capability-driven role playbooks in check mode
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "common"
          PLAYBOOK_ARGS: "--check --diff"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "docker_host"
          PLAYBOOK_ARGS: "--check --diff"

  role-check-common:
    desc: Run common role playbook in check mode (cap.role.linux_host)
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "common"
          PLAYBOOK_ARGS: "--check --diff"

  role-check-docker:
    desc: Run docker_host role playbook in check mode (cap.compute.runtime.container_host)
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "docker_host"
          PLAYBOOK_ARGS: "--check --diff"

  role-apply:
    desc: Apply all capability-driven role playbooks
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "common"
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "docker_host"

  role-apply-common:
    desc: Apply common role playbook (cap.role.linux_host)
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "common"

  role-apply-docker:
    desc: Apply docker_host role playbook (cap.compute.runtime.container_host)
    deps:
      - runtime
    cmds:
      - task: _run-playbook
        vars:
          PLAYBOOK_NAME: "docker_host"
