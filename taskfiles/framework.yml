version: "3"

vars:
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'

tasks:
  lock-refresh:
    desc: Regenerate framework.lock for active project in topology manifest
    cmds:
      - "{{.PYTHON}} topology-tools/generate-framework-lock.py --topology topology/topology.yaml --force"

  verify-lock:
    desc: Verify framework.lock in strict mode
    cmds:
      - "{{.PYTHON}} topology-tools/verify-framework-lock.py --strict"

  verify-lock-package-trust:
    desc: Verify framework.lock in strict mode with enforced package trust field quality
    cmds:
      - "{{.PYTHON}} topology-tools/verify-framework-lock.py --strict --enforce-package-trust"

  compile:
    desc: Compile topology with strict model lock and passthrough secrets
    cmds:
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough"

  rollback-rehearsal:
    desc: Rehearse framework lock rollback path
    cmds:
      - "{{.PYTHON}} topology-tools/utils/rehearse-framework-rollback.py"

  compatibility-matrix:
    desc: Validate framework/project compatibility matrix
    cmds:
      - "{{.PYTHON}} topology-tools/utils/validate-framework-compatibility-matrix.py"

  audit-entrypoints:
    desc: Audit strict runtime entrypoints
    cmds:
      - "{{.PYTHON}} topology-tools/utils/audit-strict-runtime-entrypoints.py"

  cutover-readiness-quick:
    desc: Generate quick cutover readiness report (strict gates only)
    cmds:
      - "{{.PYTHON}} topology-tools/utils/cutover-readiness-report.py --quick"

  cutover-readiness:
    desc: Generate full cutover readiness report (includes v4/v5 parity + v5 test suite)
    cmds:
      - "{{.PYTHON}} topology-tools/utils/cutover-readiness-report.py"

  deploy-bundle-create:
    desc: Create immutable deploy bundle from generated artifacts
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/bundle.py create --repo-root . --project-id {{.PROJECT_ID}} {{if .GENERATED_ROOT}}--generated-root {{.GENERATED_ROOT}}{{end}} {{if .BUNDLES_ROOT}}--bundles-root {{.BUNDLES_ROOT}}{{end}} {{if .INJECT_SECRETS}}--inject-secrets{{end}} {{if .SECRETS_ROOT}}--secrets-root {{.SECRETS_ROOT}}{{end}}"

  deploy-bundle-list:
    desc: List available deploy bundles
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/bundle.py list --repo-root . {{if .BUNDLES_ROOT}}--bundles-root {{.BUNDLES_ROOT}}{{end}}"

  deploy-bundle-inspect:
    desc: Inspect deploy bundle metadata/checksums (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/bundle.py inspect --repo-root . --bundle {{.BUNDLE}} {{if .BUNDLES_ROOT}}--bundles-root {{.BUNDLES_ROOT}}{{end}} {{if .SKIP_CHECKSUMS}}--skip-checksums{{end}}"

  deploy-bundle-delete:
    desc: Delete deploy bundle (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/bundle.py delete --repo-root . --bundle {{.BUNDLE}} {{if .BUNDLES_ROOT}}--bundles-root {{.BUNDLES_ROOT}}{{end}}"

  deploy-docker-toolchain-build:
    desc: Build Docker toolchain image for deploy runner (optional DOCKER_IMAGE=<tag>)
    cmds:
      - "docker build -f docker/Dockerfile.toolchain -t {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} docker"

  deploy-docker-toolchain-smoke:
    desc: Smoke-check Docker toolchain image for terraform/ansible availability
    cmds:
      - "docker run --rm {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} terraform version"
      - "docker run --rm {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} ansible-playbook --version"

  deploy-init-status:
    desc: Show ADR0083 init-node scaffold state summary
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} --status"

  deploy-init-node-plan:
    desc: Plan init-node action for one node (requires BUNDLE=<bundle_id>, NODE=<node_id>)
    requires:
      vars:
        - BUNDLE
        - NODE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} --bundle {{.BUNDLE}} --node {{.NODE}} --plan-only {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .RESET}}--reset{{end}} {{if .CONFIRM_RESET}}--confirm-reset{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  deploy-init-all-pending-plan:
    desc: Plan init-node action for all pending nodes (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} --bundle {{.BUNDLE}} --all-pending --plan-only {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  deploy-init-node-run:
    desc: Execute init-node action for one node (requires BUNDLE=<bundle_id>, NODE=<node_id>)
    requires:
      vars:
        - BUNDLE
        - NODE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} --bundle {{.BUNDLE}} --node {{.NODE}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .RESET}}--reset{{end}} {{if .CONFIRM_RESET}}--confirm-reset{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  deploy-init-all-pending-run:
    desc: Execute init-node action for all pending nodes (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} --bundle {{.BUNDLE}} --all-pending {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  service-chain-evidence-dry:
    desc: Execute dry service-chain lane and write evidence report
    cmds:
      - "{{.PYTHON}} topology-tools/utils/record-service-chain-evidence.py --mode dry --project-id {{.PROJECT_ID}} --env production {{if .BUNDLE}}--bundle {{.BUNDLE}}{{end}} {{if .CONTINUE_ON_FAILURE}}--continue-on-failure{{end}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}--ansible-via-wsl{{end}} {{if .BOOTSTRAP_INIT_NODE}}--bootstrap-init-node{{end}} {{if .BOOTSTRAP_NODE}}--bootstrap-node {{.BOOTSTRAP_NODE}}{{end}} {{if .BOOTSTRAP_RUNNER}}--bootstrap-runner {{.BOOTSTRAP_RUNNER}}{{end}}"

  service-chain-evidence-check:
    desc: Execute maintenance-check service-chain lane and write evidence report
    cmds:
      - "{{.PYTHON}} topology-tools/utils/record-service-chain-evidence.py --mode maintenance-check --project-id {{.PROJECT_ID}} --env production {{if .BUNDLE}}--bundle {{.BUNDLE}}{{end}} {{if .CONTINUE_ON_FAILURE}}--continue-on-failure{{end}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}--ansible-via-wsl{{end}} {{if .INJECT_SECRETS}}--inject-secrets{{end}} {{if .PROXMOX_BACKEND_CONFIG}}--proxmox-backend-config {{.PROXMOX_BACKEND_CONFIG}}{{end}} {{if .MIKROTIK_BACKEND_CONFIG}}--mikrotik-backend-config {{.MIKROTIK_BACKEND_CONFIG}}{{end}} {{if .PROXMOX_VAR_FILE}}--proxmox-var-file {{.PROXMOX_VAR_FILE}}{{end}} {{if .MIKROTIK_VAR_FILE}}--mikrotik-var-file {{.MIKROTIK_VAR_FILE}}{{end}} {{if .BOOTSTRAP_INIT_NODE}}--bootstrap-init-node{{end}} {{if .BOOTSTRAP_NODE}}--bootstrap-node {{.BOOTSTRAP_NODE}}{{end}} {{if .BOOTSTRAP_RUNNER}}--bootstrap-runner {{.BOOTSTRAP_RUNNER}}{{end}}"

  service-chain-evidence-apply:
    desc: Execute maintenance-apply service-chain lane and write evidence report (requires ALLOW_APPLY=YES)
    requires:
      vars:
        - ALLOW_APPLY
    preconditions:
      - sh: 'test "{{.ALLOW_APPLY}}" = "YES"'
        msg: "Set ALLOW_APPLY=YES to run maintenance-apply evidence lane."
    cmds:
      - "{{.PYTHON}} topology-tools/utils/record-service-chain-evidence.py --mode maintenance-apply --allow-apply --project-id {{.PROJECT_ID}} --env production {{if .BUNDLE}}--bundle {{.BUNDLE}}{{end}} {{if .CONTINUE_ON_FAILURE}}--continue-on-failure{{end}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}--ansible-via-wsl{{end}} {{if .TERRAFORM_AUTO_APPROVE}}--terraform-auto-approve{{end}} {{if .INJECT_SECRETS}}--inject-secrets{{end}} {{if .PROXMOX_BACKEND_CONFIG}}--proxmox-backend-config {{.PROXMOX_BACKEND_CONFIG}}{{end}} {{if .MIKROTIK_BACKEND_CONFIG}}--mikrotik-backend-config {{.MIKROTIK_BACKEND_CONFIG}}{{end}} {{if .PROXMOX_VAR_FILE}}--proxmox-var-file {{.PROXMOX_VAR_FILE}}{{end}} {{if .MIKROTIK_VAR_FILE}}--mikrotik-var-file {{.MIKROTIK_VAR_FILE}}{{end}} {{if .BOOTSTRAP_INIT_NODE}}--bootstrap-init-node{{end}} {{if .BOOTSTRAP_NODE}}--bootstrap-node {{.BOOTSTRAP_NODE}}{{end}} {{if .BOOTSTRAP_RUNNER}}--bootstrap-runner {{.BOOTSTRAP_RUNNER}}{{end}}"

  service-chain-evidence-dry-bundle:
    desc: Execute dry service-chain lane in strict bundle mode (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task framework:service-chain-evidence-dry BUNDLE={{.BUNDLE}} {{if .CONTINUE_ON_FAILURE}}CONTINUE_ON_FAILURE={{.CONTINUE_ON_FAILURE}}{{end}} {{if .DEPLOY_RUNNER}}DEPLOY_RUNNER={{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}ANSIBLE_VIA_WSL={{.ANSIBLE_VIA_WSL}}{{end}}

  service-chain-evidence-check-bundle:
    desc: Execute maintenance-check service-chain lane in strict bundle mode (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task framework:service-chain-evidence-check BUNDLE={{.BUNDLE}} {{if .CONTINUE_ON_FAILURE}}CONTINUE_ON_FAILURE={{.CONTINUE_ON_FAILURE}}{{end}} {{if .DEPLOY_RUNNER}}DEPLOY_RUNNER={{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}ANSIBLE_VIA_WSL={{.ANSIBLE_VIA_WSL}}{{end}} {{if .INJECT_SECRETS}}INJECT_SECRETS={{.INJECT_SECRETS}}{{end}} {{if .PROXMOX_BACKEND_CONFIG}}PROXMOX_BACKEND_CONFIG={{.PROXMOX_BACKEND_CONFIG}}{{end}} {{if .MIKROTIK_BACKEND_CONFIG}}MIKROTIK_BACKEND_CONFIG={{.MIKROTIK_BACKEND_CONFIG}}{{end}} {{if .PROXMOX_VAR_FILE}}PROXMOX_VAR_FILE={{.PROXMOX_VAR_FILE}}{{end}} {{if .MIKROTIK_VAR_FILE}}MIKROTIK_VAR_FILE={{.MIKROTIK_VAR_FILE}}{{end}}

  service-chain-evidence-apply-bundle:
    desc: Execute maintenance-apply service-chain lane in strict bundle mode (requires ALLOW_APPLY=YES, BUNDLE=<bundle_id>)
    requires:
      vars:
        - ALLOW_APPLY
        - BUNDLE
    preconditions:
      - sh: 'test "{{.ALLOW_APPLY}}" = "YES"'
        msg: "Set ALLOW_APPLY=YES to run maintenance-apply evidence lane."
    cmds:
      - task framework:service-chain-evidence-apply ALLOW_APPLY={{.ALLOW_APPLY}} BUNDLE={{.BUNDLE}} {{if .CONTINUE_ON_FAILURE}}CONTINUE_ON_FAILURE={{.CONTINUE_ON_FAILURE}}{{end}} {{if .DEPLOY_RUNNER}}DEPLOY_RUNNER={{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}ANSIBLE_VIA_WSL={{.ANSIBLE_VIA_WSL}}{{end}} {{if .TERRAFORM_AUTO_APPROVE}}TERRAFORM_AUTO_APPROVE={{.TERRAFORM_AUTO_APPROVE}}{{end}} {{if .INJECT_SECRETS}}INJECT_SECRETS={{.INJECT_SECRETS}}{{end}} {{if .PROXMOX_BACKEND_CONFIG}}PROXMOX_BACKEND_CONFIG={{.PROXMOX_BACKEND_CONFIG}}{{end}} {{if .MIKROTIK_BACKEND_CONFIG}}MIKROTIK_BACKEND_CONFIG={{.MIKROTIK_BACKEND_CONFIG}}{{end}} {{if .PROXMOX_VAR_FILE}}PROXMOX_VAR_FILE={{.PROXMOX_VAR_FILE}}{{end}} {{if .MIKROTIK_VAR_FILE}}MIKROTIK_VAR_FILE={{.MIKROTIK_VAR_FILE}}{{end}}

  archive-v4-compile:
    desc: Compile legacy archive/v4 baseline for parity drift monitoring
    cmds:
      - "{{.PYTHON}} archive/v4/topology-tools/compile-topology.py --topology archive/v4/topology.yaml --output-json build/diagnostics/v4-archive-effective.json --diagnostics-json build/diagnostics/v4-archive-diagnostics.json --diagnostics-txt build/diagnostics/v4-archive-diagnostics.txt"

  adr0078-ownership:
    desc: Verify ADR0078 object-generator/template ownership boundaries
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_contract/test_object_generator_ownership.py -q"

  strict:
    desc: Run ADR0076 strict framework gates
    deps:
      - verify-lock
      - rollback-rehearsal
      - compatibility-matrix
      - audit-entrypoints

  release-tests:
    desc: Run framework-focused release test suite
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_api tests/plugin_contract tests/plugin_integration/test_framework_lock.py tests/plugin_integration/test_build_framework_distribution.py tests/plugin_integration/test_extract_framework_worktree.py tests/plugin_integration/test_extract_framework_history.py tests/plugin_integration/test_generator_base.py tests/plugin_integration/test_terraform_mikrotik_generator.py tests/plugin_integration/test_terraform_proxmox_generator.py tests/plugin_integration/test_bootstrap_generators.py tests/plugin_integration/test_generator_projection_contract.py tests/plugin_integration/test_generator_template_and_publish_contract.py tests/plugin_integration/test_module_manifest_discovery.py tests/plugin_integration/test_strict_runtime_entrypoint_audit.py tests/plugin_integration/test_docs_projection_modules.py tests/plugin_integration/test_docs_generator.py tests/plugin_integration/test_docs_generator_determinism.py tests/plugin_integration/test_diagram_generator.py tests/plugin_integration/test_icon_manager.py tests/test_mermaid_render_validation.py tests/test_cutover_readiness_report.py tests/test_root_layout_docs_contract.py tests/test_agent_instruction_sync.py tests/test_strict_profile_placeholder_contract.py tests/test_l4_lxc_resource_profile_contract.py tests/test_service_chain_evidence_plan.py tests/test_ansible_service_playbook_contract.py -q"

  release-ci:
    desc: Run release CI parity gate (strict + framework-focused tests)
    deps:
      - strict
      - release-tests

  release-preflight:
    desc: Run local v5-only release preflight (lock refresh + strict + validate:v5-passthrough + framework-focused tests)
    cmds:
      - task framework:lock-refresh
      - task framework:adr0078-ownership
      - task framework:release-ci
      - task validate:v5-passthrough

  release-build:
    desc: Build framework distribution archives for release
    requires:
      vars:
        - FRAMEWORK_VERSION
    cmds:
      - "{{.PYTHON}} topology-tools/utils/build-framework-distribution.py --repo-root . --framework-manifest topology/framework.yaml --output-root {{.FRAMEWORK_DIST_OUTPUT}} --version {{.FRAMEWORK_VERSION}} --archive-format both"

  release-bootstrap:
    desc: Bootstrap standalone infra-topology-framework repository candidate
    cmds:
      - "{{.PYTHON}} topology-tools/utils/bootstrap-framework-repo.py --repo-root . --output-root {{.FRAMEWORK_BOOTSTRAP_OUTPUT}} --include-tests --preserve-history --force"

  release-candidate:
    desc: Prepare full framework release candidate bundle (preflight + dist + bootstrap)
    requires:
      vars:
        - FRAMEWORK_VERSION
    deps:
      - release-preflight
      - release-build
      - release-bootstrap
