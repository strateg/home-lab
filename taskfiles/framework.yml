version: "3"

vars:
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "v5-dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "v5-build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'

tasks:
  verify-lock:
    desc: Verify framework.lock in strict mode
    cmds:
      - "{{.PYTHON}} v5/topology-tools/verify-framework-lock.py --strict"

  compile:
    desc: Compile topology with strict model lock and passthrough secrets
    cmds:
      - "{{.PYTHON}} v5/topology-tools/compile-topology.py --topology v5/topology/topology.yaml --strict-model-lock --secrets-mode passthrough"

  rollback-rehearsal:
    desc: Rehearse framework lock rollback path
    cmds:
      - "{{.PYTHON}} v5/topology-tools/rehearse-framework-rollback.py"

  compatibility-matrix:
    desc: Validate framework/project compatibility matrix
    cmds:
      - "{{.PYTHON}} v5/topology-tools/validate-framework-compatibility-matrix.py"

  audit-entrypoints:
    desc: Audit strict runtime entrypoints
    cmds:
      - "{{.PYTHON}} v5/topology-tools/audit-strict-runtime-entrypoints.py"

  strict:
    desc: Run ADR0076 strict framework gates
    deps:
      - verify-lock
      - rollback-rehearsal
      - compatibility-matrix
      - audit-entrypoints

  release-tests:
    desc: Run framework-focused release test suite
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v5/tests/plugin_api v5/tests/plugin_contract v5/tests/plugin_integration/test_framework_lock.py v5/tests/plugin_integration/test_build_framework_distribution.py v5/tests/plugin_integration/test_extract_framework_worktree.py v5/tests/plugin_integration/test_extract_framework_history.py v5/tests/plugin_integration/test_generator_base.py -q"

  release-ci:
    desc: Run release CI parity gate (strict + framework-focused tests)
    deps:
      - strict
      - release-tests

  release-preflight:
    desc: Run local v5-only release preflight (strict + validate:v5-passthrough + framework-focused tests)
    deps:
      - release-ci
      - :validate:v5-passthrough

  release-build:
    desc: Build framework distribution archives for release
    requires:
      vars:
        - FRAMEWORK_VERSION
    cmds:
      - "{{.PYTHON}} v5/topology-tools/build-framework-distribution.py --repo-root . --framework-manifest v5/topology/framework.yaml --output-root {{.FRAMEWORK_DIST_OUTPUT}} --version {{.FRAMEWORK_VERSION}} --archive-format both"

  release-bootstrap:
    desc: Bootstrap standalone infra-topology-framework repository candidate
    cmds:
      - "{{.PYTHON}} v5/topology-tools/bootstrap-framework-repo.py --repo-root . --output-root {{.FRAMEWORK_BOOTSTRAP_OUTPUT}} --include-tests --preserve-history --force"

  release-candidate:
    desc: Prepare full framework release candidate bundle (preflight + dist + bootstrap)
    requires:
      vars:
        - FRAMEWORK_VERSION
    deps:
      - release-preflight
      - release-build
      - release-bootstrap

