version: "3"

vars:
  FRAMEWORK_VERSION: '{{.FRAMEWORK_VERSION}}'
  FRAMEWORK_DIST_OUTPUT: '{{default "dist/framework" .FRAMEWORK_DIST_OUTPUT}}'
  FRAMEWORK_BOOTSTRAP_OUTPUT: '{{default "build/infra-topology-framework-bootstrap" .FRAMEWORK_BOOTSTRAP_OUTPUT}}'

tasks:
  lock-refresh:
    desc: Regenerate framework.lock for active project in topology manifest
    cmds:
      - "{{.PYTHON}} topology-tools/generate-framework-lock.py --topology topology/topology.yaml --force"

  verify-lock:
    desc: Verify framework.lock in strict mode
    cmds:
      - "{{.PYTHON}} topology-tools/verify-framework-lock.py --strict"

  compile:
    desc: Compile topology with strict model lock and passthrough secrets
    cmds:
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough"

  rollback-rehearsal:
    desc: Rehearse framework lock rollback path
    cmds:
      - "{{.PYTHON}} topology-tools/rehearse-framework-rollback.py"

  compatibility-matrix:
    desc: Validate framework/project compatibility matrix
    cmds:
      - "{{.PYTHON}} topology-tools/validate-framework-compatibility-matrix.py"

  audit-entrypoints:
    desc: Audit strict runtime entrypoints
    cmds:
      - "{{.PYTHON}} topology-tools/audit-strict-runtime-entrypoints.py"

  cutover-readiness-quick:
    desc: Generate quick cutover readiness report (strict gates only)
    cmds:
      - "{{.PYTHON}} topology-tools/cutover-readiness-report.py --quick"

  cutover-readiness:
    desc: Generate full cutover readiness report (includes v4/v5 parity + v5 test suite)
    cmds:
      - "{{.PYTHON}} topology-tools/cutover-readiness-report.py"

  archive-v4-compile:
    desc: Compile legacy archive/v4 baseline for parity drift monitoring
    cmds:
      - "{{.PYTHON}} archive/v4/topology-tools/compile-topology.py --topology archive/v4/topology.yaml --output-json build/diagnostics/v4-archive-effective.json --diagnostics-json build/diagnostics/v4-archive-diagnostics.json --diagnostics-txt build/diagnostics/v4-archive-diagnostics.txt"

  adr0078-ownership:
    desc: Verify ADR0078 object-generator/template ownership boundaries
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_contract/test_object_generator_ownership.py -q"

  strict:
    desc: Run ADR0076 strict framework gates
    deps:
      - verify-lock
      - rollback-rehearsal
      - compatibility-matrix
      - audit-entrypoints

  release-tests:
    desc: Run framework-focused release test suite
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_api tests/plugin_contract tests/plugin_integration/test_framework_lock.py tests/plugin_integration/test_build_framework_distribution.py tests/plugin_integration/test_extract_framework_worktree.py tests/plugin_integration/test_extract_framework_history.py tests/plugin_integration/test_generator_base.py tests/plugin_integration/test_terraform_mikrotik_generator.py tests/plugin_integration/test_terraform_proxmox_generator.py tests/plugin_integration/test_bootstrap_generators.py tests/plugin_integration/test_generator_projection_contract.py tests/plugin_integration/test_generator_template_and_publish_contract.py tests/plugin_integration/test_module_manifest_discovery.py tests/plugin_integration/test_strict_runtime_entrypoint_audit.py tests/plugin_integration/test_docs_projection_modules.py tests/plugin_integration/test_docs_generator.py tests/plugin_integration/test_docs_generator_determinism.py tests/plugin_integration/test_diagram_generator.py tests/plugin_integration/test_icon_manager.py tests/test_mermaid_render_validation.py tests/test_cutover_readiness_report.py tests/test_root_layout_docs_contract.py tests/test_agent_instruction_sync.py tests/test_strict_profile_placeholder_contract.py -q"

  release-ci:
    desc: Run release CI parity gate (strict + framework-focused tests)
    deps:
      - strict
      - release-tests

  release-preflight:
    desc: Run local v5-only release preflight (lock refresh + strict + validate:v5-passthrough + framework-focused tests)
    cmds:
      - task framework:lock-refresh
      - task framework:adr0078-ownership
      - task framework:release-ci
      - task validate:v5-passthrough

  release-build:
    desc: Build framework distribution archives for release
    requires:
      vars:
        - FRAMEWORK_VERSION
    cmds:
      - "{{.PYTHON}} topology-tools/build-framework-distribution.py --repo-root . --framework-manifest topology/framework.yaml --output-root {{.FRAMEWORK_DIST_OUTPUT}} --version {{.FRAMEWORK_VERSION}} --archive-format both"

  release-bootstrap:
    desc: Bootstrap standalone infra-topology-framework repository candidate
    cmds:
      - "{{.PYTHON}} topology-tools/bootstrap-framework-repo.py --repo-root . --output-root {{.FRAMEWORK_BOOTSTRAP_OUTPUT}} --include-tests --preserve-history --force"

  release-candidate:
    desc: Prepare full framework release candidate bundle (preflight + dist + bootstrap)
    requires:
      vars:
        - FRAMEWORK_VERSION
    deps:
      - release-preflight
      - release-build
      - release-bootstrap
