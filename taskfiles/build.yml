version: "3"

tasks:
  v4:
    desc: Build v4 lane artifacts (legacy compatibility)
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py build-v4"

  v5:
    desc: Build v5 lane artifacts (default)
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py build-v5"

  v5-passthrough:
    desc: Build v5 lane artifacts in passthrough secrets mode (no decrypt required)
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - "{{.PYTHON}} v5/scripts/orchestration/lane.py build-v5"

  v5-docs:
    desc: Generate v5 docs artifacts via compile pipeline in passthrough secrets mode
    cmds:
      - "{{.PYTHON}} v5/topology-tools/compile-topology.py --topology v5/topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root v5-generated"

  phase1-bootstrap:
    desc: Refresh phase1 migration bootstrap map
    cmds:
      - "{{.PYTHON}} topology-tools/bootstrap-phase1-mapping.py --refresh-effective"

  phase1-reconcile:
    desc: Reconcile phase1 mapping
    cmds:
      - "{{.PYTHON}} scripts/phase1/reconcile_phase1_mapping.py"

  phase1-backlog:
    desc: Refresh phase1 backlog report
    cmds:
      - "{{.PYTHON}} scripts/phase1/refresh_phase1_backlog.py"

  phase4-sync-lock:
    desc: Sync v5 model lock
    cmds:
      - "{{.PYTHON}} scripts/model/sync_v5_model_lock.py"

  phase4-export:
    desc: Export v5 instance bindings (legacy migration helper)
    cmds:
      - "{{.PYTHON}} scripts/model/export_v5_instance_bindings.py"
