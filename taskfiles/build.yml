version: "3"

tasks:
  default:
    desc: Build lane artifacts
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py build-v5"

  v5-passthrough:
    desc: Build v5 lane artifacts in passthrough secrets mode (no decrypt required)
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - "{{.PYTHON}} scripts/orchestration/lane.py build-v5"

  v5-docs:
    desc: Generate v5 docs + diagram artifacts (passthrough mode, plain diagrams)
    cmds:
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  v5-docs-icons:
    desc: Generate v5 docs + diagram artifacts with Mermaid icon-nodes (requires si/mdi packs)
    env:
      V5_DIAGRAM_ICON_MODE: icon-nodes
    cmds:
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  v5-docs-compat:
    desc: Generate v5 docs + diagram artifacts in Mermaid compat mode (no icon-node syntax)
    env:
      V5_DIAGRAM_ICON_MODE: compat
    cmds:
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  phase1-bootstrap:
    desc: Refresh phase1 migration bootstrap map
    cmds:
      - "{{.PYTHON}} topology-tools/bootstrap-phase1-mapping.py --refresh-effective"

  phase1-reconcile:
    desc: Reconcile phase1 mapping
    cmds:
      - "{{.PYTHON}} scripts/phase1/reconcile_phase1_mapping.py"

  phase1-backlog:
    desc: Refresh phase1 backlog report
    cmds:
      - "{{.PYTHON}} scripts/phase1/refresh_phase1_backlog.py"

  sync-lock:
    desc: Sync model lock
    cmds:
      - "{{.PYTHON}} scripts/model/sync_v5_model_lock.py"

  export-bindings:
    desc: Export instance bindings
    cmds:
      - "{{.PYTHON}} scripts/model/export_v5_instance_bindings.py"
