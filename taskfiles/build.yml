version: "3"

tasks:
  clean-generated:
    desc: Clean generated/runtime artifact folders (mvn clean equivalent)
    cmds:
      - "{{.PYTHON}} scripts/maintenance/clean_generated_artifacts.py"

  clean-generated-dry:
    desc: Preview generated/runtime artifact cleanup
    cmds:
      - "{{.PYTHON}} scripts/maintenance/clean_generated_artifacts.py --dry-run"

  default:
    desc: Build lane artifacts (passthrough secrets mode)
    env:
      V5_SECRETS_MODE: passthrough
    cmds:
      - task build:clean-generated
      - "{{.PYTHON}} scripts/orchestration/lane.py build-v5"

  v5-docs:
    desc: Generate v5 docs + diagram artifacts (passthrough mode, plain diagrams)
    cmds:
      - task build:clean-generated
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  v5-docs-icons:
    desc: Generate v5 docs + diagram artifacts with Mermaid icon-nodes (requires si/mdi packs)
    env:
      V5_DIAGRAM_ICON_MODE: icon-nodes
    cmds:
      - task build:clean-generated
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  v5-docs-compat:
    desc: Generate v5 docs + diagram artifacts in Mermaid compat mode (no icon-node syntax)
    env:
      V5_DIAGRAM_ICON_MODE: compat
    cmds:
      - task build:clean-generated
      - "{{.PYTHON}} topology-tools/compile-topology.py --topology topology/topology.yaml --strict-model-lock --secrets-mode passthrough --artifacts-root generated"

  v5-docs-validate:
    desc: Generate docs/diagrams and run Mermaid render validation gate
    cmds:
      - task build:v5-docs
      - "{{.PYTHON}} topology-tools/utils/validate-mermaid-render.py --docs-root generated/home-lab/docs"

  phase1-bootstrap:
    desc: Refresh phase1 migration bootstrap map
    cmds:
      - "{{.PYTHON}} topology-tools/utils/bootstrap-phase1-mapping.py --refresh-effective"

  phase1-reconcile:
    desc: Reconcile phase1 mapping
    cmds:
      - "{{.PYTHON}} scripts/phase1/reconcile_phase1_mapping.py"

  phase1-backlog:
    desc: Refresh phase1 backlog report
    cmds:
      - "{{.PYTHON}} scripts/phase1/refresh_phase1_backlog.py"

  sync-lock:
    desc: Sync model lock
    cmds:
      - "{{.PYTHON}} scripts/model/sync_v5_model_lock.py"

  export-bindings:
    desc: Export instance bindings
    cmds:
      - "{{.PYTHON}} scripts/model/export_v5_instance_bindings.py"

  tfvars-mikrotik:
    desc: Generate terraform.tfvars for MikroTik from SOPS secrets
    cmds:
      - "{{.PYTHON}} scripts/terraform/generate-tfvars.py mikrotik"

  tfvars-proxmox:
    desc: Generate terraform.tfvars for Proxmox from SOPS secrets
    cmds:
      - "{{.PYTHON}} scripts/terraform/generate-tfvars.py proxmox"

  tfvars-all:
    desc: Generate terraform.tfvars for all targets from SOPS secrets
    cmds:
      - "{{.PYTHON}} scripts/terraform/generate-tfvars.py all"

  tfvars-cleanup:
    desc: Remove generated terraform.tfvars files
    cmds:
      - "{{.PYTHON}} scripts/terraform/generate-tfvars.py all --cleanup"
