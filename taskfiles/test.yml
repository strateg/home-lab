version: "3"

tasks:
  fixture-matrix-v4:
    desc: Run legacy v4 fixture validation matrix (non-blocking for default v5 lane)
    cmds:
      - "{{.PYTHON}} v4/topology-tools/run-fixture-matrix.py"

  all:
    desc: Run default v5 tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v5/tests -q"

  all-with-legacy:
    desc: Run full tests (v4 + v5)
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= -q"

  parity-v4-v5:
    desc: Run v4-v5 parity regression suite for migrated validators
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v5/tests/plugin_integration/test_governance_v4_v5_parity.py v5/tests/plugin_integration/test_network_refs_v4_v5_parity.py v5/tests/plugin_integration/test_service_refs_v4_v5_parity.py v5/tests/plugin_integration/test_storage_l3_v4_v5_warning_parity.py v5/tests/plugin_integration/test_host_os_refs_v4_v5_parity.py v5/tests/plugin_integration/test_vm_lxc_host_os_v4_v5_parity.py -q"

  v4:
    desc: Run v4 tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v4/tests -q"

  v5:
    desc: Run v5 tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v5/tests -q"
