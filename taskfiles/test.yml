version: "3"

tasks:
  default:
    desc: Run all tests
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"
      - "{{.PYTHON}} -m pytest -o addopts= tests -q"

  all:
    desc: Alias for test:default
    deps:
      - default

  all-with-legacy:
    desc: Run default tests plus legacy parity regression lane
    deps:
      - default
      - parity-v4-current

  parity-v4-current:
    desc: Run v4/current parity and regression suites
    cmds:
      - "{{.PYTHON}} scripts/validation/validate_workspace_layout.py"
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_regression tests/plugin_integration/test_parity_stage_order.py tests/plugin_integration/test_parallel_profile_parity.py -q"

  plugin-api:
    desc: Run plugin API unit tests (CI gate)
    cmds:
      - '{{.PYTHON}} -m pytest -o addopts= tests/plugin_api tests/test_plugin_registry.py -v --cov=topology-tools/kernel --cov-report=xml:coverage-api.xml --cov-report=term-missing --cov-fail-under=80 --durations=10'

  plugin-contract:
    desc: Run plugin contract tests (CI gate)
    cmds:
      - '{{.PYTHON}} -m pytest -o addopts= tests/plugin_contract tests/plugin_api tests/test_plugin_registry.py -v --cov=topology-tools/kernel --cov-report=xml:coverage-contract.xml --cov-report=term-missing --cov-fail-under=70 --durations=10'

  plugin-integration:
    desc: Run plugin integration tests (CI gate)
    cmds:
      - '{{.PYTHON}} -m pytest -o addopts= tests/plugin_integration -v --cov=topology-tools --cov-report=xml:coverage-integration.xml --cov-report=term-missing --durations=10'

  plugin-regression:
    desc: Run plugin regression tests (CI gate)
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_regression -v --durations=10"

  ai-redaction:
    desc: Run ADR0094 redaction verification tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests/plugin_contract/test_ai_advisory_contract_runtime.py -q"

  ci-coverage:
    desc: Run repository test suite with coverage report for CI
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= tests -v --cov=topology-tools --cov-report=xml --cov-fail-under=75"
