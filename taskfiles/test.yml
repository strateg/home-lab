version: "3"

tasks:
  fixture-matrix-v4:
    desc: Run legacy v4 fixture validation matrix
    cmds:
      - "{{.PYTHON}} v4/topology-tools/run-fixture-matrix.py"

  all:
    desc: Run all tests (v4 + v5)
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= -q"

  v4:
    desc: Run v4 tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v4/tests -q"

  v5:
    desc: Run v5 tests
    cmds:
      - "{{.PYTHON}} -m pytest -o addopts= v5/tests -q"
