version: "3"

tasks:
  default:
    desc: Topology inspection summary (classes/objects/instances counts + groups)
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py summary {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  summary-json:
    desc: Topology inspection summary in machine-readable JSON
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py summary --json {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  classes:
    desc: Show class hierarchy tree
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py classes {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  inheritance:
    desc: Inspect class inheritance summary or focused lineage (optional CLASS=<class_ref>)
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py inheritance {{if .CLASS}}--class {{.CLASS}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  inheritance-json:
    desc: Inspect class inheritance in machine-readable JSON (optional CLASS=<class_ref>)
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py inheritance --json {{if .CLASS}}--class {{.CLASS}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  objects:
    desc: Show compact objects grouped by materialized class
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py objects {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  objects-detailed:
    desc: Show detailed objects grouped by materialized class
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py objects --detailed {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  instances:
    desc: Show compact instances grouped by layer
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py instances {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  instances-detailed:
    desc: Show detailed instances grouped by layer
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py instances --detailed {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  search:
    desc: Search instances by regex (requires QUERY=<regex>)
    requires:
      vars:
        - QUERY
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py search --query '{{.QUERY}}' {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  deps:
    desc: Show direct/transitive dependencies for one instance (INSTANCE=<id|source_id>)
    requires:
      vars:
        - INSTANCE
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py deps --instance {{.INSTANCE}} {{if .MAX_DEPTH}}--max-depth {{.MAX_DEPTH}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  deps-json:
    desc: Show dependencies for one instance in machine-readable JSON (INSTANCE=<id|source_id>)
    requires:
      vars:
        - INSTANCE
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py deps --instance {{.INSTANCE}} --json {{if .MAX_DEPTH}}--max-depth {{.MAX_DEPTH}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  deps-typed-shadow:
    desc: Show dependencies with experimental typed relation shadow (INSTANCE=<id|source_id>)
    requires:
      vars:
        - INSTANCE
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py deps --instance {{.INSTANCE}} --typed-shadow {{if .MAX_DEPTH}}--max-depth {{.MAX_DEPTH}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  deps-json-typed-shadow:
    desc: Show dependencies in JSON with typed relation shadow (INSTANCE=<id|source_id>)
    requires:
      vars:
        - INSTANCE
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py deps --instance {{.INSTANCE}} --json --typed-shadow {{if .MAX_DEPTH}}--max-depth {{.MAX_DEPTH}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  deps-dot:
    desc: Export instance dependency graph in DOT format
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py deps-dot {{if .OUTPUT}}--output {{.OUTPUT}}{{end}} {{if .LAYER}}--layer {{.LAYER}}{{end}} {{if .GROUP}}--group {{.GROUP}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  capability-packs:
    desc: Inspect capability packs and class/object pack dependencies
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py capability-packs {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  capabilities:
    desc: Inspect capability relations (optional CLASS=<class_ref> or OBJECT=<object_id>)
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py capabilities {{if .CLASS}}--class {{.CLASS}}{{end}} {{if .OBJECT}}--object {{.OBJECT}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"

  capabilities-json:
    desc: Inspect capability relations in machine-readable JSON (optional CLASS=<class_ref> or OBJECT=<object_id>)
    cmds:
      - "{{.PYTHON}} scripts/inspection/inspect_topology.py capabilities --json {{if .CLASS}}--class {{.CLASS}}{{end}} {{if .OBJECT}}--object {{.OBJECT}}{{end}} {{if .EFFECTIVE}}--effective {{.EFFECTIVE}}{{end}}"
