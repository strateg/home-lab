version: "3"

tasks:
  # ==========================================================================
  # WireGuard Tunnel Deployment
  # ==========================================================================

  wireguard-extract-vps-key:
    desc: Extract VPS SSH key from secrets to /tmp/vps-ssh-key.pem
    cmds:
      - |
        sops -d projects/{{.PROJECT_ID}}/secrets/instances/vps-oracle-frankfurt.yaml | \
          {{.PYTHON}} -c "import sys,yaml; print(yaml.safe_load(sys.stdin)['ssh_private_key'])" \
          > /tmp/vps-ssh-key.pem
        chmod 600 /tmp/vps-ssh-key.pem
        echo "SSH key extracted to /tmp/vps-ssh-key.pem"

  wireguard-full-deploy-vps:
    desc: Full VPS WireGuard deployment (config + firewall + OCI security + enable service)
    vars:
      TUNNEL: '{{default "wg0" .TUNNEL}}'
      SSH_KEY: '{{default "/tmp/vps-ssh-key.pem" .SSH_KEY}}'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    cmds:
      - task: wireguard-extract-vps-key
      - task: wireguard-deploy-vps
        vars:
          SSH_KEY: "{{.SSH_KEY}}"
          TUNNEL: "{{.TUNNEL}}"
      - task: wireguard-setup-vps-iptables
        vars:
          SSH_KEY: "{{.SSH_KEY}}"
      - task: wireguard-oci-add-security
      - |
        VPS_HOST=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        ssh -i {{.SSH_KEY}} -o StrictHostKeyChecking=no ubuntu@$VPS_HOST \
          "sudo systemctl enable --now wg-quick@{{.TUNNEL}} && echo '✓ WireGuard service enabled'"
      - task: wireguard-status-vps
        vars:
          SSH_KEY: "{{.SSH_KEY}}"

  wireguard-deploy-mikrotik-sshpass:
    desc: Deploy WireGuard to MikroTik via sshpass (reads credentials from secrets)
    vars:
      TUNNEL: '{{default "wg0" .TUNNEL}}'
      MIKROTIK_HOST: '{{default "192.168.88.1" .MIKROTIK_HOST}}'
      MIKROTIK_USER: '{{default "automator" .MIKROTIK_USER}}'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    preconditions:
      - sh: 'command -v sshpass'
        msg: "sshpass not installed. Install: apt install sshpass / nix-shell -p sshpass"
      - sh: 'test -f generated/{{.PROJECT_ID}}/wireguard/mikrotik-{{.TUNNEL}}.rsc'
        msg: "Config not found. Run: task build"
    cmds:
      - |
        # Get MikroTik password from secrets
        MIKROTIK_PASS=$(sops -d projects/{{.PROJECT_ID}}/secrets/instances/rtr-mikrotik-chateau.yaml | \
          {{.PYTHON}} -c "import sys,yaml; print(yaml.safe_load(sys.stdin)['automator']['password'])")

        # Get VPS IP from OCI
        VPS_IP=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        echo "VPS IP: $VPS_IP"

        # Read secrets for WireGuard keys
        SECRETS=$(sops -d projects/{{.PROJECT_ID}}/secrets/tunnels/wg-home-to-oci.yaml)
        MIKROTIK_PRIVKEY=$(echo "$SECRETS" | {{.PYTHON}} -c "import sys,yaml; print(yaml.safe_load(sys.stdin)['mikrotik']['private_key'])")
        VPS_PUBKEY=$(echo "$SECRETS" | {{.PYTHON}} -c "import sys,yaml; print(yaml.safe_load(sys.stdin)['vps']['public_key'])")
        PSK=$(echo "$SECRETS" | {{.PYTHON}} -c "import sys,yaml; print(yaml.safe_load(sys.stdin)['preshared_key'])")

        # Read tunnel config for IPs
        TUNNEL_IP=$(grep -A5 "endpoint_a:" projects/{{.PROJECT_ID}}/topology/instances/network/inst.tunnel.wg-home-to-oci.yaml | grep "tunnel_ip:" | awk '{print $2}')
        ALLOWED_IPS="10.100.0.2/32,0.0.0.0/0"

        echo "Deploying WireGuard to MikroTik {{.MIKROTIK_HOST}}..."

        sshpass -p "$MIKROTIK_PASS" ssh -o StrictHostKeyChecking=no {{.MIKROTIK_USER}}@{{.MIKROTIK_HOST}} <<EOF
        # Remove existing config if present
        /interface wireguard remove [find name={{.TUNNEL}}]
        /ip address remove [find interface={{.TUNNEL}}]
        /interface list member remove [find interface={{.TUNNEL}}]

        # Create WireGuard interface
        /interface wireguard add name={{.TUNNEL}} listen-port=51820 private-key="$MIKROTIK_PRIVKEY" mtu=1420

        # Add peer
        /interface wireguard peers add interface={{.TUNNEL}} public-key="$VPS_PUBKEY" preshared-key="$PSK" endpoint-address=$VPS_IP endpoint-port=51820 allowed-address=$ALLOWED_IPS persistent-keepalive=25s

        # Assign IP
        /ip address add address=$TUNNEL_IP interface={{.TUNNEL}}

        # Trust interface
        /interface list member add interface={{.TUNNEL}} list=LAN

        # Show result
        /interface wireguard print
        /interface wireguard peers print
        EOF

        echo "✓ WireGuard deployed to MikroTik"

  wireguard-show:
    desc: Show generated WireGuard configurations
    cmds:
      - "ls -la generated/{{.PROJECT_ID}}/wireguard/ 2>/dev/null || echo 'No WireGuard configs found. Run: task generate:all'"

  wireguard-deploy-vps:
    desc: Deploy WireGuard config to VPS (auto-discovers IP from OCI)
    vars:
      TUNNEL: '{{default "wg0" .TUNNEL}}'
      VPS_USER: '{{default "ubuntu" .VPS_USER}}'
      CONF_FILE: 'generated/{{.PROJECT_ID}}/wireguard/vps-{{.TUNNEL}}.conf'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
      SSH_KEY: '{{default "" .SSH_KEY}}'
    preconditions:
      - sh: 'test -f {{.CONF_FILE}}'
        msg: "Config file not found: {{.CONF_FILE}}. Run: task generate:all"
      - sh: 'command -v oci'
        msg: "OCI CLI not installed"
    cmds:
      - |
        VPS_HOST=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        if [ -z "$VPS_HOST" ] || [ "$VPS_HOST" = "null" ]; then
          echo "ERROR: Could not get VPS public IP from OCI"
          exit 1
        fi
        echo "VPS public IP: $VPS_HOST"

        SSH_OPTS="-o StrictHostKeyChecking=no"
        if [ -n "{{.SSH_KEY}}" ]; then
          SSH_OPTS="$SSH_OPTS -i {{.SSH_KEY}}"
        fi

        echo "Deploying WireGuard config to {{.VPS_USER}}@$VPS_HOST..."
        scp $SSH_OPTS {{.CONF_FILE}} {{.VPS_USER}}@$VPS_HOST:/tmp/{{.TUNNEL}}.conf
        ssh $SSH_OPTS {{.VPS_USER}}@$VPS_HOST "sudo cp /tmp/{{.TUNNEL}}.conf /etc/wireguard/{{.TUNNEL}}.conf && sudo chmod 600 /etc/wireguard/{{.TUNNEL}}.conf"
        echo "Config deployed. To activate: ssh {{.VPS_USER}}@$VPS_HOST sudo systemctl enable --now wg-quick@{{.TUNNEL}}"

  wireguard-get-vps-ip:
    desc: Get current VPS public IP from OCI API
    vars:
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    cmds:
      - oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output

  wireguard-oci-check-security:
    desc: Check if OCI Security List allows WireGuard port (UDP 51820)
    vars:
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    cmds:
      - |
        VNIC_ID=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0].id' --raw-output)
        SUBNET_ID=$(oci network vnic get --vnic-id $VNIC_ID --query 'data."subnet-id"' --raw-output)
        SL_ID=$(oci network subnet get --subnet-id $SUBNET_ID --query 'data."security-list-ids"[0]' --raw-output)

        HAS_WG=$(oci network security-list get --security-list-id "$SL_ID" --query 'data."ingress-security-rules"' --raw-output | grep -c '"min": 51820' || true)
        if [ "$HAS_WG" = "0" ]; then
          echo "❌ UDP 51820 NOT allowed in Security List"
          echo "   Run: task deploy:wireguard-oci-add-security"
        else
          echo "✓ UDP 51820 allowed in Security List"
        fi

  wireguard-oci-add-security:
    desc: Add WireGuard UDP 51820 rule to OCI Security List
    vars:
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    cmds:
      - |
        VNIC_ID=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0].id' --raw-output)
        SUBNET_ID=$(oci network vnic get --vnic-id $VNIC_ID --query 'data."subnet-id"' --raw-output)
        SL_ID=$(oci network subnet get --subnet-id $SUBNET_ID --query 'data."security-list-ids"[0]' --raw-output)

        echo "Security List: $SL_ID"

        # Get current rules and add WireGuard
        CURRENT=$(oci network security-list get --security-list-id "$SL_ID" --query 'data."ingress-security-rules"' --raw-output)

        # Check if rule already exists
        if echo "$CURRENT" | grep -q '"protocol": "17"'; then
          echo "UDP rule already exists, checking port..."
          if echo "$CURRENT" | grep -q '"min": 51820'; then
            echo "✓ WireGuard rule already present"
            exit 0
          fi
        fi

        # Build new rules JSON with WireGuard added
        echo "$CURRENT" | python3 scripts/wireguard/convert-oci-rules.py > /tmp/new-ingress-rules.json

        echo "Adding WireGuard UDP 51820 rule..."
        oci network security-list update \
          --security-list-id "$SL_ID" \
          --ingress-security-rules file:///tmp/new-ingress-rules.json \
          --force > /dev/null

        echo "✓ WireGuard rule added to Security List"

  wireguard-deploy-mikrotik:
    desc: Deploy WireGuard config to MikroTik with dynamic VPS IP (requires MIKROTIK_HOST)
    requires:
      vars:
        - MIKROTIK_HOST
    vars:
      TUNNEL: '{{default "wg0" .TUNNEL}}'
      MIKROTIK_USER: '{{default "admin" .MIKROTIK_USER}}'
      RSC_FILE: 'generated/{{.PROJECT_ID}}/wireguard/mikrotik-{{.TUNNEL}}.rsc'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
    preconditions:
      - sh: 'test -f {{.RSC_FILE}}'
        msg: "Config file not found: {{.RSC_FILE}}. Run: task generate:all"
      - sh: 'command -v oci'
        msg: "OCI CLI not installed. Install: https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm"
    cmds:
      - |
        echo "Querying OCI for VPS public IP..."
        VPS_IP=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        if [ -z "$VPS_IP" ] || [ "$VPS_IP" = "null" ]; then
          echo "ERROR: Could not get VPS public IP from OCI"
          exit 1
        fi
        echo "VPS public IP: $VPS_IP"

        echo "Preparing config with endpoint..."
        TMP_RSC="/tmp/mikrotik-{{.TUNNEL}}-deploy.rsc"

        # Check if config already has endpoint-address
        if grep -q "endpoint-address=" {{.RSC_FILE}}; then
          # Replace existing endpoint-address
          sed "s/endpoint-address=[^ ]*/endpoint-address=$VPS_IP/" {{.RSC_FILE}} > "$TMP_RSC"
        else
          # Add endpoint-address after public-key line
          sed "/public-key=/a\\    endpoint-address=$VPS_IP \\\\" {{.RSC_FILE}} > "$TMP_RSC"
        fi

        echo "Deploying to {{.MIKROTIK_USER}}@{{.MIKROTIK_HOST}}..."
        scp "$TMP_RSC" {{.MIKROTIK_USER}}@{{.MIKROTIK_HOST}}:/flash/wireguard-{{.TUNNEL}}.rsc
        rm -f "$TMP_RSC"

        echo "Config uploaded with endpoint $VPS_IP"
        echo "To apply: ssh {{.MIKROTIK_USER}}@{{.MIKROTIK_HOST}} /import flash/wireguard-{{.TUNNEL}}.rsc"

  wireguard-status-vps:
    desc: Check WireGuard status on VPS (auto-discovers IP from OCI)
    vars:
      VPS_USER: '{{default "ubuntu" .VPS_USER}}'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
      SSH_KEY: '{{default "" .SSH_KEY}}'
    cmds:
      - |
        VPS_HOST=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        SSH_OPTS="-o StrictHostKeyChecking=no"
        if [ -n "{{.SSH_KEY}}" ]; then
          SSH_OPTS="$SSH_OPTS -i {{.SSH_KEY}}"
        fi
        echo "VPS: $VPS_HOST"
        ssh $SSH_OPTS {{.VPS_USER}}@$VPS_HOST "sudo wg show"

  wireguard-status-mikrotik:
    desc: Check WireGuard status on MikroTik (requires MIKROTIK_HOST=<ip>)
    requires:
      vars:
        - MIKROTIK_HOST
    vars:
      MIKROTIK_USER: '{{default "admin" .MIKROTIK_USER}}'
    cmds:
      - ssh {{.MIKROTIK_USER}}@{{.MIKROTIK_HOST}} "/interface/wireguard/print; /interface/wireguard/peers/print"

  wireguard-setup-vps-iptables:
    desc: Set up iptables for WireGuard on VPS (inserts rule before REJECT)
    vars:
      VPS_USER: '{{default "ubuntu" .VPS_USER}}'
      OCI_INSTANCE_ID: '{{default "ocid1.instance.oc1.eu-frankfurt-1.antheljtktcemiacour3ugube5pczalr6qmrumzhp43n47bkgsix3ahtr7da" .OCI_INSTANCE_ID}}'
      SSH_KEY: '{{default "" .SSH_KEY}}'
    cmds:
      - |
        VPS_HOST=$(oci compute instance list-vnics --instance-id {{.OCI_INSTANCE_ID}} --query 'data[0]."public-ip"' --raw-output)
        SSH_OPTS="-o StrictHostKeyChecking=no"
        if [ -n "{{.SSH_KEY}}" ]; then
          SSH_OPTS="$SSH_OPTS -i {{.SSH_KEY}}"
        fi
        echo "VPS: $VPS_HOST"
        ssh $SSH_OPTS {{.VPS_USER}}@$VPS_HOST bash -s <<'EOF'
          # Check if UDP 51820 rule already exists
          if sudo iptables -L INPUT -n | grep -q "udp dpt:51820"; then
            echo "✓ UDP 51820 rule already present"
          else
            # Find REJECT rule position
            REJECT_POS=$(sudo iptables -L INPUT -n --line-numbers | grep "REJECT" | head -1 | awk '{print $1}')
            if [ -n "$REJECT_POS" ]; then
              echo "Inserting UDP 51820 rule at position $REJECT_POS (before REJECT)"
              sudo iptables -I INPUT $REJECT_POS -p udp --dport 51820 -j ACCEPT
            else
              echo "No REJECT rule found, appending UDP 51820 rule"
              sudo iptables -A INPUT -p udp --dport 51820 -j ACCEPT
            fi
            # Save rules
            sudo iptables-save | sudo tee /etc/iptables/rules.v4 > /dev/null
            echo "✓ iptables rule added and saved"
          fi
        EOF

  # ==========================================================================
  # Original Deploy Tasks
  # ==========================================================================

  _init-node:
    internal: true
    desc: Internal helper for init-node.py invocations
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/init-node.py --repo-root . --project-id {{.PROJECT_ID}} {{.INIT_ARGS}}"

  _service-chain-evidence:
    internal: true
    desc: Internal helper for service-chain evidence execution
    cmds:
      - "{{.PYTHON}} topology-tools/utils/record-service-chain-evidence.py --mode {{.MODE}} {{if .ALLOW_APPLY_FLAG}}--allow-apply{{end}} --project-id {{.PROJECT_ID}} --env production {{.EVIDENCE_ARGS}}"

  docker-toolchain-build:
    desc: Build Docker toolchain image for deploy runner (optional DOCKER_IMAGE=<tag>)
    cmds:
      - "docker build -f docker/Dockerfile.toolchain -t {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} docker"

  docker-toolchain-smoke:
    desc: Smoke-check Docker toolchain image for terraform/ansible availability
    cmds:
      - "docker run --rm {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} terraform version"
      - "docker run --rm {{default \"homelab-toolchain:latest\" .DOCKER_IMAGE}} ansible-playbook --version"

  clean-runner-workspace:
    desc: Clean local deploy runner workspace caches for project (set DRY_RUN=true or CONFIRM_PURGE=YES)
    preconditions:
      - sh: 'test "{{.DRY_RUN}}" = "true" || test "{{.CONFIRM_PURGE}}" = "YES"'
        msg: "Set DRY_RUN=true for preview, or CONFIRM_PURGE=YES to execute."
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/cleanup.py --repo-root . --project-id {{.PROJECT_ID}} {{if .DRY_RUN}}--dry-run{{else}}--confirm{{end}} runner-workspace"

  clean-bundles:
    desc: Clean deploy bundles for project (KEEP=<n> keeps newest; set DRY_RUN=true or CONFIRM_PURGE=YES)
    preconditions:
      - sh: 'test "{{.DRY_RUN}}" = "true" || test "{{.CONFIRM_PURGE}}" = "YES"'
        msg: "Set DRY_RUN=true for preview, or CONFIRM_PURGE=YES to execute."
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/cleanup.py --repo-root . --project-id {{.PROJECT_ID}} {{if .DRY_RUN}}--dry-run{{else}}--confirm{{end}} bundles --keep {{default \"0\" .KEEP}}"

  clean-state:
    desc: Reset deploy-state for project and recreate scaffold dirs (set DRY_RUN=true or CONFIRM_PURGE=YES)
    preconditions:
      - sh: 'test "{{.DRY_RUN}}" = "true" || test "{{.CONFIRM_PURGE}}" = "YES"'
        msg: "Set DRY_RUN=true for preview, or CONFIRM_PURGE=YES to execute."
    cmds:
      - "{{.PYTHON}} scripts/orchestration/deploy/cleanup.py --repo-root . --project-id {{.PROJECT_ID}} {{if .DRY_RUN}}--dry-run{{else}}--confirm{{end}} state"

  init-status:
    desc: Show ADR0083 init-node scaffold state summary
    cmds:
      - task: _init-node
        vars:
          INIT_ARGS: "--status"

  init-node-plan:
    desc: Plan init-node action for one node (requires BUNDLE=<bundle_id>, NODE=<node_id>)
    requires:
      vars:
        - BUNDLE
        - NODE
    cmds:
      - task: _init-node
        vars:
          INIT_ARGS: "--bundle {{.BUNDLE}} --node {{.NODE}} --plan-only {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .PHASE}}--phase {{.PHASE}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .RESET}}--reset{{end}} {{if .CONFIRM_RESET}}--confirm-reset{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  init-all-pending-plan:
    desc: Plan init-node action for all pending nodes (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task: _init-node
        vars:
          INIT_ARGS: "--bundle {{.BUNDLE}} --all-pending --plan-only {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .PHASE}}--phase {{.PHASE}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  init-node-run:
    desc: Execute init-node action for one node (requires BUNDLE=<bundle_id>, NODE=<node_id>)
    requires:
      vars:
        - BUNDLE
        - NODE
    cmds:
      - task: _init-node
        vars:
          INIT_ARGS: "--bundle {{.BUNDLE}} --node {{.NODE}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .PHASE}}--phase {{.PHASE}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .RESET}}--reset{{end}} {{if .CONFIRM_RESET}}--confirm-reset{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  init-all-pending-run:
    desc: Execute init-node action for all pending nodes (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task: _init-node
        vars:
          INIT_ARGS: "--bundle {{.BUNDLE}} --all-pending {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .PHASE}}--phase {{.PHASE}}{{end}} {{if .SKIP_ENVIRONMENT_CHECK}}--skip-environment-check{{end}} {{if .VERIFY_ONLY}}--verify-only{{end}} {{if .FORCE}}--force{{end}} {{if .IMPORT_EXISTING}}--import-existing{{end}} {{if .ACKNOWLEDGE_DRIFT}}--acknowledge-drift{{end}}"

  init-reactivation-smoke:
    desc: ADR0083 reactivation non-destructive smoke pack (requires BUNDLE=<bundle_id>)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task: init-status
      - task: init-all-pending-plan
        vars:
          BUNDLE: "{{.BUNDLE}}"
          DEPLOY_RUNNER: "{{.DEPLOY_RUNNER}}"
          PHASE: "{{.PHASE}}"
          SKIP_ENVIRONMENT_CHECK: "{{.SKIP_ENVIRONMENT_CHECK}}"
      - task: init-node-plan
        vars:
          BUNDLE: "{{.BUNDLE}}"
          NODE: '{{default "rtr-mikrotik-chateau" .NODE}}'
          DEPLOY_RUNNER: "{{.DEPLOY_RUNNER}}"
          PHASE: '{{default "bootstrap" .PHASE}}'
          SKIP_ENVIRONMENT_CHECK: "{{.SKIP_ENVIRONMENT_CHECK}}"

  init-reactivation-pack:
    desc: ADR0083 reactivation pack runner (readiness gate + smoke + evidence markdown)
    requires:
      vars:
        - BUNDLE
    cmds:
      - task: :validate:adr0083-reactivation-gate
      - task: init-reactivation-smoke
        vars:
          BUNDLE: "{{.BUNDLE}}"
          NODE: "{{.NODE}}"
          DEPLOY_RUNNER: "{{.DEPLOY_RUNNER}}"
          PHASE: "{{.PHASE}}"
          SKIP_ENVIRONMENT_CHECK: "{{.SKIP_ENVIRONMENT_CHECK}}"
      - task: :validate:adr0083-reactivation-evidence
        vars:
          BUNDLE: "{{.BUNDLE}}"

  service-chain-evidence-dry:
    desc: Execute dry service-chain lane and write evidence report
    cmds:
      - task: _service-chain-evidence
        vars:
          MODE: "dry"
          EVIDENCE_ARGS: "{{if .BUNDLE}}--bundle {{.BUNDLE}}{{end}} {{if .CONTINUE_ON_FAILURE}}--continue-on-failure{{end}} {{if .DEPLOY_RUNNER}}--deploy-runner {{.DEPLOY_RUNNER}}{{end}} {{if .ANSIBLE_VIA_WSL}}--ansible-via-wsl{{end}} {{if .BOOTSTRAP_INIT_NODE}}--bootstrap-init-node{{end}} {{if .BOOTSTRAP_NODE}}--bootstrap-node {{.BOOTSTRAP_NODE}}{{end}} {{if .BOOTSTRAP_RUNNER}}--bootstrap-runner {{.BOOTSTRAP_RUNNER}}{{end}}"

  service-chain-evidence-check:
