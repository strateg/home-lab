name: Topology Validation Matrix

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
      - "fix/**"
      - "topology/**"
  pull_request:

jobs:
  strict-mainline:
    name: Strict Validate Main Topology
    runs-on: ubuntu-latest
    env:
      USE_TASK_ORCHESTRATION: "1"
      ALLOW_TASK_FALLBACK: "1"
      DEVKEY_PASSPHRASE: ${{ secrets.DEVKEY_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tooling Dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema

      - name: Resolve active project
        run: |
          PROJECT_ID=$(python - <<'PY'
          import yaml
          from pathlib import Path
          payload = yaml.safe_load(Path("topology/topology.yaml").read_text(encoding="utf-8")) or {}
          project = payload.get("project", {})
          active = project.get("active") if isinstance(project, dict) else None
          print(active.strip() if isinstance(active, str) and active.strip() else "home-lab")
          PY
          )
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Setup Task CLI
        if: ${{ env.USE_TASK_ORCHESTRATION == '1' }}
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Install age and sops
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.12.1"
          curl -L "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Unlock secrets
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$DEVKEY_PASSPHRASE" | age -d "projects/${PROJECT_ID}/secrets/devkey.age" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run topology matrix strict gate (task-first with explicit fallback)
        run: |
          set -e
          if [ "${USE_TASK_ORCHESTRATION}" = "1" ]; then
            if task ci:topology-mainline; then
              exit 0
            fi
            if [ "${ALLOW_TASK_FALLBACK}" != "1" ]; then
              echo "Task orchestration failed and fallback is disabled."
              exit 1
            fi
            echo "Task orchestration failed; executing legacy fallback chain."
          fi

          python topology-tools/verify-framework-lock.py --strict
          python topology-tools/rehearse-framework-rollback.py
          python topology-tools/validate-framework-compatibility-matrix.py
          python topology-tools/audit-strict-runtime-entrypoints.py
          V5_SECRETS_MODE=passthrough python scripts/orchestration/lane.py validate-v5
          python scripts/orchestration/lane.py phase1-gate

      - name: Cleanup secrets key
        if: always()
        run: rm -f ~/.config/sops/age/keys.txt
