name: Plugin Validation

on:
  push:
    branches: [main, master, "feature/**", "fix/**", "topology/**"]
    paths:
      - '.github/workflows/plugin-validation.yml'
      - 'topology-tools/kernel/**'
      - 'topology-tools/plugins/**'
      - 'topology-tools/schemas/plugin-manifest.schema.json'
      - 'topology-tools/data/error-catalog.yaml'
      - 'topology/class-modules/**/plugins/**'
      - 'topology/class-modules/**/plugins.yaml'
      - 'topology/object-modules/**/plugins/**'
      - 'topology/object-modules/**/plugins.yaml'
      - 'tests/plugin_*/**'
      - 'topology-tools/compile-topology.py'
  pull_request:
    paths:
      - '.github/workflows/plugin-validation.yml'
      - 'topology-tools/kernel/**'
      - 'topology-tools/plugins/**'
      - 'topology-tools/schemas/plugin-manifest.schema.json'
      - 'topology-tools/data/error-catalog.yaml'
      - 'topology/class-modules/**/plugins/**'
      - 'topology/class-modules/**/plugins.yaml'
      - 'topology/object-modules/**/plugins/**'
      - 'topology/object-modules/**/plugins.yaml'
      - 'tests/plugin_*/**'
      - 'topology-tools/compile-topology.py'
  workflow_dispatch:

jobs:
  plugin-api-unit:
    name: Plugin API Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run plugin API unit tests
        run: task test:plugin-api

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-api.xml
          flags: plugin-api
          name: plugin-api-py${{ matrix.python-version }}

  plugin-contract:
    name: Plugin Contract Tests
    runs-on: ubuntu-latest
    needs: plugin-api-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run plugin contract tests
        run: task test:plugin-contract

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-contract.xml
          flags: plugin-contract
          name: plugin-contract

  plugin-integration:
    name: Plugin Integration Tests
    runs-on: ubuntu-latest
    needs: plugin-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run plugin integration tests
        run: task test:plugin-integration

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-integration.xml
          flags: plugin-integration
          name: plugin-integration

  ai-redaction-verification:
    name: AI Redaction Verification
    runs-on: ubuntu-latest
    needs: plugin-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run ADR0094 redaction verification
        run: task test:ai-redaction

  plugin-regression:
    name: Plugin Regression Tests
    runs-on: ubuntu-latest
    needs: plugin-integration
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run plugin regression tests
        run: task test:plugin-regression

  manifest-validation:
    name: Plugin Manifest Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Validate plugin manifests
        run: task validate:plugin-manifests

  compile-with-plugins:
    name: Compile with Plugins Enabled
    runs-on: ubuntu-latest
    needs: [plugin-api-unit, manifest-validation]
    env:
      DEVKEY_PASSPHRASE: ${{ secrets.DEVKEY_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Resolve active project
        run: |
          PROJECT_ID=$(python - <<'PY'
          import yaml
          from pathlib import Path
          payload = yaml.safe_load(Path("topology/topology.yaml").read_text(encoding="utf-8")) or {}
          project = payload.get("project", {})
          active = project.get("active") if isinstance(project, dict) else None
          print(active.strip() if isinstance(active, str) and active.strip() else "home-lab")
          PY
          )
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Clean generated artifacts
        run: task build:clean-generated

      - name: Run framework strict gates
        run: task framework:strict

      - name: Install age and sops
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.12.1"
          curl -L "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Enforce inject secret path on protected branches
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        run: |
          if [ -z "${DEVKEY_PASSPHRASE}" ]; then
            echo "::error::DEVKEY_PASSPHRASE must be configured for main/master compile validation."
            exit 1
          fi

      - name: Unlock secrets
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$DEVKEY_PASSPHRASE" | age -d "projects/${PROJECT_ID}/secrets/devkey.age" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run compiler with plugins (inject)
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          python topology-tools/compile-topology.py \
            --topology topology/topology.yaml \
            --secrets-mode inject \
            --output-json build/effective.json

      - name: Run compiler with plugins (passthrough fallback)
        if: ${{ env.DEVKEY_PASSPHRASE == '' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
        run: |
          echo "DEVKEY_PASSPHRASE is not configured, running passthrough compile fallback."
          python topology-tools/compile-topology.py \
            --topology topology/topology.yaml \
            --secrets-mode passthrough \
            --output-json build/effective.json

      - name: Cleanup secrets key
        if: always()
        run: |
          rm -f ~/.config/sops/age/keys.txt

      - name: Verify output
        run: |
          test -f build/effective.json
          python -c "import json; json.load(open('build/effective.json'))"
          echo "✓ Compiled output is valid JSON"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Validate generated Terraform (Proxmox)
        run: |
          test -d "generated/${PROJECT_ID}/terraform/proxmox"
          terraform -chdir="generated/${PROJECT_ID}/terraform/proxmox" init -backend=false -input=false
          terraform -chdir="generated/${PROJECT_ID}/terraform/proxmox" fmt -check
          terraform -chdir="generated/${PROJECT_ID}/terraform/proxmox" validate

      - name: Validate generated Terraform (MikroTik)
        run: |
          test -d "generated/${PROJECT_ID}/terraform/mikrotik"
          terraform -chdir="generated/${PROJECT_ID}/terraform/mikrotik" init -backend=false -input=false
          terraform -chdir="generated/${PROJECT_ID}/terraform/mikrotik" fmt -check
          terraform -chdir="generated/${PROJECT_ID}/terraform/mikrotik" validate

      - name: Install Ansible
        run: python -m pip install ansible-core

      - name: Validate generated Ansible inventory
        run: |
          test -f "generated/${PROJECT_ID}/ansible/inventory/production/hosts.yml"
          ansible-inventory -i "generated/${PROJECT_ID}/ansible/inventory/production/hosts.yml" --list > /dev/null

      - name: Secret-safety scan for generated artifacts
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          root = Path("generated")
          if not root.exists():
              print("ERROR: generated directory is missing")
              sys.exit(1)

          secret_assignment = re.compile(
              r'(?i)\b(api_token|token|password|authkey|private_key|secret)\b\s*[:=]\s*["\']([^"\']+)["\']'
          )

          allowed_prefixes = ("<TODO_", "var.", "${", "{{")
          findings: list[str] = []

          for path in sorted(root.rglob("*")):
              if not path.is_file():
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for lineno, line in enumerate(text.splitlines(), start=1):
                  match = secret_assignment.search(line)
                  if not match:
                      continue
                  value = match.group(2).strip()
                  if not value:
                      continue
                  if value.startswith(allowed_prefixes):
                      continue
                  findings.append(f"{path}:{lineno}: {line.strip()}")

          if findings:
              print("ERROR: potential secret leaks found in generated artifacts:")
              for row in findings:
                  print(f"  - {row}")
              sys.exit(1)

          print("Secret-safety scan passed")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-topology
          path: build/
          retention-days: 7
