name: Dist Validation (v4 maintenance)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'archive/v4/deploy/Makefile'
      - 'archive/v4/topology-tools/assemble-deploy.py'
      - 'archive/v4/topology-tools/assemble-ansible-runtime.py'
      - 'archive/v4/topology-tools/check-deploy-parity.py'
      - 'archive/v4/topology-tools/check-dist-package.py'
      - 'archive/v4/topology-tools/check-terraform-override-flow.py'
      - 'archive/v4/topology-tools/check-native-inputs.py'
      - 'archive/v4/topology-tools/clean-generated.py'
      - 'archive/v4/topology-tools/materialize-native-inputs.py'
      - 'archive/v4/topology-tools/materialize-dist-inputs.py'
      - 'archive/v4/topology-tools/assemble-terraform-overrides.py'
      - 'archive/v4/topology-tools/validate-dist.py'
      - 'archive/v4/terraform-overrides/**'
      - 'archive/v4/topology-tools/utils/**'
      - 'archive/v4/ansible/**'
      - 'archive/v4-generated/**'
      - 'archive/v4/topology/**'
      - 'archive/v4/topology.yaml'
      - '.github/workflows/dist-validation.yml'
  pull_request:
    paths:
      - 'archive/v4/deploy/Makefile'
      - 'archive/v4/topology-tools/assemble-deploy.py'
      - 'archive/v4/topology-tools/assemble-ansible-runtime.py'
      - 'archive/v4/topology-tools/check-deploy-parity.py'
      - 'archive/v4/topology-tools/check-dist-package.py'
      - 'archive/v4/topology-tools/check-terraform-override-flow.py'
      - 'archive/v4/topology-tools/check-native-inputs.py'
      - 'archive/v4/topology-tools/clean-generated.py'
      - 'archive/v4/topology-tools/materialize-native-inputs.py'
      - 'archive/v4/topology-tools/materialize-dist-inputs.py'
      - 'archive/v4/topology-tools/assemble-terraform-overrides.py'
      - 'archive/v4/topology-tools/validate-dist.py'
      - 'archive/v4/terraform-overrides/**'
      - 'archive/v4/topology-tools/utils/**'
      - 'archive/v4/ansible/**'
      - 'archive/v4-generated/**'
      - 'archive/v4/topology/**'
      - 'archive/v4/topology.yaml'
      - '.github/workflows/dist-validation.yml'
  workflow_dispatch:

jobs:
  validate-dist:
    name: Validate Dist (v4 maintenance)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Install Python and Ansible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ansible-core

      - name: Regenerate topology outputs
        run: python archive/v4/topology-tools/regenerate-all.py --topology archive/v4/topology.yaml --skip-mermaid-validate

      - name: Assemble dist packages
        run: python archive/v4/topology-tools/assemble-deploy.py

      - name: Strict validate dist packages
        run: python archive/v4/topology-tools/validate-dist.py --strict-external

      - name: Check native versus dist parity
        run: python archive/v4/topology-tools/check-deploy-parity.py

      - name: Smoke-test Terraform override flow
        run: python archive/v4/topology-tools/check-terraform-override-flow.py
