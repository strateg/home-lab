name: Dist Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'deploy/Makefile'
      - 'topology-tools/assemble-deploy.py'
      - 'topology-tools/assemble-ansible-runtime.py'
      - 'topology-tools/validate-dist.py'
      - 'topology-tools/utils/**'
      - 'ansible/**'
      - 'generated/**'
      - 'topology/**'
      - 'topology.yaml'
      - '.github/workflows/dist-validation.yml'
  pull_request:
    paths:
      - 'deploy/Makefile'
      - 'topology-tools/assemble-deploy.py'
      - 'topology-tools/assemble-ansible-runtime.py'
      - 'topology-tools/validate-dist.py'
      - 'topology-tools/utils/**'
      - 'ansible/**'
      - 'generated/**'
      - 'topology/**'
      - 'topology.yaml'
      - '.github/workflows/dist-validation.yml'
  workflow_dispatch:

jobs:
  validate-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Install Python and Ansible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ansible-core

      - name: Regenerate topology outputs
        run: python topology-tools/regenerate-all.py --skip-mermaid-validate

      - name: Assemble dist packages
        run: python topology-tools/assemble-deploy.py

      - name: Strict validate dist packages
        run: python topology-tools/validate-dist.py --strict-external
