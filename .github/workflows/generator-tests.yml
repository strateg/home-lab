name: Generator Tests

on:
  push:
    branches: [ main, master, feature/generator-* ]
    paths:
      - 'v4/topology-tools/scripts/generators/**'
      - 'v4/tests/unit/generators/**'
      - 'v4/topology.yaml'
      - 'v4/topology/**'
  pull_request:
    paths:
      - 'v4/topology-tools/scripts/generators/**'
      - 'v4/tests/unit/generators/**'
  workflow_dispatch:

jobs:
  generator-unit-tests:
    name: Generator Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run generator unit tests
        run: |
          pytest v4/tests/unit/generators/ \
            -v \
            --cov=v4/topology-tools/scripts/generators \
            --cov-report=xml \
            --cov-report=term-missing \
            --durations=10

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: generators
          name: generators-py${{ matrix.python-version }}

  generator-integration-tests:
    name: Generator Integration Tests
    runs-on: ubuntu-latest
    needs: generator-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Test docs generator
        run: |
          python v4/topology-tools/generate-docs.py \
            --topology v4/topology.yaml \
            --output v4-generated/test/docs

      - name: Test Proxmox generator
        run: |
          python v4/topology-tools/generate-terraform-proxmox.py \
            --topology v4/topology.yaml \
            --output v4-generated/test/terraform/proxmox

      - name: Verify generated files
        run: |
          test -f v4-generated/test/docs/overview.md
          test -f v4-generated/test/terraform/proxmox/versions.tf
          echo "✓ All generators produced output"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-outputs
          path: v4-generated/test/
          retention-days: 7

  terraform-validation:
    name: Terraform Validation (Phase 3)
    runs-on: ubuntu-latest
    needs: generator-integration-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate baseline
        run: |
          python v4/topology-tools/generate-terraform-proxmox.py \
            --topology v4/topology.yaml \
            --output v4-generated/baseline/proxmox

      - name: Generate test output
        run: |
          python v4/topology-tools/generate-terraform-proxmox.py \
            --topology v4/topology.yaml \
            --output v4-generated/test/proxmox

      - name: Compare outputs (backward compatibility)
        run: |
          python validate_phase3_quick.py || true

      - name: Validate Terraform syntax
        run: |
          cd v4-generated/baseline/proxmox
          terraform init -backend=false
          terraform validate
          terraform fmt -check

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pytest-benchmark memory-profiler

      - name: Run benchmarks
        run: |
          pytest v4/tests/benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30
