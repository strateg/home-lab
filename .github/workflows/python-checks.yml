---
name: Python checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Black check
        run: black --check topology-tools || true

      - name: isort check
        run: isort --check-only topology-tools || true

      - name: mypy
        run: mypy topology-tools --ignore-missing-imports || true

      - name: Run pytest
        run: pytest tests/unit -v
