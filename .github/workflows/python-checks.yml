name: Python Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run (UTC): every Monday at 03:00
    - cron: '0 3 * * 1'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Black + isort
        run: task validate:lint

      - name: Mypy
        run: task validate:typecheck

      - name: Pylint
        run: task validate:pylint

      - name: Run strict gates via Task
        run: task ci:python-checks-core

      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-diagnostics
          path: |
            build/diagnostics/module-growth.json
            build/diagnostics/adr0047-trigger.json
            build/diagnostics/adr0083-reactivation.json
            build/diagnostics/adr0083-reactivation-evidence.md
          if-no-files-found: warn

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run tests
        run: task test:ci-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: tests
          name: tests
          fail_ci_if_error: false

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit detect-secrets

      - name: Run detect-secrets hook
        run: pre-commit run detect-secrets --all-files

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: python -m pip_audit --fail-on high
