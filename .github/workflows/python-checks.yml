name: Python Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run (UTC): every Monday at 03:00
    - cron: '0 3 * * 1'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ADR consistency
        run: python v4/topology-tools/check-adr-consistency.py --strict-titles

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Black check
        run: black --check .

      - name: isort check
        run: isort --check-only .

      - name: Mypy
        run: mypy --config-file pyproject.toml v4/topology-tools

      - name: Pylint
        run: pylint v4/topology-tools

      - name: Verify framework lock (strict)
        run: python v5/topology-tools/verify-framework-lock.py --strict

      - name: Rehearse framework rollback flow
        run: python v5/topology-tools/rehearse-framework-rollback.py

      - name: Validate framework compatibility matrix
        run: python v5/topology-tools/validate-framework-compatibility-matrix.py

      - name: Validate v5 lane (passthrough)
        run: V5_SECRETS_MODE=passthrough python v5/scripts/lane.py validate-v5

  test-v4-maintenance:
    name: Test v4 (maintenance)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest v4/tests/unit -v --cov=v4/topology-tools --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: v4-maintenance
          name: v4-maintenance
          fail_ci_if_error: false

  test-v5-mainline:
    name: Test v5 (mainline)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run v5 tests
        run: python -m pytest v5/tests -v --cov=v5/topology-tools --cov-report=xml:coverage-v5.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-v5.xml
          flags: v5-mainline
          name: v5-mainline
          fail_ci_if_error: false

  dependency-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: python -m pip_audit --fail-on  HIGH || true
