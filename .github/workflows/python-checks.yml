name: Python Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run (UTC): every Monday at 03:00
    - cron: '0 3 * * 1'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ADR 0098: Dual-path parity testing (Python 3.13 + 3.14)
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Black + isort
        run: task validate:lint

      - name: Mypy
        run: task validate:typecheck

      - name: Pylint
        run: task validate:pylint

      - name: Run strict gates via Task
        run: task ci:python-checks-core

      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-diagnostics
          path: |
            build/diagnostics/module-growth.json
            build/diagnostics/adr0047-trigger.json
            build/diagnostics/adr0083-reactivation.json
            build/diagnostics/adr0083-reactivation-evidence.md
            build/diagnostics/cutover/summary.json
            build/diagnostics/cutover/verify-lock.txt
            build/diagnostics/cutover/verify-lock-package-trust-signature.txt
            build/diagnostics/cutover/compile.txt
            build/diagnostics/cutover/compatibility.txt
            build/diagnostics/cutover/audit-entrypoints.txt
            build/diagnostics/cutover/cutover-readiness.txt
            build/diagnostics/cutover/split-rehearsal.json
            build/diagnostics/cutover/split-rehearsal.txt
          if-no-files-found: warn

  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        # ADR 0098: Dual-path parity testing (Python 3.13 + 3.14)
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Setup Task CLI
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run tests
        run: task test:ci-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: tests
          name: tests
          fail_ci_if_error: false

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets

      - name: Run detect-secrets on changed files
        run: |
          python - <<'PY'
          import os
          import subprocess
          exclude_files = (
              r"(archive/.*|\.github/workflows/.*|Migrated_and_archived/.*|manual-scripts/.*|"
              r"projects/.*/secrets/.*|projects/.*/project\.yaml$|projects/.*/framework\.lock\.yaml$|"
              r"tests/(data|fixtures)/.*|tests/.*/fixtures/.*|docs/guides/.*|docs/release-notes/.*|"
              r"docs/NETINSTALL-CLI-INDEX\.md$|docs/NETINSTALL-CLI-VISUAL-GUIDE\.md$|"
              r"docs/framework/FRAMEWORK-V5\.md$|docs/github_analysis/IMPLEMENTATION_GUIDE\.md$|"
              r"docs/runbooks/evidence/.*\.md$|docs/secrets-management\.md$|adr/.*\.md$|configs/glinet/.*|"
              r"taskfiles/validate\.yml$|topology/object-modules/.*/obj\..*\.yaml$|"
              r"topology-tools/plugins/plugins\.yaml$|"
              r"topology-tools/(audit-strict-runtime-entrypoints|bootstrap-project-repo|cutover-readiness-report)\.py$|"
              r"ansible/group_vars/.*\.yml\.example$|ansible/.*\.sh$|ansible/README\.md$|"
              r"bootstrap/.*|configs/vpn/.*|secrets/.*\.yaml$|MIGRATION\.md|\.secrets\.baseline)"
          )

          event_name = os.environ.get("GITHUB_EVENT_NAME", "").strip()
          base_ref = os.environ.get("GITHUB_BASE_REF", "").strip()
          event_before = os.environ.get("GITHUB_EVENT_BEFORE", "").strip()

          if event_name == "pull_request" and base_ref:
              subprocess.run(["git", "fetch", "--no-tags", "--depth=1", "origin", base_ref], check=False)
              diff_range = f"origin/{base_ref}...HEAD"
          elif event_before and event_before != "0000000000000000000000000000000000000000":
              diff_range = f"{event_before}...HEAD"
          else:
              diff_range = "HEAD~1...HEAD"

          diff = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=ACMR", diff_range],
              check=False,
              capture_output=True,
              text=True,
          )
          files = [line.strip() for line in diff.stdout.splitlines() if line.strip()]

          if not files:
              print("detect-secrets: no changed files to scan")
              raise SystemExit(0)

          cmd = ["detect-secrets-hook", "--exclude-files", exclude_files, *files]
          result = subprocess.run(cmd, check=False)
          raise SystemExit(result.returncode)
          PY

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: python -m pip_audit --fail-on high
