name: Lane Validation

on:
  push:
    branches: [ main, master, "feature/**", "fix/**", "topology/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  validate-v4:
    name: Validate v4 Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jinja2 jsonschema

      - name: Run validate-v4
        run: python v5/scripts/lane.py validate-v4

  validate-v5:
    name: Validate v5 Lane
    runs-on: ubuntu-latest
    env:
      DEVKEY_PASSPHRASE: ${{ secrets.DEVKEY_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema

      - name: Install age and sops
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.12.1"
          curl -L "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Unlock secrets
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$DEVKEY_PASSPHRASE" | age -d v5/secrets/devkey.age > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run validate-v5 (inject)
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: python v5/scripts/lane.py validate-v5

      - name: Run validate-v5 (passthrough fallback)
        if: ${{ env.DEVKEY_PASSPHRASE == '' }}
        run: |
          echo "DEVKEY_PASSPHRASE is not configured, running passthrough validation fallback."
          V5_SECRETS_MODE=passthrough python v5/scripts/lane.py validate-v5

      - name: Cleanup secrets key
        if: always()
        run: |
          rm -f ~/.config/sops/age/keys.txt
