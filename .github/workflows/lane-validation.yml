name: Lane Validation (v5 default)

on:
  push:
    branches: [ main, master, "feature/**", "fix/**", "topology/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  validate-v4-maintenance:
    name: Validate v4 Lane (maintenance)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jinja2 jsonschema

      - name: Run validate-v4 (manual maintenance)
        run: python v5/scripts/lane.py validate-v4

  validate-v5:
    name: Validate v5 Lane (default)
    runs-on: ubuntu-latest
    env:
      DEVKEY_PASSPHRASE: ${{ secrets.DEVKEY_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema

      - name: Resolve active project
        run: |
          PROJECT_ID=$(python - <<'PY'
          import yaml
          from pathlib import Path
          payload = yaml.safe_load(Path("v5/topology/topology.yaml").read_text(encoding="utf-8")) or {}
          project = payload.get("project", {})
          active = project.get("active") if isinstance(project, dict) else None
          print(active.strip() if isinstance(active, str) and active.strip() else "home-lab")
          PY
          )
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Verify framework lock (strict)
        run: python v5/topology-tools/verify-framework-lock.py --strict

      - name: Rehearse framework rollback flow
        run: python v5/topology-tools/rehearse-framework-rollback.py

      - name: Validate framework compatibility matrix
        run: python v5/topology-tools/validate-framework-compatibility-matrix.py

      - name: Install age and sops
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.12.1"
          curl -L "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Unlock secrets
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$DEVKEY_PASSPHRASE" | age -d "v5/projects/${PROJECT_ID}/secrets/devkey.age" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run validate-v5 (inject)
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: python v5/scripts/lane.py validate-v5

      - name: Run validate-v5 (passthrough fallback)
        if: ${{ env.DEVKEY_PASSPHRASE == '' }}
        run: |
          echo "DEVKEY_PASSPHRASE is not configured, running passthrough validation fallback."
          V5_SECRETS_MODE=passthrough python v5/scripts/lane.py validate-v5

      - name: Cleanup secrets key
        if: always()
        run: |
          rm -f ~/.config/sops/age/keys.txt
