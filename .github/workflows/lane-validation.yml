name: Lane Validation (v5 default)

on:
  push:
    branches: [ main, master, "feature/**", "fix/**", "topology/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  validate-v4-maintenance:
    name: Validate v4 Lane (maintenance)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      USE_TASK_ORCHESTRATION: "1"
      ALLOW_TASK_FALLBACK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jinja2 jsonschema

      - name: Setup Task CLI
        if: ${{ env.USE_TASK_ORCHESTRATION == '1' }}
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Run validate-v4 (manual maintenance, task-first with fallback)
        run: |
          set -e
          if [ "${USE_TASK_ORCHESTRATION}" = "1" ]; then
            if task validate:v4; then
              exit 0
            fi
            if [ "${ALLOW_TASK_FALLBACK}" != "1" ]; then
              echo "Task orchestration failed and fallback is disabled."
              exit 1
            fi
            echo "Task orchestration failed; executing legacy fallback chain."
          fi
          python scripts/orchestration/lane.py validate-v4

  validate-v5:
    name: Validate v5 Lane (default)
    runs-on: ubuntu-latest
    env:
      USE_TASK_ORCHESTRATION: "1"
      ALLOW_TASK_FALLBACK: "1"
      DEVKEY_PASSPHRASE: ${{ secrets.DEVKEY_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema

      - name: Resolve active project
        run: |
          PROJECT_ID=$(python - <<'PY'
          import yaml
          from pathlib import Path
          payload = yaml.safe_load(Path("topology/topology.yaml").read_text(encoding="utf-8")) or {}
          project = payload.get("project", {})
          active = project.get("active") if isinstance(project, dict) else None
          print(active.strip() if isinstance(active, str) and active.strip() else "home-lab")
          PY
          )
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Setup Task CLI
        if: ${{ env.USE_TASK_ORCHESTRATION == '1' }}
        uses: arduino/setup-task@v2
        with:
          version: 3.45.4

      - name: Install age and sops
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.12.1"
          curl -L "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o sops
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Unlock secrets
        if: ${{ env.DEVKEY_PASSPHRASE != '' }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$DEVKEY_PASSPHRASE" | age -d "projects/${PROJECT_ID}/secrets/devkey.age" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run strict lane gate (task-first with explicit fallback)
        run: |
          set -e
          if [ "${USE_TASK_ORCHESTRATION}" = "1" ]; then
            if [ -n "${DEVKEY_PASSPHRASE}" ]; then
              if task ci:lane-v5-inject; then
                exit 0
              fi
            else
              if task ci:lane-v5-passthrough; then
                exit 0
              fi
            fi
            if [ "${ALLOW_TASK_FALLBACK}" != "1" ]; then
              echo "Task orchestration failed and fallback is disabled."
              exit 1
            fi
            echo "Task orchestration failed; executing legacy fallback chain."
          fi

          python topology-tools/verify-framework-lock.py --strict
          python topology-tools/rehearse-framework-rollback.py
          python topology-tools/validate-framework-compatibility-matrix.py
          python topology-tools/audit-strict-runtime-entrypoints.py

          if [ -n "${DEVKEY_PASSPHRASE}" ]; then
            python scripts/orchestration/lane.py validate-v5
          else
            echo "DEVKEY_PASSPHRASE is not configured, running passthrough validation fallback."
            V5_SECRETS_MODE=passthrough python scripts/orchestration/lane.py validate-v5
          fi

      - name: Cleanup secrets key
        if: always()
        run: |
          rm -f ~/.config/sops/age/keys.txt
