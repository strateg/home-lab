# Orange Pi 5 Monitoring Stack
# Prometheus, Alertmanager, Loki, Grafana, secondary DNS

- id: svc-adguard-secondary
  name: AdGuard Home Secondary
  type: dns
  ports:
    dns: 5353
    web_ui: 3001
  protocol: http
  trust_zone_ref: servers-mon
  url_derived: true
  url_port: 3001
  description: Secondary DNS for redundancy (synced with primary)
  optional: true
  sync_with: svc-adguard
  data_asset_refs:
  - data-adguard-secondary
  security_policy_ref: sec-baseline
  runtime:
    type: docker
    target_ref: srv-orangepi5
    network_binding_ref: net-servers
    image: adguard/adguardhome

- id: svc-prometheus
  name: Prometheus
  type: monitoring
  port: 9090
  protocol: http
  trust_zone_ref: servers-mon
  url_derived: true
  description: Prometheus metrics collection
  ip_refs:
    mikrotik:
      host_os_ref: hos-rtr-mikrotik-routeros
      network_ref: net-lan
    proxmox:
      host_os_ref: hos-srv-gamayun-proxmox
      network_ref: net-lan
    orangepi5:
      host_os_ref: hos-srv-orangepi5-ubuntu
      network_ref: net-servers
    postgresql:
      lxc_ref: lxc-postgresql
      network_ref: net-servers
    redis:
      lxc_ref: lxc-redis
      network_ref: net-servers
  scrape_targets:
  - name: mikrotik
    type: snmp
    target: '{{ ip_refs.mikrotik }}'
  - name: proxmox
    type: node_exporter
    target: '{{ ip_refs.proxmox }}:9100'
  - name: srv-orangepi5
    type: node_exporter
    target: '{{ ip_refs.orangepi5 }}:9100'
  - name: postgresql
    type: postgres_exporter
    target: '{{ ip_refs.postgresql }}:9187'
  - name: redis
    type: redis_exporter
    target: '{{ ip_refs.redis }}:9121'
  data_asset_refs:
  - data-prometheus
  config:
    docker:
      ports:
      - 9090:9090
      volumes:
      - /mnt/nvme/prometheus:/prometheus
  security_policy_ref: sec-baseline
  runtime:
    type: docker
    target_ref: srv-orangepi5
    network_binding_ref: net-servers
    image: prom/prometheus:latest

- id: svc-alertmanager
  name: Alertmanager
  type: alerting
  port: 9093
  protocol: http
  trust_zone_ref: servers-mon
  url_derived: true
  description: Alert routing and notifications
  dependencies:
  - service_ref: svc-prometheus
  notification_channels:
  - type: email
    enabled: true
  - type: telegram
    enabled: false
  data_asset_refs:
  - data-alertmanager
  security_policy_ref: sec-baseline
  runtime:
    type: docker
    target_ref: srv-orangepi5
    network_binding_ref: net-servers
    image: prom/alertmanager:latest

- id: svc-loki
  name: Loki
  type: logging
  port: 3100
  protocol: http
  trust_zone_ref: servers-mon
  description: Centralized log aggregation
  ip_refs:
    mikrotik:
      host_os_ref: hos-rtr-mikrotik-routeros
      network_ref: net-lan
    proxmox:
      host_os_ref: hos-srv-gamayun-proxmox
      network_ref: net-lan
    orangepi5:
      host_os_ref: hos-srv-orangepi5-ubuntu
      network_ref: net-servers
  log_sources:
  - name: mikrotik
    type: syslog
    target: '{{ ip_refs.mikrotik }}'
  - name: proxmox
    type: promtail
    target: '{{ ip_refs.proxmox }}'
  - name: srv-orangepi5
    type: promtail
    target: '{{ ip_refs.orangepi5 }}'
  - name: docker
    type: docker-driver
  data_asset_refs:
  - data-loki
  security_policy_ref: sec-baseline
  runtime:
    type: docker
    target_ref: srv-orangepi5
    network_binding_ref: net-servers
    image: grafana/loki:latest

- id: svc-grafana
  name: Grafana
  type: visualization
  port: 3000
  protocol: http
  trust_zone_ref: servers-mon
  domain: grafana.home.local
  url: http://grafana.home.local:3000
  description: Grafana dashboards and visualization
  dependencies:
  - service_ref: svc-prometheus
  data_asset_refs:
  - data-grafana
  config:
    docker:
      ports:
      - 3000:3000
      volumes:
      - /mnt/nvme/grafana:/var/lib/grafana
  security_policy_ref: sec-baseline
  runtime:
    type: docker
    target_ref: srv-orangepi5
    network_binding_ref: net-servers
    image: grafana/grafana:latest
