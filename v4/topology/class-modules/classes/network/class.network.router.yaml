id: class.network.router
version: 1.0.0
title: Network Router

required_capabilities:
  - cap.router.routing.static
  - cap.router.nat
  - cap.router.firewall.stateful

optional_capabilities:
  - cap.router.dhcp.server
  - cap.router.wireguard.endpoint
  - cap.router.qos.basic
  - cap.router.vlan
  - cap.router.bgp
  - cap.router.vrf

capability_packs:
  - pack.router.home
  - pack.router.infra

invariants:
  - object.enabled_capabilities must include all required_capabilities
  - instance.overrides must not disable required capabilities
