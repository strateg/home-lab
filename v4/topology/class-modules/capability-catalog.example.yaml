version: 1
capabilities:
  - id: cap.router.routing.static
    title: Static Routing
    summary: Supports static routes for IPv4/IPv6 traffic forwarding.
    stability: stable
  - id: cap.router.nat
    title: NAT
    summary: Supports source/destination network address translation.
    stability: stable
  - id: cap.router.firewall.stateful
    title: Stateful Firewall
    summary: Supports stateful filtering policies.
    stability: stable
  - id: cap.router.dhcp.server
    title: DHCP Server
    summary: Supports DHCP lease management for local subnets.
    stability: stable
  - id: cap.router.wireguard.endpoint
    title: WireGuard Endpoint
    summary: Supports WireGuard tunnel endpoint mode.
    stability: stable
  - id: cap.router.qos.basic
    title: Basic QoS
    summary: Supports traffic priority and simple shaping.
    stability: stable
  - id: cap.router.vlan
    title: VLAN
    summary: Supports 802.1Q VLAN interfaces and tagging.
    stability: stable
  - id: cap.router.bgp
    title: BGP
    summary: Supports Border Gateway Protocol peering.
    stability: experimental
  - id: cap.router.vrf
    title: VRF
    summary: Supports virtual routing and forwarding domains.
    stability: experimental
