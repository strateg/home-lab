schema_version: 1
generated_from_adr: "0096"
purpose: "Compact ADR-derived rule registry for universal AI coding agents."

adapters:
  files:
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".github/copilot-instructions.md"
    - ".codex/AGENTS.md"
    - ".codex/rules/tech-lead-architect.md"
  required_refs:
    - "docs/ai/AGENT-RULEBOOK.md"
    - "docs/ai/ADR-RULE-MAP.yaml"

rule_packs:
  plugin-runtime:
    path: docs/ai/rules/plugin-runtime.md
    source_adr: ["0063", "0065", "0066", "0069", "0078", "0080", "0086"]
    files_glob:
      - "topology-tools/plugins/**"
      - "topology/**/plugins.yaml"
      - "topology-tools/kernel/**"
      - "topology-tools/plugin_manifest_discovery.py"
      - "topology-tools/compiler_runtime.py"
      - "topology-tools/compiler_*.py"
  topology-model:
    path: docs/ai/rules/topology-model.md
    source_adr: ["0026", "0027", "0029", "0038", "0039", "0040", "0041", "0042", "0043", "0044", "0047", "0062", "0064", "0067", "0068", "0071", "0087", "0088"]
    files_glob:
      - "topology/**"
      - "projects/*/topology/**"
  deploy-domain:
    path: docs/ai/rules/deploy-domain.md
    source_adr: ["0051", "0052", "0056", "0057", "0083", "0084", "0085", "0090", "0091"]
    files_glob:
      - "scripts/orchestration/deploy/**"
      - "taskfiles/deploy.yml"
      - "taskfiles/product.yml"
      - "schemas/deploy-*.schema.json"
      - "schemas/initialization-contract.schema.json"
  generator-artifacts:
    path: docs/ai/rules/generator-artifacts.md
    source_adr: ["0027", "0046", "0050", "0055", "0074", "0075", "0078", "0079", "0092", "0093"]
    files_glob:
      - "topology-tools/plugins/generators/**"
      - "topology/**/templates/**"
      - "topology-tools/templates/**"
      - "tests/fixtures/projections/**"
  secrets:
    path: docs/ai/rules/secrets.md
    source_adr: ["0072", "0073", "0085", "0094"]
    files_glob:
      - "projects/*/secrets/**"
      - "topology-tools/plugins/**/annotation*"
      - "taskfiles/*tfvars*"
      - "scripts/orchestration/deploy/bundle.py"
  adr-governance:
    path: docs/ai/rules/adr-governance.md
    source_adr: ["0080", "0095", "0096"]
    files_glob:
      - "adr/**"
      - "docs/ai/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".github/copilot-instructions.md"
      - ".codex/**"
  testing-ci:
    path: docs/ai/rules/testing-ci.md
    source_adr: ["0066", "0070", "0077", "0080", "0086"]
    files_glob:
      - "tests/**"
