      - ".github/workflows/**"
  acceptance-tuc:
    path: docs/ai/rules/acceptance-tuc.md
    source_adr: ["0066", "0070", "0069", "0071", "0080", "0089", "0091"]
    files_glob:
      - "acceptance-testing/**"
      - "tests/plugin_integration/test_tuc*.py"
      - "scripts/acceptance/**"
      - "taskfiles/acceptance.yml"

rules:
  # === ALWAYS-LOAD CORE RULES ===

  - id: CORE-001
    scope: root-layout
    trigger: "Any repository change"
    must:
      - "Work in active root layout: topology/, topology-tools/, projects/, tests/, scripts/, taskfiles/."
    never:
      - "Do not create root v4/ or root v5/ directories."
      - "Do not modify archive/v4/ unless explicitly requested for legacy hotfix or parity investigation."
    validate:
      - "task validate:workspace-layout"
    source_adr: ["0075", "0080", "0086"]

  - id: CORE-002
    scope: generated-output
    trigger: "Any generated output request"
    must:
      - "Modify sources (topology, generators, templates), then regenerate."
    never:
      - "Do not edit generated/ by hand."
    validate:
      - "task validate:default"
      - "relevant generator test"
    source_adr: ["0074", "0075", "0080"]

  - id: CORE-003
    scope: topology-model
    trigger: "Any topology/model change"
    must:
      - "Preserve Class -> Object -> Instance source-of-truth model."
    never:
      - "Do not bypass topology with generated/manual artifacts."
    validate:
      - "task validate:default"
    source_adr: ["0062", "0071", "0088"]

  - id: CORE-004
    scope: plugin-runtime
    trigger: "Any plugin/runtime change"
    must:
      - "Preserve stage affinity and manifest contracts."
    never:
      - "Do not add hidden plugin coupling outside depends_on, consumes, produces."
    validate:
      - "task validate:plugin-manifests"
      - "task test:plugin-contract"
    source_adr: ["0063", "0065", "0080", "0086"]

  - id: CORE-005
    scope: framework-runtime
    trigger: "Any framework/runtime change"
    must:
      - "Refresh and verify framework.lock when framework integrity changes."
    never:
      - "Do not leave strict lock stale."
    validate:
      - "task framework:lock-refresh"
      - "task framework:strict"
    source_adr: ["0076", "0081"]

  - id: CORE-006
    scope: secrets
    trigger: "Any secrets-sensitive change"
    must:
      - "Keep secrets encrypted and resolved only through approved SOPS/age and bundle injection paths."
    never:
      - "Do not commit plaintext secrets."
    validate:
      - "task validate:default"
      - "relevant secrets tests"
    source_adr: ["0072", "0073", "0085"]

  - id: CORE-007
    scope: adr-governance
    trigger: "Any architectural change"
    must:
      - "Add or update ADR/register/analysis artifacts."
    never:
      - "Do not treat architecture changes as complete without ADR governance."
    validate:
      - "task validate:adr-consistency"
    source_adr: ["0080", "0096"]

  - id: CORE-008
    scope: testing-ci
    trigger: "Any substantial code change"
    must:
      - "Run targeted tests plus the narrowest relevant task gate."
      - "Run task ci before integration-level closure when feasible."
    never:
      - "Do not claim validation without command evidence."
    validate:
      - "targeted pytest"
      - "task ci"
    source_adr: ["0066", "0077"]

  - id: CORE-009
    scope: ai-commit-accountability
    trigger: "Any AI-assisted commit preparation"
    must:
      - "Include commit metadata lines: AI-Agent: <agent_name> and AI-Tokens: <tokens_used_for_commit_work>."
      - "Record the AI-Tokens value from agent/runtime token usage telemetry used to prepare the committed work."
    never:
      - "Do not finalize AI-assisted commits without AI-Agent and AI-Tokens metadata."
    validate:
      - "git log -1 --pretty=%B"
      - "manual review of AI-Tokens value against agent/runtime usage telemetry"
    source_adr: ["0096"]

  # === SCOPED DOMAIN RULES ===

  - id: PLG-001
    scope: plugin-runtime
    trigger: "Adding or modifying plugins, plugin manifests, or kernel runtime contracts"
    rule_pack: plugin-runtime
    must:
      - "Preserve stage affinity: discover, compile, validate, generate, assemble, build."
      - "Declare depends_on, consumes, and produces explicitly."
      - "Respect framework -> class -> object -> project discovery order."
    never:
      - "Do not add hidden plugin coupling outside manifest contracts."
    validate:
      - "task validate:plugin-manifests"
      - "task test:plugin-contract"
    source_adr: ["0063", "0065", "0080", "0086"]

  - id: TOP-001
    scope: topology-model
    trigger: "Adding or modifying topology, class, object, or instance files"
    rule_pack: topology-model
    must:
      - "Preserve Class -> Object -> Instance modeling."
      - "Use canonical semantic keys and active lane paths."
    never:
      - "Do not edit generated outputs to represent topology changes."
    validate:
      - "task validate:default"
    source_adr: ["0062", "0064", "0067", "0068", "0071", "0087", "0088"]

  - id: GEN-001
    scope: generator-artifacts
    trigger: "Changing generated artifact behavior"
    rule_pack: generator-artifacts
    must:
      - "Change generators, projections, or templates rather than generated/ outputs."
      - "Update golden snapshots only for intentional stable contract changes."
    never:
      - "Do not hand-edit generated/."
    validate:
      - "task test:plugin-integration"
      - "relevant terraform/ansible validation task when outputs change"
    source_adr: ["0046", "0050", "0074", "0075", "0078", "0079", "0092", "0093", "0094"]

  - id: DEP-001
    scope: deploy-domain
    trigger: "Changing deploy runner, bundle, init-node, or product workflows"
    rule_pack: deploy-domain
    must:
      - "Keep immutable deploy bundle as execution input."
      - "Execute deploy operations through workspace-aware DeployRunner backends."
    never:
      - "Do not reintroduce direct generated/ execution as the canonical deploy path."
    validate:
      - "relevant deploy runner/bundle tests"
      - "task workflow:bundle when bundle behavior changes"
    source_adr: ["0051", "0052", "0056", "0083", "0084", "0085", "0090", "0091"]

  - id: SEC-001
    scope: secrets
    trigger: "Changing secrets, secret annotations, tfvars, deploy bundle injection, or AI prompts"
    rule_pack: secrets
    must:
      - "Keep committed secrets encrypted or represented as placeholders."
      - "Use SOPS/age and approved bundle injection paths."
      - "Apply redaction before AI advisory or assisted workflows."
    never:
      - "Do not commit plaintext secrets."
      - "Do not include secrets in AI prompts or audit logs."
    validate:
      - "task validate:default"
      - "task test:ai-redaction"
    source_adr: ["0072", "0073", "0085", "0094"]

  - id: ADR-001
    scope: adr-governance
    trigger: "Any architecture, governance, or rulebook change"
    rule_pack: adr-governance
    must:
      - "Update ADR files and adr/REGISTER.md together."
      - "Keep agent-specific instruction files as adapters to the universal rulebook."
    never:
      - "Do not create divergent architectural truth in AGENTS.md, CLAUDE.md, or Copilot instructions."
    validate:
      - "task validate:adr-consistency"
    source_adr: ["0080", "0095", "0096"]

  - id: TST-001
    scope: testing-ci
    trigger: "Any code, contract, or workflow change"
    rule_pack: testing-ci
    must:
      - "Run targeted tests for the touched domain."
      - "Run task ci before integration-level closure when feasible."
    never:
      - "Do not claim validation without command evidence."
    validate:
      - "targeted pytest"
      - "task ci"
    source_adr: ["0066", "0070", "0077", "0080"]

  - id: TUC-001
    scope: acceptance-tuc
    trigger: "Adding or modifying Testing Use Case acceptance scenarios"
    rule_pack: acceptance-tuc
    must:
      - "Create one folder per use case under acceptance-testing/TUC-XXXX-short-name/."
      - "Use acceptance-testing/TUC-TEMPLATE/ as the baseline for new TUCs."
      - "Keep contract, plan, matrix, evidence, quality gate, and artifacts/logs inside the TUC folder."
      - "Add executable pytest coverage under tests/plugin_integration/test_tuc*.py."
    never:
      - "Do not scatter TUC evidence across ADR analysis directories."
      - "Do not expand an existing TUC scope when a new scenario should get a new TUC number."
    validate:
      - "task acceptance:quality TUC_SLUG=TUC-XXXX-short-name"
      - "task acceptance:test TUC_TEST='tests/plugin_integration/test_tucXXXX_*.py'"
      - "task acceptance:compile TUC_SLUG=TUC-XXXX-short-name when compile artifacts are part of evidence"
      - "task acceptance:tests-all before release/cutover closure"
    source_adr: ["0070", "0066", "0069", "0071", "0080"]
