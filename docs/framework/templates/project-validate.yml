name: Validate Project (framework submodule)

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema jinja2

      - name: Resolve framework paths
        run: |
          if [ -f framework/topology-tools/verify-framework-lock.py ]; then
            echo "FRAMEWORK_TOOLS=framework/topology-tools" >> "$GITHUB_ENV"
            echo "FRAMEWORK_MANIFEST=framework/framework.yaml" >> "$GITHUB_ENV"
          else
            echo "FRAMEWORK_TOOLS=framework/v5/topology-tools" >> "$GITHUB_ENV"
            echo "FRAMEWORK_MANIFEST=framework/v5/topology/framework.yaml" >> "$GITHUB_ENV"
          fi

      - name: Verify framework lock
        run: |
          python "$FRAMEWORK_TOOLS/verify-framework-lock.py" --repo-root . --project-root . --project-manifest ./project.yaml --framework-root ./framework --framework-manifest "$FRAMEWORK_MANIFEST" --lock-file ./framework.lock.yaml --strict

      - name: Compile topology
        run: |
          python "$FRAMEWORK_TOOLS/compile-topology.py" --repo-root . --topology ./topology.yaml --secrets-mode passthrough --output-json ./generated/effective-topology.json --diagnostics-json ./generated/diagnostics.json --diagnostics-txt ./generated/diagnostics.txt
