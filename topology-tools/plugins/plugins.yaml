    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, require all refs to be pinned in model.lock
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
      - from_plugin: base.compiler.model_lock_loader
        key: lock_payload
        required: false
      - from_plugin: base.compiler.model_lock_loader
        key: model_lock_loaded
        required: false
    description: Validates that class_ref and object_ref are pinned in model.lock (ADR 0063)

