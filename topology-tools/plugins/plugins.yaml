      sunset_policy_path: topology-tools/data/generator-sunset-policy.yaml
    config_schema:
      type: object
      properties:
        sunset_today:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Optional fixed date override (YYYY-MM-DD) for deterministic CI/tests.
        sunset_policy_path:
          type: string
          description: Path to ADR0093 sunset policy YAML (repo-relative or absolute).
        sunset_schedule:
          type: object
          description: >
            Optional inline overrides for ADR0093 sunset policy.
            Keys are generator plugin IDs; values override file-based policy.
          additionalProperties:
            type: object
            properties:
              compatibility_sunset:
                type: string
                pattern: '^\d{4}-\d{2}-\d{2}$'
              hard_error_date:
                type: string
                pattern: '^\d{4}-\d{2}-\d{2}$'
            required: [compatibility_sunset, hard_error_date]
      required: []
    produces:
      - key: generator_sunset_summary
        scope: pipeline_shared
    description: Enforces ADR0093 sunset policy; scheduled legacy targets warn before hard_error_date and fail at/after hard_error_date.

