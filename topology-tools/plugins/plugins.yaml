    depends_on: []
    timeout: 30
    subinterpreter_compatible: true  # Pure JSON, no templates (ADR 0097 Wave 3)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: generated_files
        scope: pipeline_shared
      - key: effective_json_path
        scope: pipeline_shared
    description: Emits effective topology JSON from compiled model (ADR 0069 WS4).

  - id: base.generator.effective_yaml
