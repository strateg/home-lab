  # Generator plugins (run in generate stage)
  #
  # Generator Plugin Contract Conventions:
  # --------------------------------------
  # - stage: generate
  # - order: 190-199 for core generators (effective_json, effective_yaml)
  #          200-299 for infrastructure generators (terraform, ansible)
  #          300-399 for bootstrap generators
  # - input: ctx.compiled_json (authoritative compiled model)
  # - output: files written to artifacts_root via base_generator helpers
  # - depends_on: typically [] (generators are independent after compile stage)
  #
  # Template-based generators should:
  # 1. Extend BaseGenerator from generators/base_generator.py
  # 2. Build projection view from ctx.compiled_json (not raw topology)
  # 3. Use render_template() with projection as context
  # 4. Use write_text_atomic() for deterministic file writes
  # 5. Use sort_records() for stable output ordering
  #
  - id: base.generator.effective_json
    kind: generator
    entry: generators/effective_json_generator.py:EffectiveJsonGenerator
    api_version: "1.x"
    stages: [generate]
    phase: run
    order: 190
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: generated_files
        scope: pipeline_shared
      - key: effective_json_path
        scope: pipeline_shared
    description: Emits effective topology JSON from compiled model (ADR 0069 WS4).

  - id: base.generator.effective_yaml
    kind: generator
    entry: generators/effective_yaml_generator.py:EffectiveYamlGenerator
    api_version: "1.x"
    stages: [generate]
    phase: run
    order: 200
    depends_on: []
    timeout: 30
    config:
      output_filename: effective-topology.yaml
    config_schema:
      type: object
      properties:
        output_filename:
          type: string
          description: Filename for generated effective YAML artifact.
      required: []
    produces:
      - key: generated_files
        scope: pipeline_shared
      - key: effective_yaml_path
        scope: pipeline_shared
    description: Emits effective topology YAML from compiled model (ADR 0069 WS4 seed).

  - id: base.generator.docs
    kind: generator
    entry: generators/docs_generator.py:DocsGenerator
    api_version: "1.x"
    stages: [generate]
    phase: post
    order: 220
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: generated_dir
        scope: pipeline_shared
      - key: generated_files
        scope: pipeline_shared
      - key: docs_files
        scope: pipeline_shared
      - key: docs_projection
        scope: pipeline_shared
    description: Emits baseline markdown docs artifacts from v5 compiled model projection.

  - id: base.generator.diagrams
    kind: generator
    entry: generators/diagram_generator.py:DiagramGenerator
    api_version: "1.x"
    stages: [generate]
    phase: post
    order: 225
    depends_on: []
    timeout: 60
    config:
      # icon mode: icon-nodes | compat | none  (ADR 0027)
      mermaid_icon_mode: none
    config_schema:
      type: object
      properties:
        mermaid_icon_mode:
          type: string
          enum: [icon-nodes, compat, none]
          description: >
            Mermaid rendering mode (ADR 0027): icon-nodes uses @{ icon } syntax,
            compat uses labelled plain nodes, none disables icons entirely.
        icon_pack_search_roots:
          type: array
          items:
            type: string
          description: >
            Optional filesystem roots used to discover local Iconify packs under
            node_modules/@iconify-json for icon-node SVG cache emission.
      required: []
    produces:
      - key: diagram_dir
        scope: pipeline_shared
      - key: generated_files
        scope: pipeline_shared
      - key: diagram_files
        scope: pipeline_shared
    description: >
      Emits Mermaid topology diagram pages (physical + network) from v5 compiled model.
      Supports icon-nodes, compat, and plain modes (ADR 0005, ADR 0027).

  # Object-scoped generators are registered in module manifests:
  # - topology/object-modules/proxmox/plugins.yaml
  # - topology/object-modules/mikrotik/plugins.yaml
  # - topology/object-modules/orangepi/plugins.yaml

