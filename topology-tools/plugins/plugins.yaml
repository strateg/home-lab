schema_version: 1
plugins:
  # Discover plugins (run in discover stage)
  - id: base.discover.manifest_loader
    kind: discoverer
    entry: discoverers/discover_manifest_loader.py:DiscoverManifestLoaderCompiler
    api_version: "1.x"
    stages: [discover]
    phase: init
    order: 10
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: manifest_loader_summary
        scope: pipeline_shared
    description: Loads class/object module plugin manifests during discover bootstrap.

  - id: base.discover.inventory
    kind: discoverer
    entry: discoverers/discover_inventory.py:DiscoverInventoryCompiler
    api_version: "1.x"
    stages: [discover]
    phase: run
    order: 20
    depends_on: [base.discover.manifest_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.discover.manifest_loader
        key: manifest_loader_summary
        required: false
    produces:
      - key: manifest_inventory
        scope: pipeline_shared
    description: Publishes discovered plugin manifests inventory for discover-stage traceability.

  - id: base.discover.boundary
    kind: discoverer
    entry: discoverers/discover_boundary.py:DiscoverBoundaryCompiler
    api_version: "1.x"
    stages: [discover]
    phase: pre
    order: 15
    depends_on: [base.discover.manifest_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.discover.manifest_loader
        key: manifest_loader_summary
        required: false
    produces:
      - key: boundary_ok
        scope: pipeline_shared
    description: Enforces framework/project plugin manifest boundary during discover stage.

  - id: base.discover.capability_preflight
    kind: discoverer
    entry: discoverers/discover_capability_preflight.py:DiscoverCapabilityPreflightCompiler
    api_version: "1.x"
    stages: [discover]
    phase: verify
    order: 40
    depends_on: [base.discover.inventory, base.discover.boundary]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.discover.inventory
        key: manifest_inventory
        required: false
      - from_plugin: base.discover.boundary
        key: boundary_ok
        required: false
    produces:
      - key: capability_preflight_ok
        scope: pipeline_shared
    description: Verifies capability contract files are present before compile/validate execution.

  # Compiler plugins (run in compile stage)
  - id: base.compiler.capabilities
    kind: compiler
    entry: compilers/capability_compiler.py:CapabilityCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 50
    depends_on: [base.compiler.module_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: capability_stats
        scope: pipeline_shared
      - key: derived_capabilities
        scope: pipeline_shared
    description: Derives capabilities from class/object definitions (ADR 0063 Phase 3 example)

  - id: base.compiler.module_loader
    kind: compiler
    entry: compilers/module_loader_compiler.py:ModuleLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    phase: init
    order: 30
    depends_on: []
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3A envelope-model cutover
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: class_map
        scope: pipeline_shared
      - key: object_map
        scope: pipeline_shared
      - key: class_module_paths
        scope: pipeline_shared
      - key: object_module_paths
        scope: pipeline_shared
    description: Loads class/object module maps for plugin-first pipeline (ADR 0069).

  - id: base.compiler.model_lock_loader
    kind: compiler
    entry: compilers/model_lock_loader_compiler.py:ModelLockLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    phase: init
    order: 35
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: lock_payload
        scope: pipeline_shared
      - key: model_lock_loaded
        scope: pipeline_shared
    description: Loads model.lock payload for plugin-first pipeline (ADR 0069).

  - id: base.compiler.annotation_resolver
    kind: compiler
    entry: compilers/annotation_resolver_compiler.py:AnnotationResolverCompiler
    api_version: "1.x"
    stages: [compile]
    phase: init
    order: 38
    depends_on: []
    timeout: 30
    config:
      format_registry_path: ../data/instance-field-formats.yaml
    config_schema:
      type: object
      properties:
        format_registry_path:
          type: string
          description: Path to annotation value format registry.
      required: []
    produces:
      - key: object_annotations
        scope: pipeline_shared
      - key: object_secret_annotations
        scope: pipeline_shared
      - key: row_annotations_by_instance
        scope: pipeline_shared
      - key: annotation_formats
        scope: pipeline_shared
    description: Parses field annotations once and publishes normalized annotation indexes.
  - id: base.compiler.instance_rows_secret_resolve
    kind: compiler
    entry: compilers/instance_rows_secret_resolve_compiler.py:InstanceRowsSecretResolveCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 39
    depends_on: [base.compiler.annotation_resolver]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3B annotation/secret-resolution cutover
    config:
      secrets_mode: passthrough
      secrets_root: projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    produces:
      - key: secret_resolved_rows
        scope: stage_local
    consumes:
      - from_plugin: base.compiler.annotation_resolver
        key: annotation_formats
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: object_secret_annotations
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: row_annotations_by_instance
        required: false
    description: Resolves semantic row keys, annotations, and side-car secrets into stage-local rows.

  - id: base.compiler.instance_rows_resolve
    kind: compiler
    entry: compilers/instance_rows_resolve_compiler.py:InstanceRowsResolveCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 40
    depends_on: [base.compiler.instance_rows_secret_resolve, base.compiler.annotation_resolver]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3B raw-row resolution cutover
    config:
      secrets_mode: passthrough
      secrets_root: projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    produces:
      - key: resolved_rows
        scope: stage_local
    consumes:
      - from_plugin: base.compiler.instance_rows_secret_resolve
        key: secret_resolved_rows
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: annotation_formats
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: object_secret_annotations
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: row_annotations_by_instance
        required: false
    description: Applies duplicate and identifier validation to secret-resolved rows before shape preparation.

  - id: base.compiler.instance_rows_prepare
    kind: compiler
    entry: compilers/instance_rows_prepare_compiler.py:InstanceRowsPrepareCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 41
    depends_on: [base.compiler.instance_rows_resolve, base.compiler.annotation_resolver]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3B pre-normalization cutover
    config:
      secrets_mode: passthrough
      secrets_root: projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    produces:
      - key: prepared_rows
        scope: stage_local
    consumes:
      - from_plugin: base.compiler.instance_rows_resolve
        key: resolved_rows
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: annotation_formats
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: object_secret_annotations
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: row_annotations_by_instance
        required: false
    description: Resolves class/object refs and builds prepared instance rows before shape validation.

  - id: base.compiler.instance_rows_validate
    kind: compiler
    entry: compilers/instance_rows_validate_compiler.py:InstanceRowsValidateCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 42
    depends_on: [base.compiler.instance_rows_prepare, base.compiler.instance_rows_resolve, base.compiler.instance_rows_secret_resolve]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3B row-shape validation cutover
    config:
      secrets_mode: passthrough
      secrets_root: projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    produces:
      - key: validated_rows
        scope: stage_local
    consumes:
      - from_plugin: base.compiler.instance_rows_prepare
        key: prepared_rows
        required: false
    description: Validates prepared instance-row shape and builds stage-local normalized row payloads.

  - id: base.compiler.instance_rows
    kind: compiler
    entry: compilers/instance_rows_compiler.py:InstanceRowsCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 43
    depends_on: [base.compiler.instance_rows_validate, base.compiler.instance_rows_prepare, base.compiler.instance_rows_resolve, base.compiler.instance_rows_secret_resolve, base.compiler.annotation_resolver]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3B envelope-model cutover
    config:
      secrets_mode: passthrough
      secrets_root: projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    produces:
      - key: normalized_rows
        scope: pipeline_shared
    consumes:
      - from_plugin: base.compiler.instance_rows_validate
        key: validated_rows
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: annotation_formats
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: object_secret_annotations
        required: false
      - from_plugin: base.compiler.annotation_resolver
        key: row_annotations_by_instance
        required: false
    description: Publishes authoritative normalized instance rows after staged resolve/prepare/validate cutover.

  - id: base.compiler.capability_contract_loader
    kind: compiler
    entry: compilers/capability_contract_loader_compiler.py:CapabilityContractLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    phase: init
    order: 45
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: catalog_ids
        scope: pipeline_shared
      - key: packs_map
        scope: pipeline_shared
    description: Loads capability catalog and packs contract for plugin-first pipeline.

  - id: base.compiler.soho_profile_resolver
    kind: compiler
    entry: compilers/soho_profile_resolver_compiler.py:SohoProfileResolverCompiler
    api_version: "1.x"
    stages: [compile]
    phase: run
    order: 55
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: soho_profile_resolution
        scope: pipeline_shared
      - key: effective_product_bundles
        scope: pipeline_shared
      - key: available_product_bundles
        scope: pipeline_shared
    description: Resolves ADR0089 canonical SOHO profile contract and effective required bundle set.

  - id: base.compiler.effective_model
    kind: compiler
    entry: compilers/effective_model_compiler.py:EffectiveModelCompiler
    api_version: "1.x"
    stages: [compile]
    phase: finalize
    compiled_json_owner: true
    order: 60
    depends_on: [base.compiler.module_loader, base.compiler.capabilities, base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # ADR 0097 Wave 3A envelope-model cutover
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    produces:
      - key: effective_model_candidate
        scope: pipeline_shared
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Assembles candidate effective model in compile stage (ADR 0069 WS2).

  # Validator plugins (run in validate stage)
  - id: base.validator.governance_contract
    kind: validator_yaml
    entry: validators/governance_contract_validator.py:GovernanceContractValidator
    api_version: "1.x"
    stages: [validate]
    phase: pre
    order: 90
    depends_on: []
    timeout: 30
    subinterpreter_compatible: false  # Uses YAML source parsing (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates v5 root governance contract (version/model/framework/project/meta).

  - id: base.validator.foundation_layout
    kind: validator_yaml
    entry: validators/foundation_layout_validator.py:FoundationLayoutValidator
    api_version: "1.x"
    stages: [validate]
    phase: pre
    order: 95
    depends_on: [base.validator.governance_contract]
    timeout: 30
    subinterpreter_compatible: false  # Uses YAML source parsing (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates class/object module root paths and baseline YAML/plugin layout.

  - id: base.validator.foundation_include_contract
    kind: validator_yaml
    entry: validators/foundation_include_contract_validator.py:FoundationIncludeContractValidator
    api_version: "1.x"
    stages: [validate]
    phase: pre
    order: 96
    depends_on: [base.validator.foundation_layout]
    timeout: 30
    subinterpreter_compatible: false  # Imports yaml directly (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates deterministic v5 project instances directory contract.

  - id: base.validator.foundation_file_placement
    kind: validator_yaml
    entry: validators/foundation_file_placement_validator.py:FoundationFilePlacementValidator
    api_version: "1.x"
    stages: [validate]
    phase: pre
    order: 96
    depends_on: [base.validator.foundation_include_contract]
    timeout: 30
    subinterpreter_compatible: false  # Imports yaml directly (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates policy-driven placement of instance YAML files in project instances tree.

  - id: base.validator.foundation_device_taxonomy
    kind: validator_json
    entry: validators/foundation_device_taxonomy_validator.py:FoundationDeviceTaxonomyValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 97
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Validates L1 group/class taxonomy conventions.

  - id: base.validator.references
    kind: validator_json
    entry: validators/reference_validator.py:ReferenceValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 100
    depends_on: [base.compiler.instance_rows, base.compiler.capability_contract_loader]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, treat warnings as errors
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
      - from_plugin: base.compiler.capability_contract_loader
        key: catalog_ids
        required: false
    description: Validates all cross-entity references in compiled topology

  - id: base.validator.initialization_contract
    kind: validator_json
    entry: validators/initialization_contract_validator.py:InitializationContractValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 101
    depends_on: []
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates optional object initialization_contract payloads for compute/router objects (ADR 0083).

  - id: base.validator.model_lock
    kind: validator_json
    entry: validators/model_lock_validator.py:ModelLockValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 110
    depends_on: [base.validator.references, base.compiler.model_lock_loader, base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, require all refs to be pinned in model.lock
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
      - from_plugin: base.compiler.model_lock_loader
        key: lock_payload
        required: false
      - from_plugin: base.compiler.model_lock_loader
        key: model_lock_loaded
        required: false
    description: Validates that class_ref and object_ref are pinned in model.lock (ADR 0063)

  - id: base.validator.power_source_refs
    kind: validator_json
    entry: validators/declarative_reference_validator.py:DeclarativeReferenceValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 115
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config:
      enabled_rules: [power_source]
      missing_rows_code: E6901
      missing_rows_path: pipeline:mode
      missing_rows_message_prefix: power_source_refs
    config_schema:
      type: object
      properties:
        enabled_rules:
          type: array
          items:
            type: string
        missing_rows_code:
          type: string
        missing_rows_path:
          type: string
        missing_rows_message_prefix:
          type: string
      required: [enabled_rules]
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Validates ADR0062 L1 lateral relation power.source_ref and outlet occupancy constraints.

  - id: base.validator.network_ip_overlap
    kind: validator_json
    entry: validators/network_ip_overlap_validator.py:NetworkIpOverlapValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 116
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Detects duplicate IP reuse across normalized instance rows.

  - id: base.validator.single_active_os
    kind: validator_json
    entry: validators/single_active_os_validator.py:SingleActiveOsValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 117
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Enforces at most one active OS ref per device row.

  - id: base.validator.network_reserved_ranges
    kind: validator_json
    entry: validators/network_reserved_ranges_validator.py:NetworkReservedRangesValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 118
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Validates VLAN reserved_ranges ranges, bounds, and overlaps.

  - id: base.validator.network_trust_zone_firewall_refs
    kind: validator_json
    entry: validators/network_trust_zone_firewall_refs_validator.py:NetworkTrustZoneFirewallRefsValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 119
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Validates trust-zone default firewall policy references.

  - id: base.validator.network_firewall_addressability
    kind: validator_json
    entry: validators/network_firewall_addressability_validator.py:NetworkFirewallAddressabilityValidator
    api_version: "1.x"
    stages: [validate]
    phase: run
    order: 121
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    subinterpreter_compatible: true  # Pure Python (ADR 0097 Wave 2)
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    consumes:
      - from_plugin: base.compiler.instance_rows
        key: normalized_rows
        required: false
    description: Warns when firewall policy refs cannot resolve to static address sets.

  - id: base.validator.runtime_target_os_binding
    kind: validator_json
    entry: validators/runtime_target_os_binding_validator.py:RuntimeTargetOsBindingValidator
    api_version: "1.x"
    stages: [validate]
