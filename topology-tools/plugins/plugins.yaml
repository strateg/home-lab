# Plugin Manifest Registry (Sharded)
#
# This is the root manifest that includes stage-specific plugin manifests.
# Each stage manifest contains plugins organized by their execution stage.
#
# Structure:
#   manifests/discoverers.yaml  - Stage 1: Discovery plugins
#   manifests/compilers.yaml    - Stage 2: Compiler plugins
#   manifests/validators.yaml   - Stage 3: Validator plugins
#   manifests/generators.yaml   - Stage 4: Generator plugins
#   manifests/assemblers.yaml   - Stage 5: Assembler plugins
#   manifests/builders.yaml     - Stage 6: Builder plugins
#
# See ADR 0063 (Plugin Microkernel) and ADR 0080 (6-stage pipeline)

schema_version: 1

# Root manifest has no direct plugins - all plugins are in included manifests
plugins: []

# Include stage-specific manifests (processed in order)
includes:
  - manifests/discoverers.yaml
  - manifests/compilers.yaml
  - manifests/validators.yaml
  - manifests/generators.yaml
  - manifests/assemblers.yaml
  - manifests/builders.yaml

# Global plugin settings
global_settings:
  default_timeout: 30
  parallel_execution: true
  strict_dependency_resolution: true

# Manifest metadata
metadata:
  last_updated: "2026-06-29"
  total_plugins: 93
  sharding_version: "2.0"
  stages:
    discover: 4
    compile: 17
    validate: 49
    generate: 10
    assemble: 6
    build: 7
