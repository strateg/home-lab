---
repos:
- repo: https://github.com/psf/black
  rev: 23.9.1
  hooks:
    - id: black
      language_version: python3.13

- repo: https://github.com/PyCQA/isort
  rev: 5.13.0
  hooks:
    - id: isort
      args: ["--profile", "black"]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.7.0
  hooks:
    - id: mypy
      additional_dependencies: ["types-pyyaml", "types-jinja2"]
      stages: [manual]

- repo: https://github.com/adrienverge/yamllint
  rev: v1.34.0
  hooks:
    - id: yamllint
      args: ["--strict"]
      stages: [manual]

- repo: local
  hooks:
    - id: detect-secrets-update-baseline
      name: Update detect-secrets baseline
      entry: python v5/scripts/secrets/update_secrets_baseline.py
      language: system
      pass_filenames: false
      always_run: true
      stages: [pre-commit]

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.4.0
  hooks:
    - id: detect-secrets
      args: ["--baseline", ".secrets.baseline"]
      exclude: |
        (?x)^(
          v4/.*|
          \.github/workflows/.*|
          Migrated_and_archived/.*|
          manual-scripts/.*|
          v4/topology-tools/fixtures/.*|
          v5/projects/.*/secrets/.*|
          v5/projects/.*/project\.yaml$|
          v5/projects/.*/framework\.lock\.yaml$|
          v5/tests/.*|
          docs/.*|
          v5/topology/object-modules/.*/obj\..*\.yaml$|
          v5/topology-tools/plugins/plugins\.yaml$|
          v5/topology-tools/(audit-strict-runtime-entrypoints|bootstrap-project-repo|cutover-readiness-report)\.py$|
          ansible/group_vars/.*\.yml\.example$|
          ansible/.*\.sh$|
          ansible/README\.md$|
          bootstrap/.*|
          configs/vpn/.*|
          docs/guides/.*|
          v5/secrets/.*\.yaml$|
          MIGRATION\.md|
          \.secrets\.baseline
        )$

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
      exclude: |
        (?x)^(
          v4/topology\.yaml|
          v4/topology/.*\.yaml|
          v4/topology-tools/fixtures/.*\.yaml|
          Migrated_and_archived/.*\.yaml
        )$
    - id: check-added-large-files

- repo: local
  hooks:
    - id: update-l0-last-updated
      name: Update L0 metadata.last_updated
      entry: python v4/topology-tools/scripts/hooks/update_l0_last_updated.py
      language: system
      pass_filenames: false
    # Generators below require terraform/mermaid binaries
    # Uncomment to enable locally or run on CI
    # - id: validate-topology
    #   name: Validate topology.yaml
    #   entry: python v4/topology-tools/validate-topology.py
    #   args: ["--topology", "v4/topology.yaml"]
    #   language: system
    #   pass_filenames: false
    # - id: check-generated-files
    #   name: Check generated files up-to-date
    #   entry: python v4/topology-tools/regenerate-all.py
    #   args: ["--topology", "v4/topology.yaml"]
    #   language: system
    #   pass_filenames: false
    - id: sops-encryption-check
      name: Verify SOPS encryption
      entry: python v5/scripts/secrets/check-sops-encryption.py
      language: system
      files: ^v5/secrets/.*\.yaml$
      pass_filenames: false
