---
repos:
- repo: https://github.com/psf/black
  rev: 26.5.1
  hooks:
    - id: black
      language_version: python3.14

- repo: https://github.com/PyCQA/isort
  rev: 8.0.1
  hooks:
    - id: isort
      args: ["--profile", "black"]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.7.0
  hooks:
    - id: mypy
      additional_dependencies: ["types-pyyaml", "types-jinja2"]
      stages: [manual]

- repo: https://github.com/adrienverge/yamllint
  rev: v1.34.0
  hooks:
    - id: yamllint
      args: ["--strict"]
      stages: [manual]

- repo: local
  hooks:
    - id: check-plugin-cycles
      name: Check plugin dependency cycles
      entry: python scripts/validation/check_plugin_cycles.py
      language: python
      additional_dependencies:
        - pyyaml>=6.0
      pass_filenames: false
      files: |
        (?x)^(
          topology-tools/plugins/plugins\.yaml|
          topology/class-modules/.*/plugins\.yaml|
          topology/object-modules/.*/plugins\.yaml|
          projects/.*/plugins\.yaml
        )$

    - id: detect-secrets-update-baseline
      name: Update detect-secrets baseline
      entry: python scripts/secrets/update_secrets_baseline.py
      language: python
      additional_dependencies:
        - detect-secrets==1.5.0
      pass_filenames: false
      always_run: true
      stages: [pre-commit]

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets
      args: ["--baseline", ".secrets.baseline"]
      exclude: |
        (?x)^(
          archive/.*|
          \.github/workflows/.*|
          Migrated_and_archived/.*|
          manual-scripts/.*|
          projects/.*/secrets/.*|
          projects/.*/project\.yaml$|
          projects/.*/framework\.lock\.yaml$|
          tests/(data|fixtures)/.*|
          tests/.*/fixtures/.*|
          docs/guides/.*|
          docs/release-notes/.*|
          docs/NETINSTALL-CLI-INDEX\.md$|
          docs/NETINSTALL-CLI-VISUAL-GUIDE\.md$|
          docs/framework/FRAMEWORK-V5\.md$|
          docs/github_analysis/IMPLEMENTATION_GUIDE\.md$|
          docs/runbooks/evidence/.*\.md$|
          docs/secrets-management\.md$|
          adr/.*\.md$|
          configs/glinet/.*|
          taskfiles/validate\.yml$|
          topology/object-modules/.*/obj\..*\.yaml$|
          topology-tools/plugins/plugins\.yaml$|
          topology-tools/(audit-strict-runtime-entrypoints|bootstrap-project-repo|cutover-readiness-report)\.py$|
          ansible/group_vars/.*\.yml\.example$|
          ansible/.*\.sh$|
          ansible/README\.md$|
          bootstrap/.*|
          configs/vpn/.*|
          secrets/.*\.yaml$|
          MIGRATION\.md|
          \.secrets\.baseline
        )$

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
      exclude: |
        (?x)^(
          Migrated_and_archived/.*\.yaml
        )$
    - id: check-added-large-files

- repo: local
  hooks:
    - id: sops-encryption-check
      name: Verify SOPS encryption
      entry: python scripts/secrets/check-sops-encryption.py
      language: system
      files: ^secrets/.*\.yaml$
      pass_filenames: false
