instance: lxc-nginx-proxy
object_ref: obj.proxmox.lxc.debian12.nginx
group: lxc
layer: L4
version: 1.0.0
source_id: lxc-nginx-proxy
status: mapped
notes: Nginx reverse proxy

vmid: 207
hostname: nginx-proxy
description: Nginx reverse proxy
tags:
  - proxy
  - production

host_ref: srv-gamayun
trust_zone_ref: inst.trust_zone.servers

os_refs:
  - inst.os.debian.12.proxmox.lxc

resources:
  cores: 1
  memory_mb: 1024
  swap_mb: 512

boot:
  onboot: true
  startup_order: 15

storage:
  rootfs:
    pool_ref: inst.storage.pool.local_lvm
    size_gb: 4

network:
  interface: eth0
  bridge_ref: inst.bridge.vmbr0
  vlan_ref: inst.vlan.servers
  ip: 10.0.30.80/24
  gateway: 10.0.30.1
  firewall: false

dns:
  nameserver: 192.168.88.1
  searchdomain: home.local

cloudinit:
  enabled: true
  user: root

ansible:
  enabled: true
  playbook: nginx-proxy.yml
