id: class.compute.hypervisor
version: 1.0.0
title: Compute Hypervisor
summary: Host platform that runs VM/LXC workloads.
os_policy: required
firmware_policy: required
os_cardinality:
  min: 1
  max: 1
multi_boot: false
allowed_os_install_models:
- installable
required_capabilities:
- cap.compute.host.hypervisor
- cap.compute.runtime.container_host
- cap.compute.runtime.vm_host
optional_capabilities:
- cap.compute.storage.zfs
capability_packs: []
invariants:
- object.class_ref must equal class.id
- instance overrides must not violate class invariants
