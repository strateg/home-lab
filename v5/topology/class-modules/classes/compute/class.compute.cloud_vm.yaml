id: class.compute.cloud_vm
version: 1.0.0
title: Compute Cloud VM
summary: Virtual machine instance hosted by cloud provider.
os_policy: required
firmware_policy: required
os_cardinality:
  min: 1
  max: 1
multi_boot: false
allowed_os_install_models:
- cloud_image
- installable
required_capabilities:
- cap.compute.node.cloud_vm
- cap.compute.workload.linux_base
optional_capabilities: []
capability_packs: []
invariants:
- object.class_ref must equal class.id
- instance overrides must not violate class invariants
