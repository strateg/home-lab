id: class.router
version: 2.0.0
title: Router
description: |
  Base class for all routers with routing, NAT, firewall, and
  optional VPN, WiFi, uplink policies, and advanced features.
  Differentiation via capability packs (home_gateway, travel_vpn, enterprise).

# ============================================================================
# REQUIRED CAPABILITIES
# All router objects MUST support these core capabilities
# ============================================================================

required_capabilities:
  - cap.net.interface.ethernet          # Base routed data interfaces
  - cap.net.l3.routing.static         # Static routes (IPv4/IPv6)
  - cap.net.l3.translation.snat        # Source NAT for upstream access
  - cap.net.l3.security.firewall.stateful  # Stateful firewall
  - cap.net.service.dhcp.server        # DHCP server
  - cap.net.service.dns.resolver       # DNS resolver/caching

# ============================================================================
# OPTIONAL CAPABILITIES
# Router objects MAY support these capabilities based on hardware/firmware
# ============================================================================

optional_capabilities:
  # Routing
  - cap.net.l3.routing.dynamic.rip        # RIP
  - cap.net.l3.routing.dynamic.bgp            # BGP (enterprise)
  - cap.net.l3.routing.dynamic.ospf           # OSPF (enterprise)
  - cap.net.l3.routing.ecmp           # Equal-cost multi-path
  - cap.net.l3.routing.policy.pcc            # Per-connection classifier (MikroTik)
  - cap.net.l3.routing.policy.pbr            # Policy-based routing

  # NAT & Firewall
  - cap.net.l3.translation.dnat             # Port forwarding
  - cap.net.l3.security.firewall.zone_policy    # Zone-based policies
  - cap.net.l3.security.firewall.l7_filtering        # Layer 7 filtering

  # VPN
  - cap.net.overlay.vpn.wireguard.server   # WireGuard server
  - cap.net.overlay.vpn.wireguard.client   # WireGuard client
  - cap.net.overlay.vpn.openvpn.server     # OpenVPN server
  - cap.net.overlay.vpn.openvpn.client     # OpenVPN client
  - cap.net.overlay.vpn.ipsec              # IPsec tunnels
  - cap.net.overlay.vpn.multi_instance     # Multiple VPN instances
  - cap.net.overlay.vpn.policy_routing     # Per-client VPN routing

  # WiFi
  - cap.net.interface.wifi             # Wireless interface support
  - cap.net.interface.wifi.dual_band         # 2.4GHz + 5GHz
  - cap.net.interface.wifi.wifi6             # 802.11ax
  - cap.net.interface.wifi.mu_mimo           # Multi-user MIMO
  - cap.net.interface.wifi.beamforming       # Beamforming
  - cap.net.l2.segmentation.guest_isolation  # Guest segment isolation (SSID/VLAN)
  - cap.net.interface.wifi.repeater_mode     # WiFi client/repeater
  - cap.net.interface.wifi.mesh              # Mesh networking

  # Uplink policy
  - cap.net.l3.uplink.multi_uplink          # Multiple WAN interfaces
  - cap.net.l3.uplink.failover           # WAN failover
  - cap.net.l3.uplink.load_balance       # WAN load balancing
  - cap.net.interface.fiber              # Fiber uplink interfaces
  - cap.net.interface.lte                # LTE modem
  - cap.net.interface.pppoe              # PPPoE client/server

  # QoS
  - cap.net.l3.qos.basic              # Simple priority
  - cap.net.l3.qos.advanced           # HTB/queue trees
  - cap.net.l3.qos.sqm                # Smart Queue Management

  # Services
  - cap.net.service.dhcp.relay             # DHCP relay
  - cap.net.service.dns.dot                # DNS-over-TLS
  - cap.net.service.dns.doh                # DNS-over-HTTPS
  - cap.net.service.dns.filtering            # DNS filtering
  - cap.net.service.ntp.server             # NTP server
  - cap.net.service.snmp                   # SNMP monitoring

  # Advanced
  - cap.net.l2.segmentation.vlan.8021q             # VLAN tagging
  - cap.net.l3.segmentation.vrf                    # VRF (enterprise)
  - cap.net.platform.containers             # Container support
  - cap.net.service.portal.captive                # Captive portal
  - cap.net.observability.netflow                # Netflow export
  - cap.net.management.api.rest               # REST API
  - cap.net.service.dyndns                 # Dynamic DNS

# ============================================================================
# CAPABILITY PACKS
# Pre-defined capability bundles for common router roles
# ============================================================================

capability_packs:
  - pack.router.home_gateway          # Full-featured home gateway (MikroTik)
  - pack.router.travel_vpn            # Travel VPN gateway (GL.iNet)
  - pack.router.enterprise            # Enterprise routing (CCR, EdgeRouter)

# ============================================================================
# INVARIANTS
# Rules that MUST be satisfied by objects and instances
# ============================================================================

invariants:
  - object.enabled_capabilities must include all required_capabilities
  - object.enabled_capabilities must be subset of (required + optional)
  - instance.overrides must not disable required capabilities
  - if object.enabled_packs specified, object must support all pack capabilities
  - vendor_capabilities must use vendor.* prefix

# ============================================================================
# LAYER PLACEMENT
# Defined in v5/topology/layer-contract.yaml
# ============================================================================

layer_policy:
  allowed_layers: [L1]  # Routers are L1 (foundation) devices

# ============================================================================
# CHANGELOG
# ============================================================================

changelog:
  - version: 2.0.0
    date: 2026-03-07
    changes:
      - Renamed router class namespace to class.router (simplified naming)
      - Expanded capability catalog from 10 to 49 capabilities
      - Added capability domains (routing, nat, firewall, vpn, wifi, wan, qos, services, advanced)
      - Created 3 capability packs (home_gateway, travel_vpn, enterprise)
      - Split VPN capabilities into client vs server modes
      - Added WiFi 6 and repeater mode capabilities
      - Added multi-instance VPN and policy routing
      - Added DNS privacy capabilities (DoT, DoH, AdGuard)
      - Improved capability naming convention (cap.net.<domain>.<feature>)

  - version: 1.0.0
    date: 2026-03-06
    changes:
      - Initial class definition in legacy network-scoped namespace
      - Basic routing, NAT, firewall capabilities
