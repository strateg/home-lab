class: class.network.data_channel
version: 1.0.0
description: Generic data channel contract for inter-device communication links
layer: L1

properties:
  required:
    - bandwidth_mbps
  optional:
    - medium
    - duplex_mode
    - mtu
    - latency_ms
    - reliability_tier

property_schemas:
  bandwidth_mbps:
    type: integer
    minimum: 1
    maximum: 1000000
    description: Nominal channel throughput in megabits per second.
  medium:
    type: string
    enum: [wired, wireless, optical, virtual]
    default: wired
    description: Physical transport medium family.
  duplex_mode:
    type: string
    enum: [simplex, half, full]
    default: full
  mtu:
    type: integer
    minimum: 68
    maximum: 9216
    default: 1500
    description: Maximum transmission unit in bytes.
  latency_ms:
    type: number
    minimum: 0
    default: 0
    description: Typical one-way latency in milliseconds.
  reliability_tier:
    type: string
    enum: [best_effort, managed, carrier_grade]
    default: best_effort

required_capabilities: []

optional_capabilities: []

enabled_capabilities: []
