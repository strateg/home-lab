schema_version: 1
plugins:
  - id: object_mikrotik.validator_json.router_ports
    kind: validator_json
    entry: plugins/mikrotik_router_ports_validator.py:MikrotikRouterPortsValidator
    api_version: "1.x"
    stages: [validate]
    order: 241
    depends_on: [base.validator.references]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates MikroTik router ethernet ports shape for endpoint-aware connectivity checks.

  - id: base.generator.terraform_mikrotik
    kind: generator
    entry: plugins/terraform_mikrotik_generator.py:TerraformMikroTikGenerator
    api_version: "1.x"
    stages: [generate]
    order: 220
    depends_on: []
    timeout: 30
    config:
      terraform_version: ">= 1.6.0"
      mikrotik_provider_source: "terraform-routeros/routeros"
      mikrotik_provider_version: "~> 1.40"
      mikrotik_api_host: ""
      mikrotik_host: ""
      # Capability-driven template mappings (ADR0078 WP9)
      capability_templates:
        qos:
          enabled_by: capabilities.has_qos
          template: terraform/qos.tf.j2
          output: qos.tf
        wireguard:
          enabled_by: capabilities.has_wireguard
          template: terraform/vpn.tf.j2
          output: vpn.tf
        containers:
          enabled_by: capabilities.has_containers
          template: terraform/containers.tf.j2
          output: containers.tf
    config_schema:
      type: object
      properties:
        terraform_version:
          type: string
          description: Terraform CLI version constraint for provider block.
        mikrotik_provider_source:
          type: string
          description: Terraform provider source address for RouterOS provider.
        mikrotik_provider_version:
          type: string
          description: Terraform provider version constraint for RouterOS provider.
        mikrotik_api_host:
          type: string
          description: Optional full RouterOS API endpoint URL override.
        mikrotik_host:
          type: string
          description: Legacy alias for mikrotik_api_host (kept for compatibility).
        capability_templates:
          type: object
          description: Capability-driven template mappings for conditional artifact generation.
          additionalProperties:
            type: object
            properties:
              enabled_by:
                type: string
                description: Capability expression evaluated against projection capabilities.
              template:
                type: string
                description: Template path relative to object template root.
              output:
                type: string
                description: Output filename for generated artifact.
            required: [enabled_by, template, output]
      required: []
    description: Emits baseline Terraform artifacts for MikroTik from v5 projections (Phase 4 bootstrap).

  - id: base.generator.bootstrap_mikrotik
    kind: generator
    entry: plugins/bootstrap_mikrotik_generator.py:BootstrapMikroTikGenerator
    api_version: "1.x"
    stages: [generate]
    order: 320
    depends_on: []
    timeout: 30
    config:
      # Bootstrap file mappings (ADR0078)
      bootstrap_files:
        - output_file: init-terraform.rsc
          template: bootstrap/init-terraform.rsc.j2
        - output_file: backup-restore-overrides.rsc
          template: bootstrap/backup-restore-overrides.rsc.j2
        - output_file: terraform.tfvars.example
          template: bootstrap/terraform.tfvars.example.j2
        - output_file: README.md
          template: bootstrap/readme.md.j2
    config_schema:
      type: object
      properties:
        bootstrap_files:
          type: array
          description: Bootstrap file mappings for node root directory.
          items:
            type: object
            properties:
              output_file:
                type: string
                description: Output filename relative to node root.
              template:
                type: string
                description: Template path relative to object template root.
            required: [output_file, template]
      required: []
    description: Emits baseline bootstrap artifacts for MikroTik routers (Phase 6 bootstrap).
