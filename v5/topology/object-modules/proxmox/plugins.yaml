schema_version: 1
plugins:
  - id: base.generator.terraform_proxmox
    kind: generator
    entry: plugins/terraform_proxmox_generator.py:TerraformProxmoxGenerator
    api_version: "1.x"
    stages: [generate]
    order: 210
    depends_on: []
    timeout: 30
    config:
      terraform_version: ">= 1.6.0"
      proxmox_provider_source: "bpg/proxmox"
      proxmox_provider_version: ">= 0.66.0"
      proxmox_api_url: ""
      # Capability-driven template mappings (ADR0078)
      capability_templates:
        - capability_key: has_ceph
          template: terraform/ceph.tf.j2
          output_file: ceph.tf
        - capability_key: has_ha
          template: terraform/ha.tf.j2
          output_file: ha.tf
        - capability_key: has_cloud_init
          template: terraform/cloud-init.tf.j2
          output_file: cloud-init.tf
    config_schema:
      type: object
      properties:
        terraform_version:
          type: string
          description: Terraform CLI version constraint for versions.tf.
        proxmox_provider_source:
          type: string
          description: Terraform provider source address for Proxmox.
        proxmox_provider_version:
          type: string
          description: Terraform provider version constraint for Proxmox provider.
        proxmox_api_url:
          type: string
          description: Optional full Proxmox API endpoint URL override.
        capability_templates:
          type: array
          description: Capability-driven template mappings for conditional artifact generation.
          items:
            type: object
            properties:
              capability_key:
                type: string
                description: Key in projection capabilities dict to check.
              template:
                type: string
                description: Template path relative to object template root.
              output_file:
                type: string
                description: Output filename for generated artifact.
            required: [capability_key, template, output_file]
      required: []
    description: Emits baseline Terraform artifacts for Proxmox from v5 projections (Phase 3 bootstrap).

  - id: base.generator.bootstrap_proxmox
    kind: generator
    entry: plugins/bootstrap_proxmox_generator.py:BootstrapProxmoxGenerator
    api_version: "1.x"
    stages: [generate]
    order: 310
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Emits baseline bootstrap artifacts for Proxmox nodes (Phase 6 bootstrap).
