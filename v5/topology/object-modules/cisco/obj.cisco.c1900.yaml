object: obj.cisco.c1900
version: 1.0.0
class_ref: class.router
title: Cisco C1900 Series ISR
vendor: cisco
model: ISR1900-4G

description: |
  Cisco C1900 Series Integrated Services Router (ISR) - Branch office router
  with built-in security, WAN optimization, and application visibility.
  4 GbE ports, modular design for add-on modules.

hardware_specs:
  form_factor: compact
  dimensions:
    length_mm: 210
    width_mm: 170
    height_mm: 45
    weight_g: 2500
    mounting: desktop_or_rack

  cpu:
    vendor: intel
    model: Atom
    architecture: x86
    cores: 2
    clock_mhz: 2000

  memory:
    size_mb: 2048
    type: ddr3

  storage:
    size_mb: 4096
    type: nand_flash

  interfaces:
    ethernet:
      - name: GigabitEthernet0/0
        role: wan
        speed_mbps: 1000
        standard: gbe
        duplex: full
        poe: false
        description: GbE WAN port 1

      - name: GigabitEthernet0/1
        role: wan
        speed_mbps: 1000
        standard: gbe
        duplex: full
        poe: false
        description: GbE WAN port 2

      - name: GigabitEthernet0/2
        role: lan
        speed_mbps: 1000
        standard: gbe
        duplex: full
        poe: false
        description: GbE LAN port 1

      - name: GigabitEthernet0/3
        role: lan
        speed_mbps: 1000
        standard: gbe
        duplex: full
        poe: false
        description: GbE LAN port 2

  power:
    input_voltage_vdc: [110, 240]
    input_connector: power_cord
    max_power_watts: 100
    typical_power_watts: 60
    idle_power_watts: 40
    cooling: active_fan
    operating_temp_celsius: [0, 40]

software_contract:
  firmware_obj_ref: obj.firmware.ios_xe.cisco
  os_obj_refs:
  - obj.os.ios_xe.cisco
  os_cardinality:
    min: 1
    max: 1
  multi_boot: false

software:
  features:
    - Advanced routing (BGP, OSPF, IS-IS)
    - IPSec VPN, FlexVPN
    - Application visibility and control
    - Web filtering
    - Firewall and NAT
    - QoS and traffic shaping
    - SNMP/SSH/Telnet management
    - NETCONF/YANG support

enabled_capabilities:
  - cap.net.interface.ethernet
  - cap.net.l3.routing.static
  - cap.net.l3.routing.bgp
  - cap.net.l3.translation.snat
  - cap.net.l3.security.firewall.stateful
  - cap.net.vpn.ipsec
  - cap.net.traffic.shaping.qos
  - cap.net.service.application_visibility
