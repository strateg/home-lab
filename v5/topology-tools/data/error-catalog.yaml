version: 1
tool: topology-compiler
codes:
  E1001:
    severity: error
    stage: load
    title: Topology File Missing
    hint: Check --topology path and verify the file exists.
  E1002:
    severity: error
    stage: load
    title: Included File Missing
    hint: Fix !include or !include_dir_sorted paths and rerun compilation.
  E1003:
    severity: error
    stage: load
    title: YAML Parse Error
    hint: Fix YAML syntax near the reported line and column.
  E1004:
    severity: error
    stage: load
    title: Invalid Root Type
    hint: Root topology document must be a mapping/object.
  E1201:
    severity: error
    stage: validate
    title: Schema File Missing
    hint: Ensure topology schema exists or pass --schema with a valid path.
  E1202:
    severity: error
    stage: validate
    title: Schema Parse Error
    hint: Fix JSON syntax in schema file.
  E1203:
    severity: error
    stage: validate
    title: Schema Validation Failed
    hint: Update YAML so the compiled structure satisfies the schema.
  E2101:
    severity: error
    stage: resolve
    title: Unresolved Reference
    hint: Point *_ref to an existing id or create the missing object.
  E2102:
    severity: error
    stage: resolve
    title: Duplicate ID
    hint: IDs must be globally unique in the effective topology.
  W2201:
    severity: warning
    stage: resolve
    title: object_ref Without class_ref
    hint: Add class_ref to keep class-object linkage explicit.
  W2202:
    severity: warning
    stage: resolve
    title: class_ref Without object_ref
    hint: Add object_ref for concrete topology or confirm this is abstract topology.
  W2203:
    severity: warning
    stage: resolve
    title: Partial implementation Binding
    hint: implementation.module and implementation.object should be set together.
  E2301:
    severity: error
    stage: load
    title: Profile Map Parse Error
    hint: Fix YAML syntax in --profile-map file.
  E2302:
    severity: error
    stage: load
    title: Profile Map Contract Error
    hint: Validate profile map shape (profiles/profile/instance_overrides).
  W2301:
    severity: warning
    stage: load
    title: Profile Map Missing or Mismatched
    hint: Ensure --profile-map exists and profile name matches requested --profile.
  W2302:
    severity: warning
    stage: load
    title: Empty Profile Overrides
    hint: No overrides resolved for selected profile.
  W2303:
    severity: warning
    stage: resolve
    title: Unknown Profile Override Target
    hint: Remove stale instance override or create missing instance id.
  I2301:
    severity: info
    stage: resolve
    title: Profile Applied
    hint: Profile overrides were applied to the effective topology.
  E2401:
    severity: error
    stage: load
    title: model.lock Parse Error
    hint: Fix YAML syntax in model.lock.
  E2402:
    severity: error
    stage: load
    title: model.lock Contract Error
    hint: model.lock root must be a mapping/object.
  E2403:
    severity: error
    stage: validate
    title: object-class Pin Mismatch
    hint: Align instance class_ref with object pin class_ref in model.lock.
  W2401:
    severity: warning
    stage: load
    title: model.lock Missing
    hint: Create model.lock or disable with --model-lock \"\" for exploratory runs.
  W2402:
    severity: warning
    stage: validate
    title: Unpinned Class Reference
    hint: Add class_ref pin under model.lock classes/class_modules.
  W2403:
    severity: warning
    stage: validate
    title: Unpinned Object Reference
    hint: Add object_ref pin under model.lock objects/object_modules.
  W2404:
    severity: warning
    stage: validate
    title: Empty model.lock Pins
    hint: model.lock should define class and/or object pin maps.
  I2401:
    severity: info
    stage: load
    title: model.lock Loaded
    hint: No action required.
  E3201:
    severity: error
    stage: validate
    title: Semantic Validation Failed
    hint: Fix semantic contract violation reported by validator checks.
  W3201:
    severity: warning
    stage: validate
    title: Semantic Validation Warning
    hint: Review warning and update topology if it indicates drift.
  E3001:
    severity: error
    stage: emit
    title: Effective JSON Emit Failed
    hint: Check output path permissions and free disk space.
  I9001:
    severity: info
    stage: emit
    title: Compile Success
    hint: No action required.
  # Plugin system errors (ADR 0063)
  E4001:
    severity: error
    stage: load
    title: Plugin Manifest Parse Error
    hint: Fix YAML syntax in plugin manifest file.
  E4002:
    severity: error
    stage: load
    title: Plugin Manifest Schema Error
    hint: Ensure manifest has required fields (id, kind, entry, api_version, stages, order).
  E4003:
    severity: error
    stage: load
    title: Plugin API Version Incompatible
    hint: Update plugin to compatible API version or upgrade kernel.
  E4004:
    severity: error
    stage: load
    title: Plugin Entry Point Not Found
    hint: Check plugin entry path and class name exist.
  E4005:
    severity: error
    stage: load
    title: Plugin Class Invalid
    hint: Plugin class must inherit from PluginBase.
  E4006:
    severity: error
    stage: load
    title: Plugin Kind Mismatch
    hint: Plugin class kind() must match manifest declaration.
  E4007:
    severity: error
    stage: load
    title: Plugin Dependency Missing
    hint: Install or register required dependency plugin.
  E4008:
    severity: error
    stage: load
    title: Plugin Circular Dependency
    hint: Remove circular depends_on references between plugins.
  E4009:
    severity: error
    stage: load
    title: Duplicate Plugin ID
    hint: Plugin IDs must be globally unique across all manifests.
  E4010:
    severity: error
    stage: validate
    title: Plugin Capability Mismatch
    hint: Add capability-providing plugins or update requires_capabilities declarations.
  E4011:
    severity: error
    stage: validate
    title: Unsupported Model Version
    hint: Update model.lock core_model_version or kernel supported model_versions compatibility matrix.
  E4012:
    severity: error
    stage: validate
    title: Model Version Context Missing
    hint: Ensure model.lock is loaded and core_model_version is defined when plugin declares model_versions.
  E4101:
    severity: error
    stage: validate
    title: Plugin Execution Failed
    hint: Check plugin error output and fix reported issue.
  E4102:
    severity: error
    stage: validate
    title: Plugin Crashed
    hint: Plugin raised unhandled exception; check traceback.
  W4001:
    severity: warning
    stage: load
    title: No Plugins Loaded
    hint: No plugin manifests found; using core-only validation.
  W4301:
    severity: warning
    stage: validate
    title: Capability Data Unavailable
    hint: Ensure compile stage runs before validate stage with compiler plugins.
  W4302:
    severity: warning
    stage: validate
    title: Missing Required Capabilities
    hint: Add required capabilities to object definition or update class requirements.
  I4001:
    severity: info
    stage: load
    title: Plugins Loaded
    hint: No action required.
  I4201:
    severity: info
    stage: compile
    title: Capabilities Derived
    hint: No action required.
  I4301:
    severity: info
    stage: validate
    title: Capability Validation Started
    hint: No action required.
  # ADR 0071 sharded instances loader
  E7101:
    severity: error
    stage: validate
    title: Instance Filename Mismatch
    hint: Rename shard file to <instance>.yaml so basename matches instance id.
  E7102:
    severity: error
    stage: resolve
    title: Duplicate Instance ID in Shards
    hint: Ensure each instance id appears in exactly one shard file.
  E7103:
    severity: error
    stage: validate
    title: Invalid Shard File Shape
    hint: Shard file must contain exactly one instance row (not instance_bindings root).
  E7104:
    severity: error
    stage: validate
    title: Unsupported Instance Schema Version
    hint: Update shard schema_version or run migrator for this version.
  E7105:
    severity: error
    stage: load
    title: Reserved Shard File Ingestion Attempt
    hint: Do not treat reserved metadata/helper files as instance shards.
  E7107:
    severity: error
    stage: load
    title: Missing Instance Source Configuration
    hint: Configure paths.instances_root for selected source mode.
  # ADR 0068 placeholder validation
  E6801:
    severity: error
    stage: validate
    title: Invalid Placeholder Syntax
    hint: Use @required:<format> or @optional:<format> with a format from instance-field-formats.yaml.
  E6802:
    severity: error
    stage: validate
    title: Required Override Missing
    hint: Add missing required placeholder values under instance_overrides.
  E6803:
    severity: error
    stage: validate
    title: Override Path Not Marked
    hint: Override only fields marked with @required or @optional in object template.
  E6804:
    severity: error
    stage: validate
    title: Override Path Not Found
    hint: Ensure instance_overrides path exists in object template.
  E6805:
    severity: error
    stage: validate
    title: Override Format Validation Failed
    hint: Provide value that matches declared placeholder format.
  E6806:
    severity: error
    stage: validate
    title: Unresolved Placeholder After Merge
    hint: Ensure required placeholders are overridden and optional placeholders are omitted or resolved.
  # ADR 0069 pipeline mode and parity controls
  E6901:
    severity: error
    stage: validate
    title: Pipeline Mode Misconfiguration
    hint: plugin-first mode requires --enable-plugins and compiler-published compiled_json.
  E6903:
    severity: error
    stage: validate
    title: Compiled Model Contract Violation
    hint: Ensure compiled_json contains required metadata keys and supported compiled_model_version.
  E6904:
    severity: error
    stage: validate
    title: Legacy Pipeline Retired
    hint: Use --pipeline-mode plugin-first; legacy execution path is disabled.
  E6905:
    severity: error
    stage: validate
    title: Parity Gate Retired
    hint: Remove --parity-gate; parity checks were retired after plugin-first cutover.
  I6901:
    severity: info
    stage: validate
    title: Pipeline Mode Activated
    hint: Plugin-first effective model source is active.
