schema_version: 1
plugins:
  # Compiler plugins (run in compile stage)
  - id: base.compiler.capabilities
    kind: compiler
    entry: compilers/capability_compiler.py:CapabilityCompiler
    api_version: "1.x"
    stages: [compile]
    order: 50
    depends_on: [base.compiler.module_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Derives capabilities from class/object definitions (ADR 0063 Phase 3 example)

  - id: base.compiler.module_loader
    kind: compiler
    entry: compilers/module_loader_compiler.py:ModuleLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 30
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads class/object module maps for plugin-first pipeline (ADR 0069).

  - id: base.compiler.model_lock_loader
    kind: compiler
    entry: compilers/model_lock_loader_compiler.py:ModelLockLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 35
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads model.lock payload for plugin-first pipeline (ADR 0069).

  - id: base.compiler.annotation_resolver
    kind: compiler
    entry: compilers/annotation_resolver_compiler.py:AnnotationResolverCompiler
    api_version: "1.x"
    stages: [compile]
    order: 38
    depends_on: []
    timeout: 30
    config:
      format_registry_path: data/instance-field-formats.yaml
    config_schema:
      type: object
      properties:
        format_registry_path:
          type: string
          description: Path to annotation value format registry.
      required: []
    description: Parses field annotations once and publishes normalized annotation indexes.

  - id: base.compiler.instance_rows
    kind: compiler
    entry: compilers/instance_rows_compiler.py:InstanceRowsCompiler
    api_version: "1.x"
    stages: [compile]
    order: 40
    depends_on: [base.compiler.annotation_resolver]
    timeout: 30
    config:
      secrets_mode: passthrough
      secrets_root: v5/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: v5/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    description: Normalizes instance bindings rows and merges side-car secrets replacing placeholders (ADR 0072).

  - id: base.compiler.capability_contract_loader
    kind: compiler
    entry: compilers/capability_contract_loader_compiler.py:CapabilityContractLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 45
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads capability catalog and packs contract for plugin-first pipeline.

  - id: base.compiler.effective_model
    kind: compiler
    entry: compilers/effective_model_compiler.py:EffectiveModelCompiler
    api_version: "1.x"
    stages: [compile]
    order: 60
    depends_on: [base.compiler.module_loader, base.compiler.capabilities, base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Assembles candidate effective model in compile stage (ADR 0069 WS2).

  # Validator plugins (run in validate stage)
  - id: base.validator.references
    kind: validator_json
    entry: validators/reference_validator.py:ReferenceValidator
    api_version: "1.x"
    stages: [validate]
    order: 100
    depends_on: [base.compiler.instance_rows, base.compiler.capability_contract_loader]
    timeout: 30
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, treat warnings as errors
      required: []
    description: Validates all cross-entity references in compiled topology

  - id: base.validator.model_lock
    kind: validator_json
    entry: validators/model_lock_validator.py:ModelLockValidator
    api_version: "1.x"
    stages: [validate]
    order: 110
    depends_on: [base.validator.references, base.compiler.model_lock_loader, base.compiler.instance_rows]
    timeout: 30
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, require all refs to be pinned in model.lock
      required: []
    description: Validates that class_ref and object_ref are pinned in model.lock (ADR 0063)

  - id: base.validator.power_source_refs
    kind: validator_json
    entry: validators/power_source_refs_validator.py:PowerSourceRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 115
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates ADR0062 L1 lateral relation power.source_ref and outlet occupancy constraints.

  - id: base.validator.embedded_in
    kind: validator_json
    entry: validators/embedded_in_validator.py:EmbeddedInValidator
    api_version: "1.x"
    stages: [validate]
    order: 120
    depends_on: [base.validator.references, base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates embedded_in references for OS instances (ADR 0064)

  - id: base.validator.capability_contract
    kind: validator_json
    entry: validators/capability_contract_validator.py:CapabilityContractValidator
    api_version: "1.x"
    stages: [validate]
    order: 130
    depends_on: [base.compiler.module_loader, base.compiler.capability_contract_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates capability contracts using compiler-derived data (ADR 0063 Phase 3 example)

  - id: base.validator.instance_placeholders
    kind: validator_json
    entry: validators/instance_placeholder_validator.py:InstancePlaceholderValidator
    api_version: "1.x"
    stages: [validate]
    order: 140
    depends_on: []
    timeout: 30
    config:
      format_registry_path: data/instance-field-formats.yaml
      enforcement_mode: enforce
      gate_statuses: [modeled, mapped]
    config_schema:
      type: object
      properties:
        format_registry_path:
          type: string
          description: Path to ADR0068 placeholder format registry.
        enforcement_mode:
          type: string
          enum: [warn, "warn+gate-new", enforce]
          default: enforce
          description: ADR0068 policy mode (warn rollout, warn+gate-new, strict enforce).
        gate_statuses:
          type: array
          items:
            type: string
          default: [modeled, mapped]
          description: Instance statuses treated as strict in warn+gate-new mode.
      required: []
    description: Validates ADR0068 @required/@optional placeholders and instance_overrides.

  # Generator plugins (run in generate stage)
  #
  # Generator Plugin Contract Conventions:
  # --------------------------------------
  # - stage: generate
  # - order: 190-199 for core generators (effective_json, effective_yaml)
  #          200-299 for infrastructure generators (terraform, ansible)
  #          300-399 for bootstrap generators
  # - input: ctx.compiled_json (authoritative compiled model)
  # - output: files written to artifacts_root via base_generator helpers
  # - depends_on: typically [] (generators are independent after compile stage)
  #
  # Template-based generators should:
  # 1. Extend BaseGenerator from generators/base_generator.py
  # 2. Build projection view from ctx.compiled_json (not raw topology)
  # 3. Use render_template() with projection as context
  # 4. Use write_text_atomic() for deterministic file writes
  # 5. Use sort_records() for stable output ordering
  #
  - id: base.generator.effective_json
    kind: generator
    entry: generators/effective_json_generator.py:EffectiveJsonGenerator
    api_version: "1.x"
    stages: [generate]
    order: 190
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Emits effective topology JSON from compiled model (ADR 0069 WS4).

  - id: base.generator.effective_yaml
    kind: generator
    entry: generators/effective_yaml_generator.py:EffectiveYamlGenerator
    api_version: "1.x"
    stages: [generate]
    order: 200
    depends_on: []
    timeout: 30
    config:
      output_filename: effective-topology.yaml
    config_schema:
      type: object
      properties:
        output_filename:
          type: string
          description: Filename for generated effective YAML artifact.
      required: []
    description: Emits effective topology YAML from compiled model (ADR 0069 WS4 seed).

  - id: base.generator.terraform_proxmox
    kind: generator
    entry: generators/terraform_proxmox_generator.py:TerraformProxmoxGenerator
    api_version: "1.x"
    stages: [generate]
    order: 210
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Emits baseline Terraform artifacts for Proxmox from v5 projections (Phase 3 bootstrap).

  - id: base.generator.terraform_mikrotik
    kind: generator
    entry: generators/terraform_mikrotik_generator.py:TerraformMikroTikGenerator
    api_version: "1.x"
    stages: [generate]
    order: 220
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Emits baseline Terraform artifacts for MikroTik from v5 projections (Phase 4 bootstrap).
