schema_version: 1
plugins:
  - id: base.validator.references
    kind: validator_json
    entry: validators/reference_validator.py:ReferenceValidator
    api_version: "1.x"
    stages: [validate]
    order: 100
    depends_on: []
    timeout: 30
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, treat warnings as errors
      required: []
    description: Validates all cross-entity references in compiled topology
