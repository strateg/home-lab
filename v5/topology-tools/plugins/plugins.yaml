schema_version: 1
plugins:
  # Compiler plugins (run in compile stage)
  - id: base.compiler.capabilities
    kind: compiler
    entry: compilers/capability_compiler.py:CapabilityCompiler
    api_version: "1.x"
    stages: [compile]
    order: 50
    depends_on: [base.compiler.module_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Derives capabilities from class/object definitions (ADR 0063 Phase 3 example)

  - id: base.compiler.module_loader
    kind: compiler
    entry: compilers/module_loader_compiler.py:ModuleLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 30
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads class/object module maps for plugin-first pipeline (ADR 0069).

  - id: base.compiler.model_lock_loader
    kind: compiler
    entry: compilers/model_lock_loader_compiler.py:ModelLockLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 35
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads model.lock payload for plugin-first pipeline (ADR 0069).

  - id: base.compiler.annotation_resolver
    kind: compiler
    entry: compilers/annotation_resolver_compiler.py:AnnotationResolverCompiler
    api_version: "1.x"
    stages: [compile]
    order: 38
    depends_on: []
    timeout: 30
    config:
      format_registry_path: data/instance-field-formats.yaml
    config_schema:
      type: object
      properties:
        format_registry_path:
          type: string
          description: Path to annotation value format registry.
      required: []
    description: Parses field annotations once and publishes normalized annotation indexes.

  - id: base.compiler.instance_rows
    kind: compiler
    entry: compilers/instance_rows_compiler.py:InstanceRowsCompiler
    api_version: "1.x"
    stages: [compile]
    order: 40
    depends_on: [base.compiler.annotation_resolver]
    timeout: 30
    config:
      secrets_mode: passthrough
      secrets_root: v5/projects/home-lab/secrets
      require_unlock: true
    config_schema:
      type: object
      properties:
        secrets_mode:
          type: string
          enum: [inject, passthrough, strict]
          default: passthrough
          description: Side-car secrets merge mode (ADR 0072).
        secrets_root:
          type: string
          default: v5/projects/home-lab/secrets
          description: Root directory for side-car secret files (relative to repo root).
        require_unlock:
          type: boolean
          default: true
          description: Emit error when decryption fails due to missing unlocked age key.
      required: []
    description: Normalizes instance bindings rows and merges side-car secrets replacing placeholders (ADR 0072).

  - id: base.compiler.capability_contract_loader
    kind: compiler
    entry: compilers/capability_contract_loader_compiler.py:CapabilityContractLoaderCompiler
    api_version: "1.x"
    stages: [compile]
    order: 45
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Loads capability catalog and packs contract for plugin-first pipeline.

  - id: base.compiler.effective_model
    kind: compiler
    entry: compilers/effective_model_compiler.py:EffectiveModelCompiler
    api_version: "1.x"
    stages: [compile]
    order: 60
    depends_on: [base.compiler.module_loader, base.compiler.capabilities, base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Assembles candidate effective model in compile stage (ADR 0069 WS2).

  # Validator plugins (run in validate stage)
  - id: base.validator.governance_contract
    kind: validator_yaml
    entry: validators/governance_contract_validator.py:GovernanceContractValidator
    api_version: "1.x"
    stages: [validate]
    order: 90
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates v5 root governance contract (version/model/framework/project/meta).

  - id: base.validator.foundation_layout
    kind: validator_yaml
    entry: validators/foundation_layout_validator.py:FoundationLayoutValidator
    api_version: "1.x"
    stages: [validate]
    order: 95
    depends_on: [base.validator.governance_contract]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates class/object module root paths and baseline YAML/plugin layout.

  - id: base.validator.references
    kind: validator_json
    entry: validators/reference_validator.py:ReferenceValidator
    api_version: "1.x"
    stages: [validate]
    order: 100
    depends_on: [base.compiler.instance_rows, base.compiler.capability_contract_loader]
    timeout: 30
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, treat warnings as errors
      required: []
    description: Validates all cross-entity references in compiled topology

  - id: base.validator.model_lock
    kind: validator_json
    entry: validators/model_lock_validator.py:ModelLockValidator
    api_version: "1.x"
    stages: [validate]
    order: 110
    depends_on: [base.validator.references, base.compiler.model_lock_loader, base.compiler.instance_rows]
    timeout: 30
    config:
      strict_mode: false
    config_schema:
      type: object
      properties:
        strict_mode:
          type: boolean
          default: false
          description: If true, require all refs to be pinned in model.lock
      required: []
    description: Validates that class_ref and object_ref are pinned in model.lock (ADR 0063)

  - id: base.validator.power_source_refs
    kind: validator_json
    entry: validators/power_source_refs_validator.py:PowerSourceRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 115
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates ADR0062 L1 lateral relation power.source_ref and outlet occupancy constraints.

  - id: base.validator.network_ip_overlap
    kind: validator_json
    entry: validators/network_ip_overlap_validator.py:NetworkIpOverlapValidator
    api_version: "1.x"
    stages: [validate]
    order: 116
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Detects duplicate IP reuse across normalized instance rows.

  - id: base.validator.single_active_os
    kind: validator_json
    entry: validators/single_active_os_validator.py:SingleActiveOsValidator
    api_version: "1.x"
    stages: [validate]
    order: 117
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Enforces at most one active OS ref per device row.

  - id: base.validator.network_reserved_ranges
    kind: validator_json
    entry: validators/network_reserved_ranges_validator.py:NetworkReservedRangesValidator
    api_version: "1.x"
    stages: [validate]
    order: 118
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates VLAN reserved_ranges ranges, bounds, and overlaps.

  - id: base.validator.network_trust_zone_firewall_refs
    kind: validator_json
    entry: validators/network_trust_zone_firewall_refs_validator.py:NetworkTrustZoneFirewallRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 119
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates trust-zone default firewall policy references.

  - id: base.validator.network_firewall_addressability
    kind: validator_json
    entry: validators/network_firewall_addressability_validator.py:NetworkFirewallAddressabilityValidator
    api_version: "1.x"
    stages: [validate]
    order: 121
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Warns when firewall policy refs cannot resolve to static address sets.

  - id: base.validator.runtime_target_os_binding
    kind: validator_json
    entry: validators/runtime_target_os_binding_validator.py:RuntimeTargetOsBindingValidator
    api_version: "1.x"
    stages: [validate]
    order: 122
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Warns when docker/baremetal service runtime targets lack os_refs bindings.

  - id: base.validator.network_ip_allocation_host_os_refs
    kind: validator_json
    entry: validators/network_ip_allocation_host_os_refs_validator.py:NetworkIpAllocationHostOsRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 124
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates network ip_allocations host_os_ref/device_ref consistency.

  - id: base.validator.network_vlan_zone_consistency
    kind: validator_json
    entry: validators/network_vlan_zone_consistency_validator.py:NetworkVlanZoneConsistencyValidator
    api_version: "1.x"
    stages: [validate]
    order: 125
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Warns when VLAN id is outside trust-zone vlan_ids contract.

  - id: base.validator.network_core_refs
    kind: validator_json
    entry: validators/network_core_refs_validator.py:NetworkCoreRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 126
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates VLAN/bridge core refs (bridge/trust-zone/manager/host).

  - id: base.validator.network_vlan_tags
    kind: validator_json
    entry: validators/network_vlan_tags_validator.py:NetworkVlanTagsValidator
    api_version: "1.x"
    stages: [validate]
    order: 127
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates workload vlan_tag consistency against VLAN network contracts.

  - id: base.validator.network_mtu_consistency
    kind: validator_json
    entry: validators/network_mtu_consistency_validator.py:NetworkMtuConsistencyValidator
    api_version: "1.x"
    stages: [validate]
    order: 128
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates jumbo_frames and mtu consistency in VLAN networks.

  - id: base.validator.service_runtime_refs
    kind: validator_json
    entry: validators/service_runtime_refs_validator.py:ServiceRuntimeRefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 129
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates service runtime target_ref/network_binding_ref contracts.

  - id: base.validator.storage_l3_refs
    kind: validator_json
    entry: validators/storage_l3_refs_validator.py:StorageL3RefsValidator
    api_version: "1.x"
    stages: [validate]
    order: 123
    depends_on: [base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates L3 storage references (volume->pool, data_asset->volume).

  - id: base.validator.embedded_in
    kind: validator_json
    entry: validators/embedded_in_validator.py:EmbeddedInValidator
    api_version: "1.x"
    stages: [validate]
    order: 120
    depends_on: [base.validator.references, base.compiler.instance_rows]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates embedded_in references for OS instances (ADR 0064)

  - id: base.validator.ethernet_port_inventory
    kind: validator_json
    entry: validators/ethernet_port_inventory_validator.py:EthernetPortInventoryValidator
    api_version: "1.x"
    stages: [validate]
    order: 125
    depends_on: [base.validator.references]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Publishes object ethernet port inventory for endpoint validators.

  - id: base.validator.capability_contract
    kind: validator_json
    entry: validators/capability_contract_validator.py:CapabilityContractValidator
    api_version: "1.x"
    stages: [validate]
    order: 130
    depends_on: [base.compiler.module_loader, base.compiler.capability_contract_loader]
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Validates capability contracts using compiler-derived data (ADR 0063 Phase 3 example)

  - id: base.validator.instance_placeholders
    kind: validator_json
    entry: validators/instance_placeholder_validator.py:InstancePlaceholderValidator
    api_version: "1.x"
    stages: [validate]
    order: 140
    depends_on: []
    timeout: 30
    config:
      format_registry_path: data/instance-field-formats.yaml
      enforcement_mode: enforce
      gate_statuses: [modeled, mapped]
    config_schema:
      type: object
      properties:
        format_registry_path:
          type: string
          description: Path to ADR0068 placeholder format registry.
        enforcement_mode:
          type: string
          enum: [warn, "warn+gate-new", enforce]
          default: enforce
          description: ADR0068 policy mode (warn rollout, warn+gate-new, strict enforce).
        gate_statuses:
          type: array
          items:
            type: string
          default: [modeled, mapped]
          description: Instance statuses treated as strict in warn+gate-new mode.
      required: []
    description: Validates ADR0068 @required/@optional placeholders and instance_overrides.

  # Generator plugins (run in generate stage)
  #
  # Generator Plugin Contract Conventions:
  # --------------------------------------
  # - stage: generate
  # - order: 190-199 for core generators (effective_json, effective_yaml)
  #          200-299 for infrastructure generators (terraform, ansible)
  #          300-399 for bootstrap generators
  # - input: ctx.compiled_json (authoritative compiled model)
  # - output: files written to artifacts_root via base_generator helpers
  # - depends_on: typically [] (generators are independent after compile stage)
  #
  # Template-based generators should:
  # 1. Extend BaseGenerator from generators/base_generator.py
  # 2. Build projection view from ctx.compiled_json (not raw topology)
  # 3. Use render_template() with projection as context
  # 4. Use write_text_atomic() for deterministic file writes
  # 5. Use sort_records() for stable output ordering
  #
  - id: base.generator.effective_json
    kind: generator
    entry: generators/effective_json_generator.py:EffectiveJsonGenerator
    api_version: "1.x"
    stages: [generate]
    order: 190
    depends_on: []
    timeout: 30
    config: {}
    config_schema:
      type: object
      properties: {}
      required: []
    description: Emits effective topology JSON from compiled model (ADR 0069 WS4).

  - id: base.generator.effective_yaml
    kind: generator
    entry: generators/effective_yaml_generator.py:EffectiveYamlGenerator
    api_version: "1.x"
    stages: [generate]
    order: 200
    depends_on: []
    timeout: 30
    config:
      output_filename: effective-topology.yaml
    config_schema:
      type: object
      properties:
        output_filename:
          type: string
          description: Filename for generated effective YAML artifact.
      required: []
    description: Emits effective topology YAML from compiled model (ADR 0069 WS4 seed).

  # Object-scoped generators are registered in module manifests:
  # - v5/topology/object-modules/proxmox/plugins.yaml
  # - v5/topology/object-modules/mikrotik/plugins.yaml
  # - v5/topology/object-modules/orangepi/plugins.yaml

  - id: base.generator.ansible_inventory
    kind: generator
    entry: generators/ansible_inventory_generator.py:AnsibleInventoryGenerator
    api_version: "1.x"
    stages: [generate]
    order: 230
    depends_on: []
    timeout: 30
    config:
      inventory_profile: production
      topology_lane: v5
    config_schema:
      type: object
      properties:
        inventory_profile:
          type: string
          description: Inventory profile folder name under ansible/inventory.
        topology_lane:
          type: string
          description: Logical lane tag exported to group_vars/all.yml.
      required: []
    description: Emits baseline Ansible inventory artifacts from v5 projections (Phase 5 bootstrap).

